<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Flash Media Art - Linear</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        /* 1. 화이트 플래시 오버레이 스타일 추가 */
        #whiteOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff; /* 하얀색 */
            opacity: 0; /* 처음에 투명 */
            pointer-events: none; /* 클릭 방해 금지 */
            z-index: 100; /* 맨 위에 표시 */
        }
    </style>
</head>
<body>
    <div id="whiteOverlay"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uExplosionTime;
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying vec2 vUv;
        varying float vDistanceFactor;

        void main() {
            vUv = uv;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float dist = distance(uExplosionCenter, screenPos);
            
            vDistanceFactor = mix(1.0, 0.0, uExplosionTime);
            float force = mix(1.0, 0.1, dist) * uExplosionTime * 100.0;
            vec2 direction = normalize(screenPos - uExplosionCenter);
            
            vec4 finalPosition = projectionMatrix * (mvPosition + vec4(direction * force, force * 0.2, 0.0));
            gl_Position = finalPosition;
            gl_PointSize = aSize * (1.0 + uExplosionTime * 3.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vDistanceFactor;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            vec3 color = mix(vec3(0.01, 0.1, 0.2), vec3(1.0, 1.0, 1.0), vDistanceFactor);
            gl_FragColor = vec4(color, vDistanceFactor * 0.8);
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let whiteOverlay; // 화이트 오버레이 div 참조
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        let explosionTime = 0.0;
        let flashOpacity = 0.0; // 화이트 오버레이 투명도 상태

        // 밸런스 조정 변수
        const PARTICLE_COUNT = 250000;
        const SPACE_RANGE = 10000;

        init();
        animate();

        function init() {
            // 화이트 오버레이 div 가져오기
            whiteOverlay = document.getElementById('whiteOverlay');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.z = 3000;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                sizes[i] = Math.random() * 2.5;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uExplosionTime: { value: 0.0 },
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. 포스트 프로세싱 관련 초기화 코드 제거

            // 이벤트 리스너
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onClick);
            
            document.addEventListener('touchstart', onTouchMove, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onClick, { passive: false });
            
            window.addEventListener('resize', onWindowResize);
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            targetX = mouseX * 500; 
            targetY = mouseY * 500;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { updateExplosionCenter(event.clientX, event.clientY); }
        function onTouchMove(event) { if (event.touches.length > 0) updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY); }

        function onClick(event) {
            explosionTime = 1.0;
            // 5. 클릭 시 화이트 플래시 오버레이 투명도 최대로 설정
            flashOpacity = 1.0;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // composer.setSize 제거
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            explosionTime *= 0.96;
            particlesMaterial.uniforms.uExplosionTime.value = explosionTime;
            particlesMaterial.uniforms.uTime.value = time * 0.001;
            
            // 6. 화이트 플래시 오버레이 페이드아웃 계산 및 적용 (완만하게 감소)
            flashOpacity *= 0.92; // explosionTime보다 약간 빠르게 감소하도록 설정
            whiteOverlay.style.opacity = flashOpacity;

            // 7. renderer.render() 로 직접 렌더링
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
