<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Lens Flare & Big Bang</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        /* 1. 이펙트 컨테이너 */
        #waveEffect {
            position: fixed;
            width: 15vmin; 
            height: 15vmin;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: screen; 
        }

        /* 2. image_2.png의 날카로운 방사형 렌즈 플레어 구현 */
        #waveEffect::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            /* 날카롭고 수많은 방사형 광선들 구현 */
            background:
                /* 주 광선 4개 (Teal) */
                conic-gradient(from 15deg, rgba(200,230,255,0) 0%, rgba(200,230,255,0.8) 1%, rgba(200,230,255,0) 2.5%),
                conic-gradient(from 75deg, rgba(200,230,255,0) 0%, rgba(200,230,255,0.6) 1%, rgba(200,230,255,0) 2.5%),
                conic-gradient(from 165deg, rgba(200,230,255,0) 0%, rgba(200,230,255,0.7) 1%, rgba(200,230,255,0) 2.5%),
                conic-gradient(from 255deg, rgba(200,230,255,0) 0%, rgba(200,230,255,0.6) 1%, rgba(200,230,255,0) 2.5%),
                /* 얇고 수많은 방사형 광선들 (Cyan/Teal) */
                repeating-conic-gradient(from 0deg, rgba(200,230,255,0) 0deg, rgba(200,230,255,0.1) 0.5deg, rgba(200,230,255,0) 1.5deg),
                repeating-conic-gradient(from 0deg, rgba(200,230,255,0) 0deg, rgba(200,230,255,0.15) 1deg, rgba(200,230,255,0) 3deg);
            border-radius: 50%;
            mask-image: radial-gradient(circle, transparent 10%, black 30%, transparent 65%);
            -webkit-mask-image: radial-gradient(circle, transparent 10%, black 30%, transparent 65%);
            /* 회전 애니메이션 유지 */
            animation: spin 6s linear infinite;
        }

        /* 3. 강력한 중심부 코어 강화 */
        #waveEffect::after {
            content: '';
            position: absolute;
            top: 35%; left: 35%;
            width: 30%; height: 30%;
            /* 더 밝고 넓은 코어 */
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,230,255,0.9) 60%, transparent 90%);
            border-radius: 50%;
            box-shadow: 0 0 30px 10px rgba(255, 255, 255, 0.6);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="waveEffect"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uEnergyLevel;
        uniform float uShockStrength;
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying float vAlpha;
        varying float vShock; // Fragment Shader로 폭발 강도 전달

        void main() {
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 200.0 + 5000.0, 10000.0) - 5000.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float dist = distance(uExplosionCenter, screenPos);
            
            vAlpha = 0.2; // 기본 투명도

            // 응축 시 밝기 증폭
            float localEffect = exp(-dist * 5.0); 
            vAlpha += localEffect * uEnergyLevel * 3.0; 

            // 빅뱅 웅장함 업그레이드: 밀어내는 힘(Force) 1500.0으로 대폭 상향
            float pushForce = localEffect * uShockStrength * 1500.0; 
            vec2 direction = normalize(screenPos - uExplosionCenter);
            
            vec4 finalPosition = projectionMatrix * (mvPosition + vec4(direction * pushForce, pushForce * 0.1, 0.0));
            gl_Position = finalPosition;
            gl_PointSize = aSize; 
            
            vShock = uShockStrength * localEffect;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vAlpha;
        varying float vShock;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            // 폭발 순간 파티클 색상 변화: 하얀색에서 청백색(Cyan/Blue) 거성 느낌으로 전환
            vec3 baseColor = vec3(1.0, 1.0, 1.0);
            vec3 explosionColor = vec3(0.5, 0.8, 1.0); 
            vec3 finalColor = mix(baseColor, explosionColor, vShock * 2.0);
            
            gl_FragColor = vec4(finalColor, vAlpha + vShock); // 폭발 시 일시적으로 투명도 상승
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let waveEffect; 
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        
        let energyLevel = 0.0;    
        let shockStrength = 0.0;  
        let waveOpacity = 0.0; 
        let waveScale = 0.0;

        let isHolding = false;
        let lastHeldX = 0, lastHeldY = 0;

        const meteors = [];
        const PARTICLE_COUNT = 125000;
        const SPACE_RANGE = 10000;

        init();
        animate();

        function init() {
            waveEffect = document.getElementById('waveEffect');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                sizes[i] = Math.random() * 2.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uEnergyLevel: { value: 0.0 },     
                    uShockStrength: { value: 0.0 },   
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            createMeteors(10); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 

            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 

            window.addEventListener('resize', onWindowResize);
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            
            const meteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        function resetMeteor(meteor) {
            meteor.position.set(
                (Math.random() - 0.5) * 8000,
                (Math.random() - 0.5) * 6000,
                -4000 - Math.random() * 5000
            );
            
            meteor.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 80, 
                (Math.random() - 0.5) * 80 - 20, 
                150 + Math.random() * 200 
            );
            
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            targetX = mouseX * 400; 
            targetY = mouseY * 400;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            updateExplosionCenter(event.clientX, event.clientY); 
            if(isHolding) { 
                lastHeldX = event.clientX;
                lastHeldY = event.clientY;
            }
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                updateExplosionCenter(touch.clientX, touch.clientY); 
                if(isHolding) { 
                    lastHeldX = touch.clientX;
                    lastHeldY = touch.clientY;
                }
            }
        }

        function triggerHoldStart(clientX, clientY) {
            isHolding = true; 
            lastHeldX = clientX;
            lastHeldY = clientY;
            
            shockStrength = 0.0;   
        }

        function triggerHoldEnd() {
            isHolding = false; 
            shockStrength = 1.0; // 손을 뗄 때 빅뱅 트리거
        }

        function onMouseDown(event) { triggerHoldStart(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                event.preventDefault(); 
                triggerHoldStart(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            if (isHolding) {
                // 부드럽게 에너지가 차오르는 연출
                energyLevel += (1.0 - energyLevel) * 0.1; 
                shockStrength = 0.0; 
                
                // 크기가 미세하게 맥박침
                waveScale = 1.0 + Math.sin(time * 0.01) * 0.1; 
                waveOpacity = 1.0; 
            } else {
                // 손을 떼는 순간 웅장한 감쇄 효과 (감쇄 속도를 늦춰 거대한 느낌 강조)
                shockStrength *= 0.95;  
                energyLevel *= 0.90;    
                
                // 광선 레이어가 화면 전체를 덮을 정도로 거대하게 팽창
                waveScale += (60.0 - waveScale) * 0.05; 
                waveOpacity *= 0.93; 
            }

            particlesMaterial.uniforms.uEnergyLevel.value = energyLevel;
            particlesMaterial.uniforms.uShockStrength.value = shockStrength;
            particlesMaterial.uniforms.uTime.value = time * 0.001; 
            
            if(isHolding) {
                waveEffect.style.left = lastHeldX + 'px';
                waveEffect.style.top = lastHeldY + 'px';
            }

            if (isHolding || waveOpacity > 0.005) {
                waveEffect.style.transform = `translate(-50%, -50%) scale(${waveScale})`;
                waveEffect.style.opacity = waveOpacity;
            } else if (flashScale > 0) {
                flashScale = 0;
                flashEffect.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
