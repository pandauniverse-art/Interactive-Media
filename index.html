<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Epic Charging & Big Bang</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        #waveEffect {
            position: fixed;
            width: 15vmin; 
            height: 15vmin;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: screen; 
            /* 1. 전체 밝기 200% 증폭 및 코어 발광 추가 */
            filter: brightness(2.0);
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(150,220,255,0.8) 25%, transparent 60%);
            box-shadow: 0 0 60px 20px rgba(100, 200, 255, 0.6), 0 0 120px 40px rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }

        /* 2. 메인 광선 레이어 (정방향 회전, 속도 50% 감소) */
        #waveEffect::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                conic-gradient(from 15deg, rgba(200,230,255,0) 0%, rgba(200,230,255,1) 1%, rgba(200,230,255,0) 2.5%),
                conic-gradient(from 105deg, rgba(200,230,255,0) 0%, rgba(200,230,255,0.8) 1%, rgba(200,230,255,0) 2.5%),
                conic-gradient(from 195deg, rgba(200,230,255,0) 0%, rgba(200,230,255,1) 1%, rgba(200,230,255,0) 2.5%),
                conic-gradient(from 285deg, rgba(200,230,255,0) 0%, rgba(200,230,255,0.8) 1%, rgba(200,230,255,0) 2.5%),
                repeating-conic-gradient(from 0deg, rgba(200,230,255,0) 0deg, rgba(200,230,255,0.2) 0.5deg, rgba(200,230,255,0) 1.5deg);
            border-radius: 50%;
            mask-image: radial-gradient(circle, transparent 5%, black 25%, transparent 65%);
            -webkit-mask-image: radial-gradient(circle, transparent 5%, black 25%, transparent 65%);
            animation: spin 6s linear infinite; /* 3초에서 6초로 느려짐 */
        }

        /* 3. 서브 광선 레이어 (역방향 회전 추가로 화려함 대폭 상향) */
        #waveEffect::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                conic-gradient(from 45deg, rgba(150,255,255,0) 0%, rgba(150,255,255,0.7) 1%, rgba(150,255,255,0) 2%),
                conic-gradient(from 135deg, rgba(150,255,255,0) 0%, rgba(150,255,255,0.5) 1%, rgba(150,255,255,0) 2%),
                conic-gradient(from 225deg, rgba(150,255,255,0) 0%, rgba(150,255,255,0.7) 1%, rgba(150,255,255,0) 2%),
                conic-gradient(from 315deg, rgba(150,255,255,0) 0%, rgba(150,255,255,0.5) 1%, rgba(150,255,255,0) 2%),
                repeating-conic-gradient(from 0deg, rgba(200,255,255,0) 0deg, rgba(200,255,255,0.1) 1deg, rgba(200,255,255,0) 2.5deg);
            border-radius: 50%;
            mask-image: radial-gradient(circle, transparent 15%, black 40%, transparent 60%);
            -webkit-mask-image: radial-gradient(circle, transparent 15%, black 40%, transparent 60%);
            animation: spin-reverse 8s linear infinite; /* 반대로 천천히 회전 */
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
    </style>
</head>
<body>
    <div id="waveEffect"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uEnergyLevel;
        uniform float uShockStrength;
        uniform float uGatherStrength; 
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying float vAlpha;
        varying float vShock; 

        void main() {
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 200.0 + 5000.0, 10000.0) - 5000.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float dist = distance(uExplosionCenter, screenPos);
            
            vAlpha = 0.2; 

            // 파티클 밝기 대폭 증폭 (3.0 -> 6.0)
            float localEffect = exp(-dist * 5.0); 
            vAlpha += localEffect * uEnergyLevel * 6.0; 

            vec2 direction = normalize(screenPos - uExplosionCenter);
            vec2 swirl = vec2(-direction.y, direction.x); 
            
            float pullForce = localEffect * uGatherStrength * 250.0; 
            float pushForce = localEffect * uShockStrength * 1500.0; 

            vec2 movement = direction * (pushForce - pullForce) + swirl * (pullForce * 0.8);
            
            vec4 finalPosition = projectionMatrix * (mvPosition + vec4(movement, (pushForce - pullForce) * 0.1, 0.0));
            gl_Position = finalPosition;
            gl_PointSize = aSize; 
            
            vShock = uShockStrength * localEffect;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vAlpha;
        varying float vShock;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            vec3 baseColor = vec3(1.0, 1.0, 1.0);
            vec3 explosionColor = vec3(0.3, 0.9, 1.0); // 더 강렬한 Cyan/Blue 색상
            vec3 finalColor = mix(baseColor, explosionColor, vShock * 2.0);
            
            gl_FragColor = vec4(finalColor, vAlpha + vShock); 
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let waveEffect; 
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        
        let energyLevel = 0.0;    
        let shockStrength = 0.0;  
        let gatherStrength = 0.0; 
        let waveOpacity = 0.0; 
        let waveScale = 0.0;

        let isHolding = false;
        let holdStartTime = -1; 
        let lastHeldX = 0, lastHeldY = 0;

        const meteors = [];
        const PARTICLE_COUNT = 125000;
        const SPACE_RANGE = 10000;

        init();
        animate();

        function init() {
            waveEffect = document.getElementById('waveEffect');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                sizes[i] = Math.random() * 2.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uEnergyLevel: { value: 0.0 },     
                    uShockStrength: { value: 0.0 },   
                    uGatherStrength: { value: 0.0 },  
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            createMeteors(10); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 

            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 

            window.addEventListener('resize', onWindowResize);
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            
            const meteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        function resetMeteor(meteor) {
            meteor.position.set(
                (Math.random() - 0.5) * 8000,
                (Math.random() - 0.5) * 6000,
                -4000 - Math.random() * 5000
            );
            meteor.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 80, 
                (Math.random() - 0.5) * 80 - 20, 
                150 + Math.random() * 200 
            );
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            targetX = mouseX * 400; 
            targetY = mouseY * 400;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            updateExplosionCenter(event.clientX, event.clientY); 
            if(isHolding) { 
                lastHeldX = event.clientX;
                lastHeldY = event.clientY;
            }
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                updateExplosionCenter(touch.clientX, touch.clientY); 
                if(isHolding) { 
                    lastHeldX = touch.clientX;
                    lastHeldY = touch.clientY;
                }
            }
        }

        function triggerHoldStart(clientX, clientY) {
            isHolding = true; 
            holdStartTime = -1; 
            lastHeldX = clientX;
            lastHeldY = clientY;
            shockStrength = 0.0;   
        }

        function triggerHoldEnd() {
            isHolding = false; 
            holdStartTime = -1;
            shockStrength = 1.0; 
        }

        function onMouseDown(event) { triggerHoldStart(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                event.preventDefault(); 
                triggerHoldStart(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            if (isHolding) {
                if (holdStartTime < 0) holdStartTime = time;
                
                let holdDuration = (time - holdStartTime) / 1000.0;
                let progress = Math.min(holdDuration / 5.0, 1.0); 

                energyLevel = progress; 
                gatherStrength = progress; 
                shockStrength = 0.0; 
                
                waveScale = 0.5 + (progress * 2.5) + Math.sin(time * 0.02) * 0.1; 
                waveOpacity = 0.5 + (progress * 0.5); 
            } else {
                // 4. 속도 50% 감소: 팽창 및 페이드아웃을 훨씬 천천히 진행 (웅장함 강조)
                gatherStrength *= 0.9; 
                shockStrength *= 0.975; // 기존 0.95에서 수치 조정으로 감쇄 속도 저하
                energyLevel *= 0.95;    // 기존 0.90에서 수치 조정
                
                // 빛무리가 화면 전체를 천천히 삼키도록 목표 스케일 상향(100.0) 및 속도 저하(0.025)
                waveScale += (100.0 - waveScale) * 0.025; 
                waveOpacity *= 0.965; // 기존 0.93에서 페이드아웃 속도 저하
            }

            particlesMaterial.uniforms.uEnergyLevel.value = energyLevel;
            particlesMaterial.uniforms.uShockStrength.value = shockStrength;
            particlesMaterial.uniforms.uGatherStrength.value = gatherStrength;
            particlesMaterial.uniforms.uTime.value = time * 0.001; 
            
            if(isHolding) {
                waveEffect.style.left = lastHeldX + 'px';
                waveEffect.style.top = lastHeldY + 'px';
            }

            if (isHolding || waveOpacity > 0.005) {
                waveEffect.style.transform = `translate(-50%, -50%) scale(${waveScale})`;
                waveEffect.style.opacity = waveOpacity;
            } else if (waveScale > 0) {
                waveScale = 0;
                waveEffect.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
