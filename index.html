<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Explosion Media Art</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uExplosionTime;      // 폭발 강도 (0.0 ~ 1.0)
        uniform vec2 uExplosionCenter;      // 폭발 중심 (-1.0 ~ 1.0)
        attribute float aSize;

        varying vec2 vUv;
        varying float vDistanceFactor;

        void main() {
            vUv = uv;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            
            // 폭발 로직: 폭발 중심에서 멀어질수록 힘이 약해지는 둥근 힘장 계산
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float dist = distance(uExplosionCenter, screenPos);
            
            // 폭발 강도에 따라 파티클을 바깥으로 밀어냄
            vDistanceFactor = mix(1.0, 0.0, uExplosionTime); // 폭발 시간에 따라 서서히 사라짐
            float force = mix(1.0, 0.1, dist) * uExplosionTime * 50.0; // 힘의 세기 조절
            vec2 direction = normalize(screenPos - uExplosionCenter);
            
            // 최종 위치 계산: 기본 위치 + 폭발 오프셋
            vec4 finalPosition = projectionMatrix * (mvPosition + vec4(direction * force, 0.0, 0.0));
            gl_Position = finalPosition;
            gl_PointSize = aSize * (1.0 + uExplosionTime * 5.0); // 폭발 시 크기 확대
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vDistanceFactor;
        
        void main() {
            // 각 파티클을 둥글게 그리기
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            // 색상 설정: 폭발 시 입자가 더 밝게 빛나도록 vDistanceFactor 활용
            vec3 color = mix(vec3(0.0, 0.1, 0.3), vec3(1.0, 1.0, 1.0), vDistanceFactor); // 폭발 시 흰색으로
            gl_FragColor = vec4(color, vDistanceFactor); // 투명도 조절
        }
    </script>

    <script>
        let scene, camera, renderer, composer, bloomPass, particlesMaterial;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        let explosionTime = 0.0;
        const PARTICLE_COUNT = 500000; // 파티클 수 (50만 개)
        const BLOOM_INTENSITY_NORMAL = 0.5;
        const BLOOM_INTENSITY_EXPLOSION = 5.0; // 클릭 시 블룸 강도

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.z = 2000;

            // 3. 셰이더 파티클 시스템 생성
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(5000); // x
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(5000); // y
                positions[i * 3 + 2] = THREE.MathUtils.randFloatSpread(5000); // z
                sizes[i] = Math.random() * 2.0; // 크기
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            // 사용자 정의 셰이더 마테리얼 설정
            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uExplosionTime: { value: 0.0 },
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending, // 빛이 겹치도록 설정
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. 포스트 프로세싱 설정 (UnrealBloomPass)
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));

            bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                BLOOM_INTENSITY_NORMAL, // 강도
                0.4, // 반경
                0.85 // 임계값
            );
            composer.addPass(bloomPass);

            // 이벤트 리스너 등록
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onClick); // 마우스 클릭 이벤트
            
            document.addEventListener('touchstart', onTouchMove, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onClick, { passive: false }); // 터치 이벤트
            
            window.addEventListener('resize', onWindowResize);
        }

        // 마우스/터치 좌표 추적 및 좌표 정규화
        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            targetX = mouseX * 200;
            targetY = mouseY * 200;
            
            // 셰이더 유니폼에 정규화된 마우스 좌표 전달 (-1 ~ 1)
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { updateExplosionCenter(event.clientX, event.clientY); }
        function onTouchMove(event) { if (event.touches.length > 0) updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY); }

        // 클릭/터치 시 폭발 및 빛 효과 발동
        function onClick(event) {
            explosionTime = 1.0; // 폭발 강도 최대로 설정
            bloomPass.strength = BLOOM_INTENSITY_EXPLOSION; // 블룸 강도 최대로 설정
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight); // 포스트 프로세싱 크기 조정
        }

        function animate(time) {
            requestAnimationFrame(animate);

            // 카메라 움직임 보간
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            // 5. 폭발 및 블룸 효과 페이드아웃 계산
            explosionTime *= 0.95; // 폭발 시간 서서히 감소 (보간법)
            particlesMaterial.uniforms.uExplosionTime.value = explosionTime;
            particlesMaterial.uniforms.uTime.value = time * 0.001;
            
            // 블룸 강도 서서히 감소 (보간법)
            bloomPass.strength += (BLOOM_INTENSITY_NORMAL - bloomPass.strength) * 0.05;

            // renderer.render() 대신 composer.render() 호출
            composer.render();
        }
    </script>
</body>
</html>
