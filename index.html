<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive Cosmic Art</title>
    <style>
        /* touch-action: none; 으로 모바일 기본 스크롤 및 확대/축소 방지 */
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles;
        let targetX = 0, targetY = 0; // 마우스/터치 목표 좌표

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 500;

            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(2000));
                vertices.push(THREE.MathUtils.randFloatSpread(2000));
                vertices.push(THREE.MathUtils.randFloatSpread(2000));
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 2 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // PC 마우스 이벤트
            document.addEventListener('mousemove', onMouseMove);
            
            // 모바일 터치 이벤트 추가 (passive: false 설정으로 브라우저 기본 동작 제어)
            document.addEventListener('touchstart', onTouchMove, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            
            window.addEventListener('resize', onWindowResize);
        }

        // 마우스 좌표 계산
        function onMouseMove(event) {
            targetX = ((event.clientX - window.innerWidth / 2) / (window.innerWidth / 2)) * 200;
            targetY = -((event.clientY - window.innerHeight / 2) / (window.innerHeight / 2)) * 200;
        }

        // 터치 좌표 계산
        function onTouchMove(event) {
            // 터치 시 화면 스크롤 방지
            event.preventDefault(); 
            
            if (event.touches.length > 0) {
                targetX = ((event.touches[0].clientX - window.innerWidth / 2) / (window.innerWidth / 2)) * 200;
                targetY = -((event.touches[0].clientY - window.innerHeight / 2) / (window.innerHeight / 2)) * 200;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 부드러운 카메라 이동 (보간법)
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005; // 약간의 입체감을 위해 x축 회전 추가

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
