<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Event Horizon, Trails & The Void</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        #rayEffectGlow { position: fixed; width: 24vmin; height: 24vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 99; mix-blend-mode: screen; background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,1.0) 1deg, transparent 3deg, transparent 60deg), radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 40%, transparent 80%); border-radius: 50%; filter: blur(16px); box-shadow: 0 0 150px 80px rgba(100, 180, 255, 0.4); will-change: transform, opacity; }
        #rayEffect { position: fixed; width: 12vmin; height: 12vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 100; mix-blend-mode: screen; background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(200,230,255,0.9) 2deg, transparent 4deg, transparent 45deg), radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(150,200,255,0.8) 30%, transparent 70%); border-radius: 50%; filter: blur(2px); box-shadow: 0 0 75px 30px rgba(100, 200, 255, 0.8), 0 0 150px 60px rgba(255, 255, 255, 0.5); will-change: transform, opacity; }
        #rayEffectOverlay { position: fixed; width: 12vmin; height: 12vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 101; mix-blend-mode: screen; background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,1.0) 1deg, transparent 3deg, transparent 60deg), radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 40%, transparent 80%); border-radius: 50%; filter: blur(4px); box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.7); will-change: transform, opacity, box-shadow; }
        #rayEffectCondensed { position: fixed; width: 14vmin; height: 14vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 102; mix-blend-mode: screen; background: radial-gradient(circle, #ffffff 10%, #dcf0ff 50%, transparent 80%); border-radius: 50%; filter: blur(2px) brightness(3.0); box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.9), 0 0 200px 80px rgba(0, 170, 255, 0.6); will-change: transform, opacity; }
        
        .burst-effect { position: fixed; width: 0vmin; height: 0vmin; --max-size: 40vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 103; mix-blend-mode: screen; background-image: url('image_1.png'); background-size: contain; background-repeat: no-repeat; background-position: center; filter: brightness(2.0); will-change: transform, opacity, width, height; }
        .shockwave-effect { position: fixed; width: 0vmin; height: 0vmin; --max-size: 150vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 104; mix-blend-mode: overlay; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3); background: radial-gradient(circle, transparent 70%, rgba(255, 255, 255, 0.1) 80%, transparent 90%); box-shadow: 0 0 100px 20px rgba(255, 255, 255, 0.2); backdrop-filter: blur(6px) brightness(1.2); will-change: transform, opacity, width, height; }
        .fast-shockwave-effect { position: fixed; width: 0vmin; height: 0vmin; --max-size: 150vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 105; mix-blend-mode: overlay; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 0 50px 10px rgba(255, 255, 255, 0.3); backdrop-filter: blur(2px) brightness(1.4); will-change: transform, opacity, width, height; }
        .flash-effect { position: fixed; width: 300vmin; height: 300vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 106; mix-blend-mode: screen; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,1) 10%, rgba(100,180,255,0.5) 30%, transparent 70%); filter: blur(10px) brightness(3.0); will-change: transform, opacity; }
    </style>
</head>
<body>
    <div id="rayEffectGlow"></div>
    <div id="rayEffect"></div>
    <div id="rayEffectOverlay"></div>
    <div id="rayEffectCondensed"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="bgVertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uGatherProgress; 
        uniform vec2 uExplosionCenter;
        uniform float uDistortion; // 1. 왜곡 강도 유니폼 추가
        attribute float aSize;
        varying float vAlpha;
        varying vec3 vColor; 

        void main() {
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 15.0 + 5000.0, 10000.0) - 5000.0;
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            
            vec2 targetMvXy = uExplosionCenter * abs(mvPosition.z) * 0.8; 
            vec2 mvDirToCenter = targetMvXy - mvPosition.xy;
            float mvDist = length(mvDirToCenter);
            vec2 mvDirNorm = mvDist > 0.001 ? (mvDirToCenter / mvDist) : vec2(0.0);

            float phase = fract(uTime * 0.1 + aSize * 15.0); 
            float easePhase = phase * phase; 
            float powerProgress = pow(uGatherProgress, 3.0);

            vec2 gatherMove = mvDirToCenter * easePhase * powerProgress;
            vec2 mvSwirl = vec2(-mvDirNorm.y, mvDirNorm.x) * mvDist * sin(phase * 3.14) * powerProgress * 2.25;

            mvPosition.xy += gatherMove + mvSwirl;
            mvPosition.z -= easePhase * 2400.0 * powerProgress; 

            // 1. [이벤트 호라이즌 연출] 에너지가 응축될 때, 빛이 휘어지듯 파티클을 강하게 빨아들이는 중력 렌즈 효과
            float lensEffect = exp(-mvDist * 0.0005) * uDistortion * 2000.0;
            mvPosition.xy += mvDirNorm * lensEffect; 

            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aSize; 
            
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float distToCenter = distance(uExplosionCenter, screenPos);
            float localEffect = exp(-distToCenter * 3.3);

            vAlpha = 0.3 + (localEffect * uGatherProgress * 3.0); 

            vec3 color1 = vec3(0.8, 0.2, 1.0); 
            vec3 color2 = vec3(0.0, 0.9, 0.8); 
            vec3 color3 = vec3(0.1, 0.3, 1.0); 
            
            float mixVal = smoothstep(-1.0, 1.0, sin(position.x * 0.0005) * cos(position.y * 0.0005));
            vec3 targetColor = mix(color1, color2, mixVal);
            targetColor = mix(targetColor, color3, sin(position.z * 0.001) * 0.5 + 0.5);

            vColor = mix(vec3(3.0), targetColor * 4.0, clamp(uGatherProgress * localEffect * 2.0, 0.0, 1.0));
        }
    </script>

    <script id="bgFragmentShader" type="x-shader/x-fragment">
        uniform float uBlackout; // 2. 암전 상태 제어 유니폼
        varying float vAlpha;
        varying vec3 vColor; 
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            // 2. [암전 연출] uBlackout 값에 따라 배경 파티클의 투명도를 0으로 만듦
            gl_FragColor = vec4(vColor, vAlpha * (1.0 - uBlackout)); 
        }
    </script>

    <script id="burstVertexShader" type="x-shader/x-vertex">
        uniform float uBurstTime;
        uniform float uBurstPower; 
        uniform vec2 uBurstCenter;
        attribute vec3 aVelocity;
        attribute float aSize;
        varying float vBurstAlpha;

        void main() {
            vec3 finalPos = position + aVelocity * uBurstTime * 400.0 * uBurstPower;
            vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
            mvPosition.xy += uBurstCenter * 2000.0; 

            gl_Position = projectionMatrix * mvPosition;
            float progress = smoothstep(0.0, 12.0, uBurstTime); 
            gl_PointSize = aSize * (1.0 - progress); 
            vBurstAlpha = 1.0 - progress; 
        }
    </script>

    <script id="burstFragmentShader" type="x-shader/x-fragment">
        varying float vBurstAlpha;
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5 || vBurstAlpha <= 0.0) discard;
            vec3 coreColor = vec3(1.0, 1.0, 1.0);
            vec3 edgeColor = vec3(0.3, 0.8, 1.0);
            vec3 color = mix(edgeColor, coreColor, vBurstAlpha);
            gl_FragColor = vec4(color, vBurstAlpha);
        }
    </script>

    <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        const Q_MULT = isMobile ? 0.33 : 1.0; 

        let chargeAudio = new Audio('charge.mp3'); chargeAudio.loop = true;
        let glitchAudio = new Audio('glitch.mp3'); glitchAudio.loop = true;

        let scene, camera, renderer;
        let bgParticlesMaterial, bgParticles;
        let rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed; 
        
        // 3. 라이트 트레일(잔상) 처리를 위한 전용 씬과 카메라 선언
        let fadeScene, fadeCamera, fadePlane; 
        
        let mouseX = 0, mouseY = 0;
        let isHolding = false;
        let lastHeldX = window.innerWidth / 2;
        let lastHeldY = window.innerHeight / 2;
        
        let targetProgress = 0.0;
        let currentProgress = 0.0; 
        let explosionBrightness = 2.0; 

        let holdTime = 0.0; 
        let lastFrameTime = performance.now();
        let rotAngle1 = 0, rotAngle2 = 0;
        
        // 블랙아웃(암전) 제어 변수
        let uBlackoutValue = 0.0;

        let mouseGlow; 

        const BG_PARTICLE_COUNT = Math.floor(160000 * Q_MULT); 
        const BURST_PARTICLE_COUNT = Math.floor(80000 * Q_MULT); 
        const SPACE_RANGE = 10000;
        
        const meteors = [];         
        const chargingMeteors = []; 
        const condenseMeteors = []; 
        
        const maxChargingMeteors = Math.floor(400 * Q_MULT);
        const maxCondenseMeteors = Math.floor(800 * Q_MULT); 
        const maxBurstMeteors = Math.floor(1800 * Q_MULT);
        const startChargingMeteors = Math.floor(50 * Q_MULT);
        const chargingMeteorRange = maxChargingMeteors - startChargingMeteors;

        const MAX_BURSTS = 3; 
        const burstPool = [];
        let currentBurstIndex = 0;

        init();
        animate();

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
            gradient.addColorStop(0.2, 'rgba(200, 230, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(100, 180, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            rayEffectGlow = document.getElementById('rayEffectGlow');
            rayEffect = document.getElementById('rayEffect');
            rayEffectOverlay = document.getElementById('rayEffectOverlay'); 
            rayEffectCondensed = document.getElementById('rayEffectCondensed');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const bgGeom = new THREE.BufferGeometry();
            const bgPos = new Float32Array(BG_PARTICLE_COUNT * 3);
            const bgSizes = new Float32Array(BG_PARTICLE_COUNT);

            for (let i = 0; i < BG_PARTICLE_COUNT; i++) {
                bgPos[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                bgPos[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                bgPos[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                bgSizes[i] = Math.random() * (isMobile ? 3.0 : 2.0); 
            }
            bgGeom.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
            bgGeom.setAttribute('aSize', new THREE.BufferAttribute(bgSizes, 1));

            bgParticlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uGatherProgress: { value: 0.0 },  
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) },
                    uDistortion: { value: 0.0 }, // 추가된 유니폼
                    uBlackout: { value: 0.0 }    // 추가된 유니폼
                },
                vertexShader: document.getElementById('bgVertexShader').textContent,
                fragmentShader: document.getElementById('bgFragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });
            bgParticles = new THREE.Points(bgGeom, bgParticlesMaterial);
            scene.add(bgParticles);

            createMeteors(Math.floor(300 * Q_MULT));
            createChargingMeteors(maxChargingMeteors);
            createCondenseMeteors(maxCondenseMeteors); 

            for(let i = 0; i < MAX_BURSTS; i++) {
                createBurstInstance();
            }

            const glowTex = createGlowTexture();
            const glowMat = new THREE.SpriteMaterial({ map: glowTex, color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthTest: false });
            mouseGlow = new THREE.Sprite(glowMat);
            mouseGlow.scale.set(150, 150, 1); 
            scene.add(mouseGlow);

            // 3. [잔상 효과 셋업] 반투명한 검은색 쿼드를 전체 화면에 덮어 이전 프레임을 서서히 지움
            fadeScene = new THREE.Scene();
            fadeCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const fadeMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35, depthTest: false, depthWrite: false });
            fadePlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fadeMat);
            fadeScene.add(fadePlane);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            // 자동 지우기 방지 -> 렌더링된 픽셀이 캔버스에 누적되게 함 (잔상 발생)
            renderer.autoClearColor = false; 
            renderer.setClearColor(0x000000, 1);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2.0));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 
            window.addEventListener('resize', onWindowResize);
        }

        function createBurstInstance() {
            const burstDiv = document.createElement('div');
            burstDiv.className = 'burst-effect';
            document.body.appendChild(burstDiv);

            const shockwaveDiv = document.createElement('div');
            shockwaveDiv.className = 'shockwave-effect';
            document.body.appendChild(shockwaveDiv);

            const fastShockwaveDiv = document.createElement('div');
            fastShockwaveDiv.className = 'fast-shockwave-effect';
            document.body.appendChild(fastShockwaveDiv);

            const flashDiv = document.createElement('div');
            flashDiv.className = 'flash-effect';
            document.body.appendChild(flashDiv);

            const burstGeom = new THREE.BufferGeometry();
            const burstPos = new Float32Array(BURST_PARTICLE_COUNT * 3);
            const burstVel = new Float32Array(BURST_PARTICLE_COUNT * 3);
            const burstSizes = new Float32Array(BURST_PARTICLE_COUNT);

            for (let i = 0; i < BURST_PARTICLE_COUNT; i++) {
                burstPos[i * 3] = 0; burstPos[i * 3 + 1] = 0; burstPos[i * 3 + 2] = 0;
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                const speed = 0.5 + Math.random() * 1.5;
                burstVel[i * 3] = Math.sin(phi) * Math.cos(theta) * speed;
                burstVel[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * speed;
                burstVel[i * 3 + 2] = Math.cos(phi) * speed;
                burstSizes[i] = (1.0 + Math.random() * 4.0) / 3.0; 
            }
            burstGeom.setAttribute('position', new THREE.BufferAttribute(burstPos, 3));
            burstGeom.setAttribute('aVelocity', new THREE.BufferAttribute(burstVel, 3));
            burstGeom.setAttribute('aSize', new THREE.BufferAttribute(burstSizes, 1));

            const particlesMat = new THREE.ShaderMaterial({
                uniforms: { uBurstTime: { value: 0.0 }, uBurstCenter: { value: new THREE.Vector2(0, 0) }, uBurstPower: { value: 1.0 } },
                vertexShader: document.getElementById('burstVertexShader').textContent,
                fragmentShader: document.getElementById('burstFragmentShader').textContent,
                blending: THREE.AdditiveBlending, depthTest: false, transparent: true, visible: false 
            });
            const particlesMesh = new THREE.Points(burstGeom, particlesMat);
            scene.add(particlesMesh);

            const meteorGeom = new THREE.CylinderGeometry(2, 0.2, 1200, 3);
            meteorGeom.rotateX(Math.PI / 2); meteorGeom.translate(0, 0, 600); 
            const meteorMat = new THREE.MeshBasicMaterial({ color: 0xffddaa, transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending, depthTest: false });

            const meteorsArr = [];
            for(let i = 0; i < maxBurstMeteors; i++) {
                const meteor = new THREE.Mesh(meteorGeom, meteorMat);
                meteor.scale.z = 0.001; meteor.visible = false; 
                scene.add(meteor);
                meteorsArr.push(meteor);
            }

            let burstAudio = new Audio('explosion.mp3');

            burstPool.push({
                active: false, time: 0.0,
                burstDiv: burstDiv, shockwaveDiv: shockwaveDiv, fastShockwaveDiv: fastShockwaveDiv, flashDiv: flashDiv, 
                particlesMat: particlesMat, particlesMesh: particlesMesh, meteorMat: meteorMat, meteors: meteorsArr, audio: burstAudio
            });
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            const meteorMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthTest: false });
            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        function resetMeteor(meteor) {
            meteor.position.set((Math.random() - 0.5) * 6000, (Math.random() - 0.5) * 4000, -2000 - Math.random() * 4000);
            meteor.userData.velocity = new THREE.Vector3((Math.random() - 0.5) * 2.4, (Math.random() - 0.5) * 2.4 - 0.4, 8 + Math.random() * 8);
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function createChargingMeteors(count) {
            const geom = new THREE.CylinderGeometry(0.8, 0.1, 1500, 3); geom.rotateX(Math.PI / 2); 
            for(let i = 0; i < count; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending, depthTest: false });
                const meteor = new THREE.Mesh(geom, mat);
                meteor.userData.active = false;
                scene.add(meteor);
                chargingMeteors.push(meteor);
            }
        }

        function createCondenseMeteors(count) {
            for(let i = 0; i < count; i++) {
                let isParticle = Math.random() > 0.5;
                let length = isParticle ? 50 : 2000;
                let radius = isParticle ? 4.0 : 1.2;
                const geom = new THREE.CylinderGeometry(radius, radius*0.2, length, 3); geom.rotateX(Math.PI / 2); 
                let color = Math.random() > 0.5 ? 0xffffff : 0x88ddff; 
                const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending, depthTest: false });
                const meteor = new THREE.Mesh(geom, mat);
                meteor.userData.active = false;
                scene.add(meteor);
                condenseMeteors.push(meteor);
            }
        }

        function resetChargingMeteor(meteor, targetPos) {
            const theta = Math.random() * Math.PI * 2;
            const radius = 3500 + Math.random() * 2000; 
            const zDist = (Math.random() - 0.5) * 4000;
            meteor.position.set(targetPos.x + Math.cos(theta) * radius, targetPos.y + Math.sin(theta) * radius, targetPos.z + zDist);
            const dir = new THREE.Vector3().subVectors(targetPos, meteor.position).normalize();
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);
            meteor.userData.direction = dir;
            meteor.userData.speed = 40 + Math.random() * 60; 
        }

        function resetCondenseMeteor(meteor, targetPos) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2.0 * Math.random() - 1.0); 
            const radius = 4000 + Math.random() * 3000; 
            meteor.position.set(targetPos.x + Math.sin(phi) * Math.cos(theta) * radius, targetPos.y + Math.sin(phi) * Math.sin(theta) * radius, targetPos.z + Math.cos(phi) * radius);
            let originalSpeed = 150 + Math.random() * 200; 
            let speedMultiplier = 0.4 + Math.random() * 0.1; 
            meteor.userData.speed = originalSpeed * speedMultiplier; 
        }

        function getMouse3DTarget() {
            let vec = new THREE.Vector3(mouseX, mouseY, 0.5);
            vec.unproject(camera);
            let dir = vec.sub(camera.position).normalize();
            let dist = -camera.position.z / dir.z; 
            return camera.position.clone().add(dir.multiplyScalar(dist));
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            bgParticlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            if(isHolding) { lastHeldX = event.clientX; lastHeldY = event.clientY; }
            updateExplosionCenter(event.clientX, event.clientY); 
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                if(isHolding) { lastHeldX = touch.clientX; lastHeldY = touch.clientY; }
                updateExplosionCenter(touch.clientX, touch.clientY); 
            }
        }

        function triggerHoldStart(clientX, clientY) {
            isHolding = true; 
            targetProgress = 1.0;
            holdTime = 0.0; 
            lastHeldX = clientX;
            lastHeldY = clientY;
            updateExplosionCenter(clientX, clientY);

            chargeAudio.currentTime = 0;
            chargeAudio.play().catch(e => console.log("사운드 대기"));
        }

        function triggerHoldEnd() {
            if (isHolding) { 
                isHolding = false; 
                targetProgress = 0.0;

                chargeAudio.pause();
                glitchAudio.pause();
                glitchAudio.currentTime = 0;
                
                // 폭발 순간, 암전 효과를 즉시 해제하여 완벽한 대비 형성!
                uBlackoutValue = 0.0; 
                
                if(currentProgress > 0.05) { 
                    let condenseProgress = Math.max(0.0, Math.min(1.0, (holdTime - 6.0) / 3.0));
                    let burstIntensity = Math.max(0.05, currentProgress) + condenseProgress * 1.5; 

                    explosionBrightness = Math.max(240.0 * burstIntensity, explosionBrightness * 2.0); 

                    const burst = burstPool[currentBurstIndex];
                    currentBurstIndex = (currentBurstIndex + 1) % MAX_BURSTS; 

                    burst.active = true;
                    burst.time = 0.0;
                    
                    burst.audio.currentTime = 0;
                    burst.audio.volume = Math.min(1.0, Math.max(0.1, burstIntensity / 2.5));
                    burst.audio.play().catch(e => console.log("폭발 대기"));

                    burst.particlesMesh.visible = true;
                    burst.particlesMat.uniforms.uBurstCenter.value.set(mouseX, mouseY);
                    burst.particlesMat.uniforms.uBurstPower.value = Math.max(0.2, burstIntensity); 

                    const flash = burst.flashDiv;
                    flash.style.transition = 'none';
                    flash.style.transform = `translate(-50%, -50%) scale(${Math.max(0.2, burstIntensity * 0.1)})`;
                    flash.style.opacity = String(Math.min(1.0, burstIntensity * 1.5));
                    flash.style.left = lastHeldX + 'px';
                    flash.style.top = lastHeldY + 'px';
                    void flash.offsetWidth; 
                    flash.style.transition = 'transform 0.15s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 3.0s ease-out';
                    flash.style.transform = `translate(-50%, -50%) scale(${Math.max(0.5, burstIntensity)})`;
                    flash.style.opacity = '0';

                    burst.burstDiv.style.transition = 'none';
                    burst.burstDiv.style.transform = 'translate(-50%, -50%) scale(0)';
                    burst.burstDiv.style.opacity = '1';
                    burst.burstDiv.style.left = lastHeldX + 'px';
                    burst.burstDiv.style.top = lastHeldY + 'px';
                    burst.burstDiv.style.width = `calc(var(--max-size) * ${burstIntensity})`;
                    burst.burstDiv.style.height = `calc(var(--max-size) * ${burstIntensity})`;
                    void burst.burstDiv.offsetWidth; 
                    burst.burstDiv.style.transition = 'width 0.8s ease-out, height 0.8s ease-out, transform 0.8s ease-out, opacity 0.8s ease-in';
                    burst.burstDiv.style.transform = 'translate(-50%, -50%) scale(1)';
                    burst.burstDiv.style.opacity = '0'; 

                    burst.shockwaveDiv.style.transition = 'none';
                    burst.shockwaveDiv.style.transform = 'translate(-50%, -50%) scale(0)';
                    burst.shockwaveDiv.style.opacity = '1';
                    burst.shockwaveDiv.style.left = lastHeldX + 'px';
                    burst.shockwaveDiv.style.top = lastHeldY + 'px';
                    burst.shockwaveDiv.style.width = `calc(var(--max-size) * ${burstIntensity})`;
                    burst.shockwaveDiv.style.height = `calc(var(--max-size) * ${burstIntensity})`;
                    void burst.shockwaveDiv.offsetWidth; 
                    burst.shockwaveDiv.style.transition = 'width 15.0s cubic-bezier(0.1, 0.8, 0.2, 1), height 15.0s cubic-bezier(0.1, 0.8, 0.2, 1), transform 15.0s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 15.0s ease-out';
                    burst.shockwaveDiv.style.transform = 'translate(-50%, -50%) scale(1)';
                    burst.shockwaveDiv.style.opacity = '0'; 

                    const fastShockwave = burst.fastShockwaveDiv;
                    fastShockwave.style.transition = 'none';
                    fastShockwave.style.transform = 'translate(-50%, -50%) scale(0)';
                    fastShockwave.style.opacity = '1';
                    fastShockwave.style.left = lastHeldX + 'px';
                    fastShockwave.style.top = lastHeldY + 'px';
                    fastShockwave.style.width = `calc(var(--max-size) * ${burstIntensity})`;
                    fastShockwave.style.height = `calc(var(--max-size) * ${burstIntensity})`;
                    
                    setTimeout(() => {
                        void fastShockwave.offsetWidth;
                        fastShockwave.style.transition = 'width 7.5s cubic-bezier(0.1, 0.8, 0.2, 1), height 7.5s cubic-bezier(0.1, 0.8, 0.2, 1), transform 7.5s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 7.5s ease-out';
                        fastShockwave.style.transform = 'translate(-50%, -50%) scale(1)';
                        fastShockwave.style.opacity = '0';
                    }, 150);

                    const burstTarget3D = getMouse3DTarget();
                    burst.meteorMat.opacity = 1.0; 

                    const activeMeteorCount = Math.min(burst.meteors.length, Math.floor(burst.meteors.length * burstIntensity));

                    burst.meteors.forEach((meteor, index) => {
                        if (index < activeMeteorCount) {
                            meteor.visible = true;
                            meteor.position.copy(burstTarget3D);
                            meteor.scale.set(1, 1, 0.001); 
                            
                            const u = Math.random();
                            const v = Math.random();
                            const theta = u * 2.0 * Math.PI;
                            const phi = Math.acos(2.0 * v - 1.0);
                            
                            const baseSpeed = 2.25 + Math.random() * 3.75; 
                            const speed = baseSpeed * Math.max(0.2, burstIntensity); 

                            const vx = Math.sin(phi) * Math.cos(theta) * speed;
                            const vy = Math.sin(phi) * Math.sin(theta) * speed;
                            const vz = Math.cos(phi) * speed;

                            const vel = new THREE.Vector3(vx, vy, vz);
                            meteor.userData.velocity = vel;
                            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), vel.clone().normalize());
                        } else {
                            meteor.visible = false; 
                        }
                    });
                }
            }
        }

        function onMouseDown(event) { triggerHoldStart(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                event.preventDefault(); 
                triggerHoldStart(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            let dt = (time - lastFrameTime) / 1000.0;
            if (dt > 0.1 || isNaN(dt)) dt = 0.016; 
            lastFrameTime = time;

            if (isHolding) {
                holdTime += dt;
            }

            rotAngle1 += 30 * dt; 
            rotAngle2 -= 45 * dt;

            // 4. [암전 연출] 8초 이상 유지 시 화면의 모든 에너지를 먹어치움
            let isVoid = isHolding && holdTime > 8.0;
            let blackoutTarget = isVoid ? 1.0 : 0.0;
            uBlackoutValue += (blackoutTarget - uBlackoutValue) * 0.15; // 부드럽게 암전 진입
            let globalAlpha = 1.0 - uBlackoutValue;

            let mousePos3D = new THREE.Vector3(mouseX, mouseY, 0.5); 
            mousePos3D.unproject(camera); 
            let dir = mousePos3D.sub(camera.position).normalize(); 
            let distance = (1000 - camera.position.z) / dir.z; 
            let finalPos = camera.position.clone().add(dir.multiplyScalar(distance)); 
            
            let isGlitching = false;
            let glitchIntensity = 0.0;
            let shake = 0.0;
            
            let condenseProgressRaw = 0.0;
            if (isHolding && holdTime > 6.0) {
                condenseProgressRaw = Math.min(1.0, (holdTime - 6.0) / 3.0);
            }
            
            let smoothCondense = condenseProgressRaw * condenseProgressRaw * (3 - 2 * condenseProgressRaw);
            let scaleMultiplier = 1.0 - (0.4 * smoothCondense);

            if (isHolding) {
                if (holdTime > 4.8 && holdTime <= 6.0) {
                    isGlitching = true;
                    glitchIntensity = (holdTime - 4.8) / 1.2; 
                } else if (holdTime > 6.0) {
                    isGlitching = true;
                    glitchIntensity = 1.0 + smoothCondense; 
                }
            }

            if (isGlitching) {
                shake = glitchIntensity * 40.0 * globalAlpha; // 암전 시 떨림도 고요해짐
                scene.position.x = (Math.random() - 0.5) * shake;
                scene.position.y = (Math.random() - 0.5) * shake;
                
                mouseGlow.material.opacity = (0.3 + Math.random() * 0.7) * globalAlpha;
                let scale = 150 + (Math.random() - 0.5) * 80 * glitchIntensity;
                mouseGlow.scale.set(scale, scale, 1);
                
                let glitchOffset = (Math.random() - 0.5) * 60 * glitchIntensity;
                rayEffectOverlay.style.boxShadow = `${glitchOffset}px 0px 0px rgba(255, 0, 100, 0.8), ${-glitchOffset}px 0px 0px rgba(0, 255, 255, 0.8), 0 0 100px 50px rgba(255, 255, 255, 0.7)`;
            } else {
                scene.position.x += (0 - scene.position.x) * 0.1;
                scene.position.y += (0 - scene.position.y) * 0.1;
                
                mouseGlow.material.opacity = 0.8 * globalAlpha;
                mouseGlow.scale.set(150, 150, 1);
                rayEffectOverlay.style.boxShadow = `0 0 100px 50px rgba(255, 255, 255, 0.7)`;
            }
            
            mouseGlow.position.copy(finalPos); 

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            const mouseTarget3D = getMouse3DTarget();
            const activeChargingLimit = Math.floor(startChargingMeteors + (chargingMeteorRange * currentProgress));

            chargingMeteors.forEach((meteor, index) => {
                if (isHolding && index < activeChargingLimit) {
                    if (!meteor.userData.active) {
                        resetChargingMeteor(meteor, mouseTarget3D);
                        meteor.userData.active = true;
                        meteor.material.opacity = 0.2 * globalAlpha; 
                    }
                    if(meteor.material.opacity < 1.0 * globalAlpha) {
                        meteor.material.opacity = Math.min(1.0 * globalAlpha, meteor.material.opacity + 0.02);
                    }
                    const dirCharging = new THREE.Vector3().subVectors(mouseTarget3D, meteor.position).normalize();
                    meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dirCharging);
                    
                    let speedMult = 1.0 + (smoothCondense * 3.0);
                    meteor.position.add(dirCharging.multiplyScalar(meteor.userData.speed * speedMult));

                    if (meteor.position.distanceTo(mouseTarget3D) < 200) {
                        resetChargingMeteor(meteor, mouseTarget3D);
                    }
                } else {
                    meteor.material.opacity = Math.max(meteor.material.opacity - 0.1, 0.0);
                    if (meteor.material.opacity <= 0) {
                        meteor.userData.active = false;
                    }
                }
            });

            condenseMeteors.forEach((meteor, index) => {
                if (isHolding && smoothCondense > 0.0) {
                    let activeCount = Math.floor(maxCondenseMeteors * smoothCondense);
                    if (index < activeCount) {
                        if (!meteor.userData.active) {
                            resetCondenseMeteor(meteor, mouseTarget3D);
                            meteor.userData.active = true;
                            meteor.material.opacity = 0.0;
                        }
                        meteor.material.opacity = Math.min(1.0 * globalAlpha, meteor.material.opacity + 0.05);
                        
                        const dir = new THREE.Vector3().subVectors(mouseTarget3D, meteor.position).normalize();
                        meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);
                        meteor.position.add(dir.multiplyScalar(meteor.userData.speed));

                        if (meteor.position.distanceTo(mouseTarget3D) < 300) {
                            resetCondenseMeteor(meteor, mouseTarget3D);
                        }
                    } else {
                        meteor.material.opacity = Math.max(meteor.material.opacity - 0.1, 0.0);
                        if (meteor.material.opacity <= 0) meteor.userData.active = false;
                    }
                } else {
                    meteor.material.opacity = Math.max(meteor.material.opacity - 0.1, 0.0);
                    if (meteor.material.opacity <= 0) meteor.userData.active = false;
                }
            });

            burstPool.forEach(burst => {
                if (burst.active) {
                    burst.time += 0.016;
                    burst.particlesMat.uniforms.uBurstTime.value = burst.time;

                    if (burst.time < 6.0) {
                        burst.meteorMat.opacity = 1.0 - (burst.time / 6.0);
                        burst.meteors.forEach(meteor => {
                            if (meteor.visible) {
                                meteor.scale.z = Math.min(1.0, meteor.scale.z + 0.03); 
                                meteor.position.add(meteor.userData.velocity);
                            }
                        });
                    }

                    if (burst.time > 12.0) {
                        burst.active = false;
                        burst.particlesMesh.visible = false;
                    }
                }
            });

            let easing = isHolding ? 0.005 : 0.02; 
            currentProgress += (targetProgress - currentProgress) * easing;
            
            let finalScale = currentProgress * scaleMultiplier;

            bgParticlesMaterial.uniforms.uGatherProgress.value = currentProgress;
            bgParticlesMaterial.uniforms.uTime.value = time * 0.001; 
            
            // 쉐이더로 왜곡(사건의 지평선) 및 암전 값 전달
            bgParticlesMaterial.uniforms.uDistortion.value = smoothCondense;
            bgParticlesMaterial.uniforms.uBlackout.value = uBlackoutValue;

            if (isHolding) {
                explosionBrightness = (2.0 + Math.pow(currentProgress, 5.0) * 158.0 + (smoothCondense * 300.0)) * globalAlpha; 
            } else {
                explosionBrightness = Math.max(2.0, explosionBrightness * 0.96);
            }
            
            rayEffectGlow.style.left = lastHeldX + 'px';
            rayEffectGlow.style.top = lastHeldY + 'px';
            rayEffect.style.left = lastHeldX + 'px';
            rayEffect.style.top = lastHeldY + 'px';
            rayEffectOverlay.style.left = lastHeldX + 'px';
            rayEffectOverlay.style.top = lastHeldY + 'px';
            rayEffectCondensed.style.left = lastHeldX + 'px';
            rayEffectCondensed.style.top = lastHeldY + 'px';

            if (finalScale > 0.01) {
                rayEffectGlow.style.transform = `translate(-50%, -50%) scale(${finalScale}) rotate(${rotAngle1 * 0.5}deg)`;
                rayEffectGlow.style.opacity = currentProgress * globalAlpha; 
                rayEffectGlow.style.filter = `blur(16px) brightness(${explosionBrightness})`; 
                
                rayEffect.style.transform = `translate(-50%, -50%) scale(${finalScale}) rotate(${rotAngle1}deg)`;
                rayEffect.style.opacity = currentProgress * globalAlpha;
                rayEffect.style.filter = `blur(2px) brightness(${explosionBrightness})`; 
                
                rayEffectOverlay.style.transform = `translate(-50%, -50%) scale(${finalScale}) rotate(${rotAngle2}deg)`;
                rayEffectOverlay.style.opacity = currentProgress * globalAlpha; 
                rayEffectOverlay.style.filter = `blur(4px) brightness(${explosionBrightness * 1.5})`; 

                rayEffectCondensed.style.transform = `translate(-50%, -50%) scale(${finalScale}) rotate(${rotAngle1 * 2.0}deg)`;
                rayEffectCondensed.style.opacity = smoothCondense * globalAlpha; 
                rayEffectCondensed.style.filter = `blur(${2 + smoothCondense * 2}px) brightness(${explosionBrightness * 2.0})`;
            } else {
                rayEffectGlow.style.transform = `translate(-50%, -50%) scale(0)`;
                rayEffect.style.transform = `translate(-50%, -50%) scale(0)`;
                rayEffectOverlay.style.transform = `translate(-50%, -50%) scale(0)`;
                rayEffectCondensed.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            // --- 잔상(라이트 트레일) 렌더링 파트 ---
            // Z파이팅 방지를 위해 깊이 버퍼만 클리어 후, 반투명 검정 쿼드를 그려 이전 프레임을 서서히 덮습니다.
            renderer.clearDepth(); 
            renderer.render(fadeScene, fadeCamera); 
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
