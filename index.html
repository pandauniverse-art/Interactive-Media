<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Inward Shockwave & Ultimate Burst</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        /* 코어 이펙트 레이어 */
        #rayEffectGlow, #rayEffect, #rayEffectOverlay, #rayEffectCondensed {
            position: fixed; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; border-radius: 50%; will-change: transform, opacity, box-shadow;
        }
        #rayEffectGlow { width: 24vmin; height: 24vmin; z-index: 99; mix-blend-mode: screen; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 40%, transparent 80%); filter: blur(16px); box-shadow: 0 0 150px 80px rgba(100, 180, 255, 0.4); }
        #rayEffect { width: 12vmin; height: 12vmin; z-index: 100; mix-blend-mode: screen; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(150,200,255,0.8) 30%, transparent 70%); filter: blur(2px); box-shadow: 0 0 75px 30px rgba(100, 200, 255, 0.8), 0 0 150px 60px rgba(255, 255, 255, 0.5); }
        #rayEffectOverlay { width: 12vmin; height: 12vmin; z-index: 101; mix-blend-mode: screen; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 40%, transparent 80%); filter: blur(4px); box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.7); }
        #rayEffectCondensed { width: 14vmin; height: 14vmin; z-index: 102; mix-blend-mode: screen; background: radial-gradient(circle, #ffffff 10%, #dcf0ff 50%, transparent 80%); filter: blur(2px) brightness(3.0); box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.9), 0 0 200px 80px rgba(0, 170, 255, 0.6); }
        
        /* 폭발 및 파장 레이어 */
        .burst-effect, .shockwave-effect, .fast-shockwave-effect, .flash-effect, .rev-shockwave {
            position: fixed; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; mix-blend-mode: screen; will-change: transform, opacity, width, height;
        }
        .burst-effect { z-index: 103; background-image: url('image_1.png'); background-size: contain; background-repeat: no-repeat; background-position: center; filter: brightness(2.0); }
        .shockwave-effect { z-index: 104; mix-blend-mode: overlay; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3); background: radial-gradient(circle, transparent 70%, rgba(255, 255, 255, 0.1) 80%, transparent 90%); box-shadow: 0 0 100px 20px rgba(255, 255, 255, 0.2); backdrop-filter: blur(6px) brightness(1.2); }
        .fast-shockwave-effect { z-index: 105; mix-blend-mode: overlay; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 0 50px 10px rgba(255, 255, 255, 0.3); backdrop-filter: blur(2px) brightness(1.4); }
        .flash-effect { width: 300vmin; height: 300vmin; z-index: 106; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,1) 10%, rgba(100,180,255,0.5) 30%, transparent 70%); filter: blur(10px) brightness(3.0); }
        
        /* 신규: 6초 이후 안으로 빨려 들어오는 공기 파장 */
        .rev-shockwave { 
            width: 100vmin; height: 100vmin; z-index: 107; border-radius: 50%; mix-blend-mode: overlay;
            border: 6px solid rgba(200, 240, 255, 0.5); box-shadow: inset 0 0 100px 20px rgba(100, 200, 255, 0.3);
            filter: blur(2px);
        }
    </style>
</head>
<body>
    <div id="rayEffectGlow"></div>
    <div id="rayEffect"></div>
    <div id="rayEffectOverlay"></div>
    <div id="rayEffectCondensed"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="bgVertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uGatherProgress; 
        uniform vec2 uExplosionCenter;
        uniform float uDistortion; 
        attribute float aSize;
        varying float vAlpha;
        varying vec3 vColor; 
        void main() {
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 15.0 + 5000.0, 10000.0) - 5000.0;
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            
            vec2 targetMvXy = uExplosionCenter * abs(mvPosition.z) * 0.8; 
            vec2 mvDirToCenter = targetMvXy - mvPosition.xy;
            float mvDist = length(mvDirToCenter);
            vec2 mvDirNorm = mvDist > 0.001 ? (mvDirToCenter / mvDist) : vec2(0.0);
            
            float phase = fract(uTime * 0.1 + aSize * 15.0); 
            float powerProgress = pow(uGatherProgress, 3.0);
            
            mvPosition.xy += mvDirToCenter * phase * phase * powerProgress;
            
            // 사건의 지평선 (블랙홀 중력 렌즈 왜곡)
            float lensEffect = exp(-mvDist * 0.0005) * uDistortion * 2000.0;
            mvPosition.xy += mvDirNorm * lensEffect; 
            
            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aSize; 
            
            vec2 screenPos = gl_Position.xy / gl_Position.w;
            float localEffect = exp(-distance(uExplosionCenter, screenPos) * 3.3);
            vAlpha = 0.3 + (localEffect * uGatherProgress * 3.0); 
            
            vec3 color1 = vec3(0.8, 0.2, 1.0); 
            vec3 color2 = vec3(0.0, 0.9, 0.8); 
            vec3 color3 = vec3(0.1, 0.3, 1.0); 
            float mixVal = smoothstep(-1.0, 1.0, sin(position.x * 0.0005) * cos(position.y * 0.0005));
            vec3 targetColor = mix(mix(color1, color2, mixVal), color3, sin(position.z * 0.001) * 0.5 + 0.5);
            vColor = mix(vec3(3.0), targetColor * 4.0, clamp(uGatherProgress * localEffect * 2.0, 0.0, 1.0));
        }
    </script>
    <script id="bgFragmentShader" type="x-shader/x-fragment">
        uniform float uBlackout; 
        varying float vAlpha;
        varying vec3 vColor; 
        void main() {
            if (distance(gl_PointCoord, vec2(0.5)) > 0.5) discard;
            gl_FragColor = vec4(vColor, vAlpha * (1.0 - uBlackout)); 
        }
    </script>

    <script id="burstVertexShader" type="x-shader/x-vertex">
        uniform float uBurstTime;
        uniform float uBurstPower; 
        uniform vec2 uBurstCenter;
        attribute vec3 aVelocity;
        attribute float aSize;
        varying float vBurstAlpha;
        void main() {
            vec3 finalPos = position + aVelocity * uBurstTime * 400.0 * uBurstPower;
            vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
            mvPosition.xy += uBurstCenter * 2000.0; 
            gl_Position = projectionMatrix * mvPosition;
            float progress = smoothstep(0.0, 12.0, uBurstTime); 
            gl_PointSize = aSize * (1.0 - progress); 
            vBurstAlpha = 1.0 - progress; 
        }
    </script>
    <script id="burstFragmentShader" type="x-shader/x-fragment">
        varying float vBurstAlpha;
        void main() {
            if (distance(gl_PointCoord, vec2(0.5)) > 0.5 || vBurstAlpha <= 0.0) discard;
            gl_FragColor = vec4(mix(vec3(0.3, 0.8, 1.0), vec3(1.0), vBurstAlpha), vBurstAlpha); 
        }
    </script>

    <script>
        // 모바일 최적화 계수
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        const Q_MULT = isMobile ? 0.33 : 1.0; 

        // 오디오 에러(404)를 완벽히 무시하는 안전한 실행 함수
        function safeAudioPlay(audio, volume = 1.0) {
            if (audio) {
                audio.volume = volume;
                audio.currentTime = 0;
                let promise = audio.play();
                if (promise !== undefined) {
                    promise.catch(e => { /* 오디오 파일이 없어도 에러 무시 */ });
                }
            }
        }
        function safeAudioPause(audio) {
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
        }

        let chargeAudio = new Audio('charge.mp3'); chargeAudio.loop = true;
        let glitchAudio = new Audio('glitch.mp3'); glitchAudio.loop = true;

        let scene, camera, renderer, mouseGlow;
        let bgParticlesMaterial, rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed;
        let fadeScene, fadeCamera, fadePlane; 
        
        let mouseX = 0, mouseY = 0;
        let isHolding = false;
        let lastHeldX = window.innerWidth / 2, lastHeldY = window.innerHeight / 2;
        
        let targetProgress = 0.0, currentProgress = 0.0; 
        let explosionBrightness = 2.0; 

        // 타이머 및 상태 변수
        let holdTime = 0.0, lastFrameTime = performance.now();
        let rotAngle1 = 0, rotAngle2 = 0;
        let uBlackoutValue = 0.0;
        
        // 기폭(Implosion) 변수
        let isCollapsing = false;
        let collapseTime = 0.0;
        const COLLAPSE_DURATION = 0.15; // 0.15초 응축 후 폭발
        let releaseBurstIntensity = 0.0;
        let releaseScale = 0.0;

        // 신규: 안으로 빨려 들어오는 역방향 파장
        const revWaves = [];
        let revWaveTimer = 0.0;
        let revWaveIndex = 0;

        const meteors = [];         
        const chargingMeteors = []; 
        const condenseMeteors = []; 
        const burstPool = [];
        
        const BG_PARTICLE_COUNT = Math.floor(160000 * Q_MULT); 
        const BURST_PARTICLE_COUNT = Math.floor(80000 * Q_MULT); 
        const maxChargingMeteors = Math.floor(400 * Q_MULT);
        const maxCondenseMeteors = Math.floor(800 * Q_MULT); 
        const maxBurstMeteors = Math.floor(2700 * Q_MULT); // 150% 증폭된 2700개 유성
        const startChargingMeteors = Math.floor(50 * Q_MULT);
        const chargingMeteorRange = maxChargingMeteors - startChargingMeteors;
        const SPACE_RANGE = 10000;
        const MAX_BURSTS = 3; 
        let currentBurstIndex = 0;

        init();
        animate();

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
            gradient.addColorStop(0.2, 'rgba(200, 230, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(100, 180, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            rayEffectGlow = document.getElementById('rayEffectGlow');
            rayEffect = document.getElementById('rayEffect');
            rayEffectOverlay = document.getElementById('rayEffectOverlay'); 
            rayEffectCondensed = document.getElementById('rayEffectCondensed');

            // 흡수 파장(Reverse Shockwave) DOM 추가
            for (let i = 0; i < 3; i++) {
                let div = document.createElement('div');
                div.className = 'rev-shockwave';
                document.body.appendChild(div);
                revWaves.push(div);
            }

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const bgGeom = new THREE.BufferGeometry();
            const bgPos = new Float32Array(BG_PARTICLE_COUNT * 3);
            const bgSizes = new Float32Array(BG_PARTICLE_COUNT);

            for (let i = 0; i < BG_PARTICLE_COUNT; i++) {
                bgPos[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                bgPos[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                bgPos[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                bgSizes[i] = Math.random() * (isMobile ? 3.0 : 2.0); 
            }
            bgGeom.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
            bgGeom.setAttribute('aSize', new THREE.BufferAttribute(bgSizes, 1));

            bgParticlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 }, uGatherProgress: { value: 0.0 },  
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) },
                    uDistortion: { value: 0.0 }, uBlackout: { value: 0.0 }    
                },
                vertexShader: document.getElementById('bgVertexShader').textContent,
                fragmentShader: document.getElementById('bgFragmentShader').textContent,
                blending: THREE.AdditiveBlending, depthTest: false, transparent: true
            });
            bgParticles = new THREE.Points(bgGeom, bgParticlesMaterial);
            scene.add(bgParticles);

            // 유성우 셋업
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            const meteorMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthTest: false });
            for(let i = 0; i < Math.floor(300 * Q_MULT); i++) {
                const m = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(m); scene.add(m); meteors.push(m);
            }

            // 차징 파티클
            const chargingGeom = new THREE.CylinderGeometry(0.8, 0.1, 1500, 3); 
            chargingGeom.rotateX(Math.PI / 2); 
            const chargingMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending, depthTest: false });
            for(let i = 0; i < maxChargingMeteors; i++) {
                const m = new THREE.Mesh(chargingGeom, chargingMat.clone());
                m.userData.active = false; scene.add(m); chargingMeteors.push(m);
            }

            // 흡수(응축) 파티클
            for(let i = 0; i < maxCondenseMeteors; i++) {
                let isParticle = Math.random() > 0.5;
                const cGeom = new THREE.CylinderGeometry(isParticle ? 4.0 : 1.2, isParticle ? 0.8 : 0.24, isParticle ? 50 : 2000, 3); 
                cGeom.rotateX(Math.PI / 2); 
                const cMat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xffffff : 0x88ddff, transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending, depthTest: false });
                const m = new THREE.Mesh(cGeom, cMat);
                m.userData.active = false; scene.add(m); condenseMeteors.push(m);
            }

            // 다중 폭발 풀(Pool) 생성
            for(let i = 0; i < MAX_BURSTS; i++) {
                const burstDiv = document.createElement('div'); burstDiv.className = 'burst-effect'; document.body.appendChild(burstDiv);
                const shockwaveDiv = document.createElement('div'); shockwaveDiv.className = 'shockwave-effect'; document.body.appendChild(shockwaveDiv);
                const fastShockwaveDiv = document.createElement('div'); fastShockwaveDiv.className = 'fast-shockwave-effect'; document.body.appendChild(fastShockwaveDiv);
                const flashDiv = document.createElement('div'); flashDiv.className = 'flash-effect'; document.body.appendChild(flashDiv);

                const burstGeom = new THREE.BufferGeometry();
                const burstPos = new Float32Array(BURST_PARTICLE_COUNT * 3);
                const burstVel = new Float32Array(BURST_PARTICLE_COUNT * 3);
                const burstSizes = new Float32Array(BURST_PARTICLE_COUNT);

                for (let j = 0; j < BURST_PARTICLE_COUNT; j++) {
                    burstPos[j * 3] = 0; burstPos[j * 3 + 1] = 0; burstPos[j * 3 + 2] = 0;
                    const u = Math.random(), v = Math.random();
                    const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                    const speed = 0.5 + Math.random() * 1.5;
                    burstVel[j * 3] = Math.sin(phi) * Math.cos(theta) * speed;
                    burstVel[j * 3 + 1] = Math.sin(phi) * Math.sin(theta) * speed;
                    burstVel[j * 3 + 2] = Math.cos(phi) * speed;
                    burstSizes[j] = (1.0 + Math.random() * 4.0) / 3.0; 
                }
                burstGeom.setAttribute('position', new THREE.BufferAttribute(burstPos, 3));
                burstGeom.setAttribute('aVelocity', new THREE.BufferAttribute(burstVel, 3));
                burstGeom.setAttribute('aSize', new THREE.BufferAttribute(burstSizes, 1));

                const particlesMat = new THREE.ShaderMaterial({
                    uniforms: { uBurstTime: { value: 0.0 }, uBurstCenter: { value: new THREE.Vector2(0, 0) }, uBurstPower: { value: 1.0 } },
                    vertexShader: document.getElementById('burstVertexShader').textContent,
                    fragmentShader: document.getElementById('burstFragmentShader').textContent,
                    blending: THREE.AdditiveBlending, depthTest: false, transparent: true, visible: false 
                });
                const particlesMesh = new THREE.Points(burstGeom, particlesMat); scene.add(particlesMesh);

                const burstMeteorGeom = new THREE.CylinderGeometry(2, 0.2, 1200, 3);
                burstMeteorGeom.rotateX(Math.PI / 2); burstMeteorGeom.translate(0, 0, 600); 
                const burstMeteorMat = new THREE.MeshBasicMaterial({ color: 0xffddaa, transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending, depthTest: false });

                const meteorsArr = [];
                for(let k = 0; k < maxBurstMeteors; k++) {
                    const m = new THREE.Mesh(burstMeteorGeom, burstMeteorMat);
                    m.scale.z = 0.001; m.visible = false; 
                    scene.add(m); meteorsArr.push(m);
                }

                let burstAudio = new Audio('explosion.mp3');

                burstPool.push({
                    active: false, time: 0.0,
                    burstDiv: burstDiv, shockwaveDiv: shockwaveDiv, fastShockwaveDiv: fastShockwaveDiv, flashDiv: flashDiv, 
                    particlesMat: particlesMat, particlesMesh: particlesMesh, meteorMat: burstMeteorMat, meteors: meteorsArr, audio: burstAudio
                });
            }

            // 마우스 광원 
            const glowMat = new THREE.SpriteMaterial({ map: createGlowTexture(), color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthTest: false });
            mouseGlow = new THREE.Sprite(glowMat);
            mouseGlow.scale.set(150, 150, 1); scene.add(mouseGlow);

            // 잔상 이펙트를 위한 보조 씬
            fadeScene = new THREE.Scene();
            fadeCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            fadePlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35, depthTest: false, depthWrite: false }));
            fadeScene.add(fadePlane);

            // 렌더러 설정 (잔상 유지를 위해 autoClearColor 끔)
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.autoClearColor = false; 
            renderer.setClearColor(0x000000, 1);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2.0));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 
            window.addEventListener('resize', onWindowResize);
        }

        // --- 재설정 및 보조 함수들 ---
        function resetMeteor(meteor) {
            meteor.position.set((Math.random() - 0.5) * 6000, (Math.random() - 0.5) * 4000, -2000 - Math.random() * 4000);
            meteor.userData.velocity = new THREE.Vector3((Math.random() - 0.5) * 2.4, (Math.random() - 0.5) * 2.4 - 0.4, 8 + Math.random() * 8);
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function resetChargingMeteor(meteor, targetPos) {
            const theta = Math.random() * Math.PI * 2, radius = 3500 + Math.random() * 2000, zDist = (Math.random() - 0.5) * 4000;
            meteor.position.set(targetPos.x + Math.cos(theta) * radius, targetPos.y + Math.sin(theta) * radius, targetPos.z + zDist);
            const dir = new THREE.Vector3().subVectors(targetPos, meteor.position).normalize();
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);
            meteor.userData.direction = dir; meteor.userData.speed = 40 + Math.random() * 60; 
        }

        function resetCondenseMeteor(meteor, targetPos) {
            const theta = Math.random() * Math.PI * 2, phi = Math.acos(2.0 * Math.random() - 1.0), radius = 4000 + Math.random() * 3000; 
            meteor.position.set(targetPos.x + Math.sin(phi) * Math.cos(theta) * radius, targetPos.y + Math.sin(phi) * Math.sin(theta) * radius, targetPos.z + Math.cos(phi) * radius);
            // 40~50% 감속된 묵직한 흡수 속도 적용
            meteor.userData.speed = (150 + Math.random() * 200) * (0.4 + Math.random() * 0.1); 
        }

        function getMouse3DTarget() {
            let vec = new THREE.Vector3(mouseX, mouseY, 0.5); vec.unproject(camera);
            let dir = vec.sub(camera.position).normalize();
            return camera.position.clone().add(dir.multiplyScalar((1000 - camera.position.z) / dir.z));
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            bgParticlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        // --- 마우스 및 터치 이벤트 제어 ---
        function onMouseMove(event) { 
            if(isHolding) { lastHeldX = event.clientX; lastHeldY = event.clientY; }
            updateExplosionCenter(event.clientX, event.clientY); 
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                if(isHolding) { lastHeldX = touch.clientX; lastHeldY = touch.clientY; }
                updateExplosionCenter(touch.clientX, touch.clientY); 
            }
        }

        function triggerHoldStart(clientX, clientY) {
            if (isCollapsing) return; // 붕괴 중 중복 클릭 방지
            isHolding = true; targetProgress = 1.0; holdTime = 0.0; 
            lastHeldX = clientX; lastHeldY = clientY;
            updateExplosionCenter(clientX, clientY);
            safeAudioPlay(chargeAudio, 1.0);
        }

        function triggerHoldEnd() {
            if (isHolding) { 
                isHolding = false; 
                safeAudioPause(chargeAudio); safeAudioPause(glitchAudio);
                
                if(currentProgress > 0.05) { 
                    // 기폭(Implosion) 단계 진입: 강도 및 스케일 캡처
                    let condenseProgressRaw = holdTime > 6.0 ? Math.min(1.0, (holdTime - 6.0) / 3.0) : 0.0;
                    let smoothCondense = condenseProgressRaw * condenseProgressRaw * (3 - 2 * condenseProgressRaw);
                    
                    releaseBurstIntensity = Math.max(0.05, currentProgress) + condenseProgressRaw * 1.5; 
                    releaseScale = currentProgress * (1.0 - (0.6 * smoothCondense)); 
                    
                    isCollapsing = true; collapseTime = 0.0;
                } else {
                    targetProgress = 0.0;
                }
            }
        }

        // --- 폭발 실행 (150% 증폭 및 효과 복구) ---
        function executeBurst(intensity) {
            uBlackoutValue = 0.0; 
            let vInt = intensity * 1.5; // 150% 타격감 증폭

            const b = burstPool[currentBurstIndex];
            currentBurstIndex = (currentBurstIndex + 1) % MAX_BURSTS; 

            b.active = true; b.time = 0.0;
            safeAudioPlay(b.audio, Math.min(1.0, Math.max(0.1, vInt / 2.5)));

            b.particlesMesh.visible = true;
            b.particlesMat.uniforms.uBurstCenter.value.set(mouseX, mouseY);
            b.particlesMat.uniforms.uBurstPower.value = Math.max(0.2, vInt); 
            b.meteorMat.opacity = 1.0; 

            // 요소 리플로우(Reflow) 강제 헬퍼
            const reflow = (el) => void el.offsetWidth;

            // 플래시뱅
            const flash = b.flashDiv;
            flash.style.transition = 'none'; flash.style.transform = `translate(-50%, -50%) scale(${vInt * 0.1})`;
            flash.style.opacity = String(Math.min(1.0, vInt * 1.5));
            flash.style.left = lastHeldX + 'px'; flash.style.top = lastHeldY + 'px';
            reflow(flash); 
            flash.style.transition = 'transform 0.15s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 3.0s ease-out';
            flash.style.transform = `translate(-50%, -50%) scale(${Math.max(0.5, vInt)})`;
            flash.style.opacity = '0';

            // 화염 베이스
            b.burstDiv.style.transition = 'none'; b.burstDiv.style.transform = 'translate(-50%, -50%) scale(0)';
            b.burstDiv.style.opacity = '1'; b.burstDiv.style.left = lastHeldX + 'px'; b.burstDiv.style.top = lastHeldY + 'px';
            b.burstDiv.style.width = `calc(var(--max-size) * ${vInt})`; b.burstDiv.style.height = `calc(var(--max-size) * ${vInt})`;
            reflow(b.burstDiv); 
            b.burstDiv.style.transition = 'width 0.8s ease-out, height 0.8s ease-out, transform 0.8s ease-out, opacity 0.8s ease-in';
            b.burstDiv.style.transform = 'translate(-50%, -50%) scale(1)'; b.burstDiv.style.opacity = '0'; 

            // 메인 공기 파장
            b.shockwaveDiv.style.transition = 'none'; b.shockwaveDiv.style.transform = 'translate(-50%, -50%) scale(0)';
            b.shockwaveDiv.style.opacity = '1'; b.shockwaveDiv.style.left = lastHeldX + 'px'; b.shockwaveDiv.style.top = lastHeldY + 'px';
            b.shockwaveDiv.style.width = `calc(var(--max-size) * ${vInt})`; b.shockwaveDiv.style.height = `calc(var(--max-size) * ${vInt})`;
            reflow(b.shockwaveDiv); 
            b.shockwaveDiv.style.transition = 'width 15.0s cubic-bezier(0.1, 0.8, 0.2, 1), height 15.0s cubic-bezier(0.1, 0.8, 0.2, 1), transform 15.0s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 15.0s ease-out';
            b.shockwaveDiv.style.transform = 'translate(-50%, -50%) scale(1)'; b.shockwaveDiv.style.opacity = '0'; 

            // 빠른 서브 파장
            const fastShock = b.fastShockwaveDiv;
            fastShock.style.transition = 'none'; fastShock.style.transform = 'translate(-50%, -50%) scale(0)';
            fastShock.style.opacity = '1'; fastShock.style.left = lastHeldX + 'px'; fastShock.style.top = lastHeldY + 'px';
            fastShock.style.width = `calc(var(--max-size) * ${vInt})`; fastShock.style.height = `calc(var(--max-size) * ${vInt})`;
            setTimeout(() => {
                reflow(fastShock);
                fastShock.style.transition = 'width 7.5s cubic-bezier(0.1, 0.8, 0.2, 1), height 7.5s cubic-bezier(0.1, 0.8, 0.2, 1), transform 7.5s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 7.5s ease-out';
                fastShock.style.transform = 'translate(-50%, -50%) scale(1)'; fastShock.style.opacity = '0';
            }, 150);

            const m3d = getMouse3DTarget();
            const activeMeteorCount = Math.min(b.meteors.length, Math.floor(maxBurstMeteors * vInt)); // 1.5배 증가된 개수 연동

            b.meteors.forEach((meteor, index) => {
                if (index < activeMeteorCount) {
                    meteor.visible = true; meteor.position.copy(m3d); meteor.scale.set(1, 1, 0.001); 
                    
                    const u = Math.random(), v = Math.random();
                    const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                    const baseSpeed = 2.25 + Math.random() * 3.75; 
                    const speed = baseSpeed * Math.max(0.2, vInt); 

                    const vx = Math.sin(phi) * Math.cos(theta) * speed;
                    const vy = Math.sin(phi) * Math.sin(theta) * speed;
                    const vz = Math.cos(phi) * speed;

                    meteor.userData.velocity = new THREE.Vector3(vx, vy, vz);
                    meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
                } else {
                    meteor.visible = false; 
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 메인 렌더링 루프 ---
        function animate(time) {
            requestAnimationFrame(animate);

            let dt = (time - lastFrameTime) / 1000.0;
            if (dt > 0.1 || isNaN(dt)) dt = 0.016; 
            lastFrameTime = time;

            if (isHolding) holdTime += dt;
            rotAngle1 += 30 * dt; rotAngle2 -= 45 * dt;

            let m3d = getMouse3DTarget();
            let isGlitching = false, glitchIntensity = 0.0, shake = 0.0;
            
            let condenseProgressRaw = (isHolding && holdTime > 6.0) ? Math.min(1.0, (holdTime - 6.0) / 3.0) : 0.0;
            let smoothCondense = condenseProgressRaw * condenseProgressRaw * (3 - 2 * condenseProgressRaw);
            let scaleMultiplier = 1.0 - (0.6 * smoothCondense);

            // 신규: 안으로 모이는 공기 파장 (Reverse Shockwave) 효과
            if (isHolding && holdTime > 6.0) {
                revWaveTimer += dt;
                if (revWaveTimer > 0.5) { // 0.5초마다 파장 방출
                    revWaveTimer = 0;
                    let rw = revWaves[revWaveIndex]; 
                    revWaveIndex = (revWaveIndex + 1) % 3;
                    
                    rw.style.transition = 'none';
                    rw.style.transform = `translate(-50%, -50%) scale(${3.0 - smoothCondense})`; // 화면 밖에서 시작
                    rw.style.opacity = '0';
                    rw.style.left = lastHeldX + 'px'; 
                    rw.style.top = lastHeldY + 'px';
                    void rw.offsetWidth; // 강제 리플로우
                    
                    rw.style.transition = 'transform 0.6s cubic-bezier(0.5, 0, 1, 1), opacity 0.6s ease-out';
                    rw.style.transform = 'translate(-50%, -50%) scale(0)'; // 중심점으로 빨려들어감
                    rw.style.opacity = String(0.3 + smoothCondense * 0.5); 
                }
            }

            // 암전 제어
            let isVoid = isHolding && holdTime > 8.0;
            let blackoutTarget = isVoid ? 0.85 : 0.0; 
            uBlackoutValue += (blackoutTarget - uBlackoutValue) * 0.15; 
            let globalAlpha = 1.0 - uBlackoutValue;

            let finalScale = 0.0;
            
            // 붕괴 (Implosion)
            if (isCollapsing) {
                collapseTime += dt;
                let cRatio = Math.min(1.0, collapseTime / COLLAPSE_DURATION);
                let easeCollapse = cRatio * cRatio * cRatio; 
                
                finalScale = releaseScale * (1.0 - easeCollapse);
                uBlackoutValue = 1.0; // 붕괴 순간 완벽한 암전

                if (cRatio >= 1.0) {
                    isCollapsing = false;
                    executeBurst(releaseBurstIntensity); 
                    finalScale = 0.0; currentProgress = 0.0; targetProgress = 0.0; holdTime = 0.0;
                }
            } else if (isHolding) {
                finalScale = currentProgress * scaleMultiplier;

                if (holdTime > 4.8 && holdTime <= 6.0) {
                    isGlitching = true; glitchIntensity = (holdTime - 4.8) / 1.2; 
                } else if (holdTime > 6.0) {
                    isGlitching = true; glitchIntensity = 1.0 + smoothCondense; 
                }
            } else {
                finalScale = currentProgress; 
                uBlackoutValue += (0.0 - uBlackoutValue) * 0.15;
            }

            // 글리치 및 카메라 떨림
            if (isGlitching) {
                shake = glitchIntensity * 40.0 * globalAlpha; 
                scene.position.x = (Math.random() - 0.5) * shake; scene.position.y = (Math.random() - 0.5) * shake;
                
                mouseGlow.material.opacity = (0.3 + Math.random() * 0.7) * globalAlpha;
                let scale = 150 + (Math.random() - 0.5) * 80 * glitchIntensity;
                mouseGlow.scale.set(scale, scale, 1);
                
                let off = (Math.random() - 0.5) * 60 * glitchIntensity;
                rayEffectOverlay.style.boxShadow = `${off}px 0 0 rgba(255, 0, 100, 0.8), ${-off}px 0 0 rgba(0, 255, 255, 0.8), 0 0 100px 50px rgba(255, 255, 255, 0.7)`;
            } else {
                scene.position.x += (0 - scene.position.x) * 0.1; scene.position.y += (0 - scene.position.y) * 0.1;
                mouseGlow.material.opacity = 0.8 * globalAlpha; mouseGlow.scale.set(150, 150, 1);
                rayEffectOverlay.style.boxShadow = `0 0 100px 50px rgba(255, 255, 255, 0.7)`;
            }
            
            mouseGlow.position.copy(m3d); 

            // 기본 유성 루프
            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) resetMeteor(meteor);
            });

            const activeChargingLimit = Math.floor(startChargingMeteors + (chargingMeteorRange * currentProgress));

            // 차징 파티클
            chargingMeteors.forEach((meteor, index) => {
                if ((isHolding || isCollapsing) && index < activeChargingLimit) {
                    if (!meteor.userData.active) {
                        resetChargingMeteor(meteor, m3d); meteor.userData.active = true; meteor.material.opacity = 0.2 * globalAlpha; 
                    }
                    if(meteor.material.opacity < 1.0 * globalAlpha) meteor.material.opacity = Math.min(1.0 * globalAlpha, meteor.material.opacity + 0.02);
                    
                    const dirCharging = new THREE.Vector3().subVectors(m3d, meteor.position).normalize();
                    meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dirCharging);
                    
                    let speedMult = 1.0 + (smoothCondense * 3.0);
                    if (isCollapsing) speedMult *= 3.0; // 붕괴 중 급가속
                    meteor.position.add(dirCharging.multiplyScalar(meteor.userData.speed * speedMult));

                    if (meteor.position.distanceTo(m3d) < 200) resetChargingMeteor(meteor, m3d);
                } else {
                    meteor.material.opacity = Math.max(meteor.material.opacity - 0.1, 0.0);
                    if (meteor.material.opacity <= 0) meteor.userData.active = false;
                }
            });

            // 흡수(응축) 블랙홀 입자
            condenseMeteors.forEach((meteor, index) => {
                if ((isHolding && smoothCondense > 0.0) || isCollapsing) {
                    let activeCount = Math.floor(maxCondenseMeteors * (isCollapsing ? 1.0 : smoothCondense));
                    if (index < activeCount) {
                        if (!meteor.userData.active) {
                            resetCondenseMeteor(meteor, m3d); meteor.userData.active = true; meteor.material.opacity = 0.0;
                        }
                        meteor.material.opacity = Math.min(1.0 * globalAlpha, meteor.material.opacity + 0.05);
                        
                        const dir = new THREE.Vector3().subVectors(m3d, meteor.position).normalize();
                        meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);
                        
                        let suckSpeed = meteor.userData.speed;
                        if (isCollapsing) suckSpeed *= 3.0; 
                        meteor.position.add(dir.multiplyScalar(suckSpeed));

                        if (meteor.position.distanceTo(m3d) < 300) resetCondenseMeteor(meteor, m3d);
                    } else {
                        meteor.material.opacity = Math.max(meteor.material.opacity - 0.1, 0.0);
                        if (meteor.material.opacity <= 0) meteor.userData.active = false;
                    }
                } else {
                    meteor.material.opacity = Math.max(meteor.material.opacity - 0.1, 0.0);
                    if (meteor.material.opacity <= 0) meteor.userData.active = false;
                }
            });

            // 폭발 파티클 (잔해)
            burstPool.forEach(burst => {
                if (burst.active) {
                    burst.time += 0.016; burst.particlesMat.uniforms.uBurstTime.value = burst.time;
                    if (burst.time < 6.0) {
                        burst.meteorMat.opacity = 1.0 - (burst.time / 6.0);
                        burst.meteors.forEach(meteor => {
                            if (meteor.visible) {
                                meteor.scale.z = Math.min(1.0, meteor.scale.z + 0.03); 
                                meteor.position.add(meteor.userData.velocity);
                            }
                        });
                    }
                    if (burst.time > 12.0) { burst.active = false; burst.particlesMesh.visible = false; }
                }
            });

            let easing = isHolding ? 0.005 : 0.02; 
            currentProgress += (targetProgress - currentProgress) * easing;
            
            bgParticlesMaterial.uniforms.uGatherProgress.value = currentProgress;
            bgParticlesMaterial.uniforms.uTime.value = time * 0.001; 
            bgParticlesMaterial.uniforms.uDistortion.value = isCollapsing ? 2.0 : smoothCondense; 
            bgParticlesMaterial.uniforms.uBlackout.value = uBlackoutValue;

            if (isHolding || isCollapsing) {
                explosionBrightness = (2.0 + Math.pow(currentProgress, 5.0) * 158.0 + (smoothCondense * 300.0)) * globalAlpha; 
                if (isCollapsing) explosionBrightness *= 2.0;
            } else {
                explosionBrightness = Math.max(2.0, explosionBrightness * 0.96);
            }
            
            // 코어 CSS 스케일 적용
            [rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed].forEach(el => { el.style.left = lastHeldX + 'px'; el.style.top = lastHeldY + 'px'; });

            if (finalScale > 0.01) {
                rayEffectGlow.style.transform = `translate(-50%, -50%) scale(${finalScale}) rotate(${rotAngle1 * 0.5}deg)`;
                rayEffectGlow.style.opacity = currentProgress * globalAlpha; rayEffectGlow.style.filter = `blur(16px) brightness(${explosionBrightness})`; 
                rayEffect.style.transform = `translate(-50%, -50%) scale(${finalScale}) rotate(${rotAngle1}deg)`;
                rayEffect.style.opacity = currentProgress * globalAlpha; rayEffect.style.filter = `blur(2px) brightness(${explosionBrightness})`; 
                rayEffectOverlay.style.transform = `translate(-50%, -50%) scale(${finalScale}) rotate(${rotAngle2}deg)`;
                rayEffectOverlay.style.opacity = currentProgress * globalAlpha; rayEffectOverlay.style.filter = `blur(4px) brightness(${explosionBrightness * 1.5})`; 
                rayEffectCondensed.style.transform = `translate(-50%, -50%) scale(${finalScale}) rotate(${rotAngle1 * 2.0}deg)`;
                rayEffectCondensed.style.opacity = isCollapsing ? 1.0 : smoothCondense * globalAlpha; 
                rayEffectCondensed.style.filter = `blur(${2 + smoothCondense * 2}px) brightness(${explosionBrightness * 2.0})`;
            } else {
                [rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed].forEach(el => el.style.transform = 'translate(-50%, -50%) scale(0)');
            }

            // 잔상(라이트 트레일) 렌더링 로직 (autoClear 끄고 검은색 반투명 쿼드 렌더링)
            renderer.clearDepth(); 
            renderer.render(fadeScene, fadeCamera); 
            renderer.render(scene, camera);
        }
    </script>
</body>
