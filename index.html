<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Stable Camera & Epic Big Bang</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        #waveEffect {
            position: fixed;
            width: 20vmin; 
            height: 20vmin;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: screen; 
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,230,255,1) 40%, rgba(100,180,255,0.4) 60%, transparent 80%);
            box-shadow: 0 0 150px 70px rgba(100, 200, 255, 0.6), 0 0 300px 150px rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(12px) brightness(2.0); 
        }
    </style>
</head>
<body>
    <div id="waveEffect"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uEnergyLevel;
        uniform float uShockStrength;
        uniform float uGatherStrength; 
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying float vAlpha;
        varying float vShock; 
        varying float vGatherPhase; 

        void main() {
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 18.0 + 5000.0, 10000.0) - 5000.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            
            vec2 targetMvXy = uExplosionCenter * abs(mvPosition.z) * 0.8; 
            vec2 mvDirToCenter = targetMvXy - mvPosition.xy;
            float mvDist = length(mvDirToCenter);
            vec2 mvDirNorm = mvDist > 0.001 ? (mvDirToCenter / mvDist) : vec2(0.0);

            float phase = fract(uTime * 0.13 + aSize * 15.0); 
            vGatherPhase = phase * uGatherStrength; 

            float easePhase = phase * phase; 
            
            vec2 gatherMove = mvDirToCenter * easePhase * uGatherStrength;
            vec2 mvSwirl = vec2(-mvDirNorm.y, mvDirNorm.x) * mvDist * sin(phase * 3.14) * uGatherStrength * 1.5;

            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float distToCenterScreen = distance(uExplosionCenter, screenPos);
            float localEffect = exp(-distToCenterScreen * 5.0);
            
            float pushForce = localEffect * uShockStrength * 8000.0; 
            vec2 pushMove = -mvDirNorm * pushForce; 

            mvPosition.xy += gatherMove + mvSwirl + pushMove;
            mvPosition.z += pushForce * 0.3 - (easePhase * 800.0 * uGatherStrength); 

            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aSize; 
            
            vAlpha = 0.36 + (localEffect * uEnergyLevel * 60.0); 
            vShock = uShockStrength * localEffect * 3.0;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vAlpha;
        varying float vShock;
        varying float vGatherPhase;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            float gatherFade = 1.0 - smoothstep(0.8, 1.0, vGatherPhase);

            vec3 baseColor = vec3(1.0, 1.0, 1.0);
            vec3 explosionColor = vec3(0.3, 0.9, 1.0); 
            
            vec3 finalColor = mix(baseColor, explosionColor, min(vShock, 1.0));
            vec3 gatherColor = mix(finalColor, vec3(0.5, 0.9, 1.0), vGatherPhase);
            
            gl_FragColor = vec4(gatherColor, (vAlpha + vShock) * gatherFade); 
        }
    </script>

    <script id="burstVertexShader" type="x-shader/x-vertex">
        uniform float uBurstTime;
        uniform vec2 uExplosionCenter;
        attribute float aSize;
        attribute vec3 aVelocity;

        varying float vBurstAlpha;

        void main() {
            // 폭발 중심으로부터 속도벡터 방향으로 시간 지남에 따라 이동
            vec3 finalPos = aVelocity * uBurstTime;
            
            // Camera Space로 변환 및 투영
            vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
            
            // 셰이더 내부에서 explosion center를 projection 공간에 매핑 (단순화)
            mvPosition.xy += uExplosionCenter * 2000.0; 

            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aSize * (1.0 - uBurstTime / 2.0); // 시간이 지날수록 크기 축소

            // 2초 동안 페이드 아웃
            vBurstAlpha = 1.0 - smoothstep(0.0, 2.0, uBurstTime); 
        }
    </script>

    <script id="burstFragmentShader" type="x-shader/x-fragment">
        varying float vBurstAlpha;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5 || vBurstAlpha < 0.001) discard;
            
            // 코어 컬러 설정 (화이트 -> 푸른색)
            vec3 coreColor = vec3(1.0, 1.0, 1.0);
            vec3 cyanColor = vec3(0.0, 1.0, 1.0);
            vec3 finalBurstColor = mix(cyanColor, coreColor, vBurstAlpha);

            gl_FragColor = vec4(finalBurstColor, vBurstAlpha);
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let waveEffect; 
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        
        let energyLevel = 0.0;    
        let shockStrength = 0.0;  
        let gatherStrength = 0.0; 
        let waveOpacity = 0.0; 
        let waveScale = 0.0;
        let explosionBrightness = 2.0; 

        let currentProgress = 0.0; 
        let isHolding = false;
        let lastHeldX = 0, lastHeldY = 0; 

        const meteors = [];
        const PARTICLE_COUNT = 125000;
        const SPACE_RANGE = 10000;

        // **새로운 폭발 파티클 변수**
        let burstParticles;
        let burstMaterial;
        let burstTime = 0.0;
        const BURST_PARTICLE_COUNT = 50000; // 폭발 전용 파티클 수

        init();
        animate();

        function init() {
            waveEffect = document.getElementById('waveEffect');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                sizes[i] = Math.random() * 2.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uEnergyLevel: { value: 0.0 },     
                    uShockStrength: { value: 0.0 },   
                    uGatherStrength: { value: 0.0 },  
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            // **1. 유성우(별똥별) 수량 6배 많이 (10개 -> 60개)**
            createMeteors(60); 

            // **2. 새로운 폭발 전용 파티클 시스템 초기화**
            createBurstParticles();

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 

            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 

            window.addEventListener('resize', onWindowResize);
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            
            const meteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        // **폭발 파티클 생성 함수**
        function createBurstParticles() {
            const burstGeometry = new THREE.BufferGeometry();
            const velocities = new Float32Array(BURST_PARTICLE_COUNT * 3);
            const sizes = new Float32Array(BURST_PARTICLE_COUNT);

            for (let i = 0; i < BURST_PARTICLE_COUNT; i++) {
                // 사방으로 뻗어나가는 무작위 속도 벡터 (방사형)
                const phi = Math.random() * Math.PI * 2;
                const theta = Math.random() * Math.PI;
                const speed = 2000.0 + Math.random() * 3000.0; // 매우 빠른 속도

                velocities[i * 3] = Math.sin(theta) * Math.cos(phi) * speed;
                velocities[i * 3 + 1] = Math.sin(theta) * Math.sin(phi) * speed;
                velocities[i * 3 + 2] = Math.cos(theta) * speed;

                sizes[i] = 1.0 + Math.random() * 3.0; // 크기
            }

            burstGeometry.setAttribute('aVelocity', new THREE.BufferAttribute(velocities, 3));
            burstGeometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            // 폭발 파티클 전용 셰이더 머티리얼
            burstMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uBurstTime: { value: 0.0 }, // 폭발 발생 후 경과 시간
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) } // 폭발 중심
                },
                vertexShader: document.getElementById('burstVertexShader').textContent,
                fragmentShader: document.getElementById('burstFragmentShader').textContent,
                blending: THREE.AdditiveBlending, // 가산 혼합
                depthTest: false,
                transparent: true,
                visible: false // 초기에는 숨김
            });

            burstParticles = new THREE.Points(burstGeometry, burstMaterial);
            scene.add(burstParticles);
        }

        function resetMeteor(meteor) {
            meteor.position.set(
                (Math.random() - 0.5) * 8000,
                (Math.random() - 0.5) * 6000,
                -4000 - Math.random() * 5000
            );
            meteor.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 8, 
                (Math.random() - 0.5) * 8 - 2, 
                15 + Math.random() * 20 
            );
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            // 왜곡 최소화 유지
            targetX = mouseX * 80; 
            targetY = mouseY * 80;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            updateExplosionCenter(event.clientX, event.clientY); 
            if(isHolding) { 
                lastHeldX = event.clientX;
                lastHeldY = event.clientY;
            }
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                updateExplosionCenter(touch.clientX, touch.clientY); 
                if(isHolding) { 
                    lastHeldX = touch.clientX;
                    lastHeldY = touch.clientY;
                }
            }
        }

        function triggerHoldStart(clientX, clientY) {
            isHolding = true; 
            lastHeldX = clientX;
            lastHeldY = clientY;
            shockStrength = 0.0;   
        }

        function triggerHoldEnd() {
            if (isHolding) { 
                isHolding = false; 
                shockStrength = 1.0; // 폭발 발생 트리거
                explosionBrightness = Math.max(120.0, explosionBrightness * 1.5); 

                // **빅뱅 폭발 순간: 전용 폭발 파티클 활성화 및 초기화**
                burstMaterial.visible = true;
                burstMaterial.uniforms.uBurstTime.value = 0.0; // 시간 초기화
                burstTime = 0.0; // 애니메이션 시간 초기화
                // 폭발 중심점 전달 (기본 파티클 머티리얼에서 가져옴)
                burstMaterial.uniforms.uExplosionCenter.value.copy(particlesMaterial.uniforms.uExplosionCenter.value);
            }
        }

        function onMouseDown(event) { triggerHoldStart(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                event.preventDefault(); 
                triggerHoldStart(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.005;
            camera.position.y += (targetY - camera.position.y) * 0.005;
            camera.lookAt(scene.position);

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            // **새로운 폭발 파티클 애니메이션 루프**
            if (burstMaterial.visible) {
                burstTime += 0.016; // 매 프레임 시간 증가 (약 60FPS 기준)
                burstMaterial.uniforms.uBurstTime.value = burstTime;

                // 2초 뒤에 폭발 파티클 숨김 및 초기화 (메모리 관리 및 루프 방지)
                if (burstTime > 2.0) {
                    burstMaterial.visible = false;
                    burstMaterial.uniforms.uBurstTime.value = 0.0;
                }
            }

            if (isHolding) {
                currentProgress = Math.min(currentProgress + 0.005, 1.0); 

                energyLevel = currentProgress; 
                gatherStrength = currentProgress; 
                
                waveScale = 0.1 + (currentProgress * 1.5) + Math.sin(time * 0.002) * 0.05; 
                waveOpacity = currentProgress; 
                
                explosionBrightness = 2.0 + Math.pow(currentProgress, 5.0) * 78.0; 
            } else {
                gatherStrength *= 0.98; 
                shockStrength *= 0.998; 
                energyLevel *= 0.995;    
                
                waveScale += (60.0 - waveScale) * 0.002; 
                waveOpacity *= 0.995; 
                
                currentProgress *= 0.98;

                explosionBrightness = Math.max(2.0, explosionBrightness * 0.96);
            }

            particlesMaterial.uniforms.uEnergyLevel.value = energyLevel;
            particlesMaterial.uniforms.uShockStrength.value = shockStrength;
            particlesMaterial.uniforms.uGatherStrength.value = gatherStrength;
            particlesMaterial.uniforms.uTime.value = time * 0.001; 
            
            if(isHolding) {
                waveEffect.style.left = lastHeldX + 'px';
                waveEffect.style.top = lastHeldY + 'px';
            }

            if (isHolding || waveOpacity > 0.005) {
                waveEffect.style.transform = `translate(-50%, -50%) scale(${waveScale})`;
                waveEffect.style.opacity = waveOpacity;
                waveEffect.style.filter = `blur(12px) brightness(${explosionBrightness})`; 
            } else if (waveScale > 0) {
                waveScale = 0;
                waveEffect.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
