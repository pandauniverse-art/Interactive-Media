<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Organic Lens Blur & Hyper Charge</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        #waveEffect {
            position: fixed;
            width: 15vmin; 
            height: 15vmin;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: screen; 
            /* 밝기 200% 증폭 및 전체적인 자연스러운 빛 번짐(Glow) */
            filter: brightness(4.0); 
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(180,220,255,0.5) 30%, transparent 70%);
            box-shadow: 0 0 80px 30px rgba(100, 200, 255, 0.4), 0 0 150px 50px rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        /* 딱딱한 선 대신 자연스럽게 번지는 유기적인 광선 레이어 */
        #waveEffect::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            /* 불규칙하고 부드러운 빛 갈래 */
            background:
                conic-gradient(from 0deg, transparent 0%, rgba(200,230,255,0.4) 10%, transparent 20%),
                conic-gradient(from 120deg, transparent 0%, rgba(200,230,255,0.6) 10%, transparent 20%),
                conic-gradient(from 240deg, transparent 0%, rgba(200,230,255,0.4) 10%, transparent 20%);
            border-radius: 50%;
            /* 30% 블러 처리를 통해 광학 렌즈에서 맺히는 자연스러운 빛 산란 구현 */
            filter: blur(8px);
            mask-image: radial-gradient(circle, transparent 10%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(circle, transparent 10%, black 30%, transparent 70%);
            /* 매우 느리고 무거운 회전 (속도 30%로 감속) */
            animation: spin 60s linear infinite; 
        }

        /* 소용돌이치며 빨려 들어가는 빛 무리도 부드럽게 블러 처리 */
        .implosion-ray {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, rgba(150,255,255,0) 0deg, rgba(150,255,255,0.3) 10deg, rgba(150,255,255,0) 20deg);
            border-radius: 50%;
            filter: blur(6px); /* 부드러운 꼬임 효과 */
            mask-image: radial-gradient(circle, transparent 10%, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle, transparent 10%, black 40%, transparent 80%);
            display: none; 
        }
        
        #waveEffect.charging .implosion-ray {
            display: block;
            /* 흡수 애니메이션 속도 30%로 감속 (11초 주기로 천천히 빨려들어감) */
            animation: implosion 11s cubic-bezier(0.5, 0, 1, 1) infinite;
        }
        #waveEffect .implosion-ray:nth-child(1) { animation-delay: 0.0s; }
        #waveEffect .implosion-ray:nth-child(2) { animation-delay: 3.6s; }
        #waveEffect .implosion-ray:nth-child(3) { animation-delay: 7.2s; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes implosion {
            0% { transform: scale(2.0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: scale(0.0) rotate(90deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="waveEffect">
        <div class="implosion-ray"></div>
        <div class="implosion-ray"></div>
        <div class="implosion-ray"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uEnergyLevel;
        uniform float uShockStrength;
        uniform float uGatherStrength; 
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying float vAlpha;
        varying float vShock; 
        varying float vGatherPhase; 

        void main() {
            vec3 modPos = position;
            // 별이 다가오는 속도를 기존 60에서 18로 추가 감속 (30% 수준)
            modPos.z = mod(position.z + uTime * 18.0 + 5000.0, 10000.0) - 5000.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            
            vec2 targetMvXy = uExplosionCenter * abs(mvPosition.z) * 0.8; 
            vec2 mvDirToCenter = targetMvXy - mvPosition.xy;
            float mvDist = length(mvDirToCenter);
            vec2 mvDirNorm = mvDist > 0.001 ? (mvDirToCenter / mvDist) : vec2(0.0);

            // 파티클 소용돌이 흡수 속도를 기존 0.45에서 0.13으로 추가 감속
            float phase = fract(uTime * 0.13 + aSize * 15.0); 
            vGatherPhase = phase * uGatherStrength; 

            float easePhase = phase * phase; 
            
            vec2 gatherMove = mvDirToCenter * easePhase * uGatherStrength;
            vec2 mvSwirl = vec2(-mvDirNorm.y, mvDirNorm.x) * mvDist * sin(phase * 3.14) * uGatherStrength * 1.5;

            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float distToCenterScreen = distance(uExplosionCenter, screenPos);
            float localEffect = exp(-distToCenterScreen * 5.0);
            
            float pushForce = localEffect * uShockStrength * 1500.0; 
            vec2 pushMove = -mvDirNorm * pushForce; 

            mvPosition.xy += gatherMove + mvSwirl + pushMove;
            mvPosition.z += pushForce * 0.1 - (easePhase * 800.0 * uGatherStrength); 

            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aSize; 
            
            // 10초 도달 시 파티클의 발광을 압도적으로 증폭 (6.0 -> 12.0)
            vAlpha = 0.2 + (localEffect * uEnergyLevel * 12.0); 
            vShock = uShockStrength * localEffect;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vAlpha;
        varying float vShock;
        varying float vGatherPhase;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            float gatherFade = 1.0 - smoothstep(0.8, 1.0, vGatherPhase);

            vec3 baseColor = vec3(1.0, 1.0, 1.0);
            vec3 explosionColor = vec3(0.3, 0.9, 1.0); 
            vec3 finalColor = mix(baseColor, explosionColor, vShock * 2.0);
            
            vec3 gatherColor = mix(finalColor, vec3(0.5, 0.9, 1.0), vGatherPhase);
            
            gl_FragColor = vec4(gatherColor, (vAlpha + vShock) * gatherFade); 
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let waveEffect; 
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        
        let energyLevel = 0.0;    
        let shockStrength = 0.0;  
        let gatherStrength = 0.0; 
        let waveOpacity = 0.0; 
        let waveScale = 0.0;

        let isHolding = false;
        let holdStartTime = -1; 
        let lastHeldX = 0, lastHeldY = 0;

        const meteors = [];
        const PARTICLE_COUNT = 125000;
        const SPACE_RANGE = 10000;

        init();
        animate();

        function init() {
            waveEffect = document.getElementById('waveEffect');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                sizes[i] = Math.random() * 2.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uEnergyLevel: { value: 0.0 },     
                    uShockStrength: { value: 0.0 },   
                    uGatherStrength: { value: 0.0 },  
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            createMeteors(10); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 

            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 

            window.addEventListener('resize', onWindowResize);
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            
            const meteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        function resetMeteor(meteor) {
            meteor.position.set(
                (Math.random() - 0.5) * 8000,
                (Math.random() - 0.5) * 6000,
                -4000 - Math.random() * 5000
            );
            // 유성우 속도 역시 30% 수준으로 극한 감속
            meteor.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 8, 
                (Math.random() - 0.5) * 8 - 2, 
                15 + Math.random() * 20 
            );
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            targetX = mouseX * 400; 
            targetY = mouseY * 400;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            updateExplosionCenter(event.clientX, event.clientY); 
            if(isHolding) { 
                lastHeldX = event.clientX;
                lastHeldY = event.clientY;
            }
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                updateExplosionCenter(touch.clientX, touch.clientY); 
                if(isHolding) { 
                    lastHeldX = touch.clientX;
                    lastHeldY = touch.clientY;
                }
            }
        }

        function triggerHoldStart(clientX, clientY) {
            isHolding = true; 
            waveEffect.classList.add('charging'); 
            holdStartTime = -1; 
            lastHeldX = clientX;
            lastHeldY = clientY;
            shockStrength = 0.0;   
        }

        function triggerHoldEnd() {
            isHolding = false; 
            waveEffect.classList.remove('charging'); 
            holdStartTime = -1;
            shockStrength = 1.0; 
        }

        function onMouseDown(event) { triggerHoldStart(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                event.preventDefault(); 
                triggerHoldStart(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            // 카메라 반응 속도도 감속 (0.015 -> 0.005)
            camera.position.x += (targetX - camera.position.x) * 0.005;
            camera.position.y += (targetY - camera.position.y) * 0.005;
            camera.lookAt(scene.position);

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            if (isHolding) {
                if (holdStartTime < 0) holdStartTime = time;
                
                let holdDuration = (time - holdStartTime) / 1000.0;
                let progress = Math.min(holdDuration / 10.0, 1.0); 

                energyLevel = progress; 
                gatherStrength = progress; 
                shockStrength = 0.0; 
                
                // 빛의 크기를 50% 수준으로 억제하여 더 작게 응축 (최대 1.6 정도까지만 성장)
                waveScale = 0.1 + (progress * 1.5) + Math.sin(time * 0.002) * 0.05; 
                
                waveOpacity = progress; 
            } else {
                // 폭발 및 페이드아웃 속도 극도로 감속 (아주 천천히 폭발하고 사라짐)
                gatherStrength *= 0.98; 
                shockStrength *= 0.998; 
                energyLevel *= 0.995;    
                
                // 거대하게 팽창하지만 매우 느리게 퍼져나감 (0.0075 -> 0.002)
                waveScale += (60.0 - waveScale) * 0.002; 
                
                // 매우 천천히 사라짐 (0.99 -> 0.995)
                waveOpacity *= 0.995; 
            }

            particlesMaterial.uniforms.uEnergyLevel.value = energyLevel;
            particlesMaterial.uniforms.uShockStrength.value = shockStrength;
            particlesMaterial.uniforms.uGatherStrength.value = gatherStrength;
            particlesMaterial.uniforms.uTime.value = time * 0.001; 
            
            if(isHolding) {
                waveEffect.style.left = lastHeldX + 'px';
                waveEffect.style.top = lastHeldY + 'px';
            }

            if (isHolding || waveOpacity > 0.005) {
                waveEffect.style.transform = `translate(-50%, -50%) scale(${waveScale})`;
                waveEffect.style.opacity = waveOpacity;
            } else if (waveScale > 0) {
                waveScale = 0;
                waveEffect.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
