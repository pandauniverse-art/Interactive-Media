<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Explosion Media Art - Balanced</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uExplosionTime;
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying vec2 vUv;
        varying float vDistanceFactor;

        void main() {
            vUv = uv;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float dist = distance(uExplosionCenter, screenPos);
            
            vDistanceFactor = mix(1.0, 0.0, uExplosionTime);
            float force = mix(1.0, 0.1, dist) * uExplosionTime * 100.0; // 넓어진 공간에 맞춰 폭발 힘 약간 상향
            vec2 direction = normalize(screenPos - uExplosionCenter);
            
            // 폭발 방향에 z축 요소를 약간 추가하여 입체감 향상
            vec4 finalPosition = projectionMatrix * (mvPosition + vec4(direction * force, force * 0.2, 0.0));
            gl_Position = finalPosition;
            gl_PointSize = aSize * (1.0 + uExplosionTime * 3.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vDistanceFactor;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            vec3 color = mix(vec3(0.01, 0.1, 0.2), vec3(1.0, 1.0, 1.0), vDistanceFactor);
            gl_FragColor = vec4(color, vDistanceFactor * 0.8); // 투명도 약간 감소
        }
    </script>

    <script>
        let scene, camera, renderer, composer, bloomPass, particlesMaterial;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        let explosionTime = 0.0;

        // --- 중요: 밸런스 조정 변수 ---
        const PARTICLE_COUNT = 250000;        // 1. 파티클 수 절반으로 감소 (25만 개)
        const SPACE_RANGE = 10000;           // 3. 우주 공간 범위 2배로 확장 (기존 5000)
        const BLOOM_INTENSITY_NORMAL = 0.5;
        const BLOOM_INTENSITY_EXPLOSION = 2.5; // 2. 클릭 시 번쩍임 밝기 1/2로 감소 (기존 5.0)

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 20000); // 뷰 거리 확장
            camera.position.z = 3000; // 넓어진 공간을 보기 위해 카메라를 더 뒤로 이동

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            // 확광해진 공간 범위(SPACE_RANGE) 적용
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE); // x
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE); // y
                positions[i * 3 + 2] = THREE.MathUtils.randFloatSpread(SPACE_RANGE); // z
                sizes[i] = Math.random() * 2.5; // 입자 크기 약간 확대
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uExplosionTime: { value: 0.0 },
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 포스트 프로세싱 설정
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));

            bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                BLOOM_INTENSITY_NORMAL, // 초기 강도
                0.5, // 반경 약간 확대
                0.8 // 임계값 약간 하향
            );
            composer.addPass(bloomPass);

            // 이벤트 리스너
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onClick);
            
            document.addEventListener('touchstart', onTouchMove, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onClick, { passive: false });
            
            window.addEventListener('resize', onWindowResize);
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            // 넓어진 공간에 맞춰 카메라 움직임 범위 확대
            targetX = mouseX * 500; 
            targetY = mouseY * 500;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { updateExplosionCenter(event.clientX, event.clientY); }
        function onTouchMove(event) { if (event.touches.length > 0) updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY); }

        function onClick(event) {
            explosionTime = 1.0;
            bloomPass.strength = BLOOM_INTENSITY_EXPLOSION; // 2.5로 번쩍임
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            explosionTime *= 0.96; // 0.95 -> 0.96으로 폭발 페이드아웃 약간 속도 감소
            particlesMaterial.uniforms.uExplosionTime.value = explosionTime;
            particlesMaterial.uniforms.uTime.value = time * 0.001;
            
            // 블룸 강도 페이드아웃
            bloomPass.strength += (BLOOM_INTENSITY_NORMAL - bloomPass.strength) * 0.05;

            composer.render();
        }
    </script>
</body>
</html>
