<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Stable Camera & Epic Big Bang</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        #waveEffect {
            position: fixed;
            width: 20vmin; 
            height: 20vmin;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: screen; 
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,230,255,1) 40%, rgba(100,180,255,0.4) 60%, transparent 80%);
            box-shadow: 0 0 150px 70px rgba(100, 200, 255, 0.6), 0 0 300px 150px rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(12px) brightness(2.0); 
        }
    </style>
</head>
<body>
    <div id="waveEffect"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uEnergyLevel;
        uniform float uShockStrength;
        uniform float uGatherStrength; 
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying float vAlpha;
        varying float vShock; 
        varying float vGatherPhase; 

        void main() {
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 18.0 + 5000.0, 10000.0) - 5000.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            
            vec2 targetMvXy = uExplosionCenter * abs(mvPosition.z) * 0.8; 
            vec2 mvDirToCenter = targetMvXy - mvPosition.xy;
            float mvDist = length(mvDirToCenter);
            vec2 mvDirNorm = mvDist > 0.001 ? (mvDirToCenter / mvDist) : vec2(0.0);

            float phase = fract(uTime * 0.13 + aSize * 15.0); 
            vGatherPhase = phase * uGatherStrength; 

            float easePhase = phase * phase; 
            
            vec2 gatherMove = mvDirToCenter * easePhase * uGatherStrength;
            vec2 mvSwirl = vec2(-mvDirNorm.y, mvDirNorm.x) * mvDist * sin(phase * 3.14) * uGatherStrength * 1.5;

            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float distToCenterScreen = distance(uExplosionCenter, screenPos);
            float localEffect = exp(-distToCenterScreen * 5.0);
            
            // 1. 파티클 빅뱅 폭발력 대폭 강화 (기존 1500.0 -> 8000.0으로 5배 이상 상향)
            float pushForce = localEffect * uShockStrength * 8000.0; 
            vec2 pushMove = -mvDirNorm * pushForce; 

            mvPosition.xy += gatherMove + mvSwirl + pushMove;
            
            // 폭발 시 Z축(앞으로 튀어나오는) 힘도 강화 (기존 0.1 -> 0.3)
            mvPosition.z += pushForce * 0.3 - (easePhase * 800.0 * uGatherStrength); 

            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aSize; 
            
            vAlpha = 0.36 + (localEffect * uEnergyLevel * 60.0); 
            vShock = uShockStrength * localEffect * 3.0;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vAlpha;
        varying float vShock;
        varying float vGatherPhase;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            float gatherFade = 1.0 - smoothstep(0.8, 1.0, vGatherPhase);

            vec3 baseColor = vec3(1.0, 1.0, 1.0);
            vec3 explosionColor = vec3(0.3, 0.9, 1.0); 
            
            vec3 finalColor = mix(baseColor, explosionColor, min(vShock, 1.0));
            vec3 gatherColor = mix(finalColor, vec3(0.5, 0.9, 1.0), vGatherPhase);
            
            gl_FragColor = vec4(gatherColor, (vAlpha + vShock) * gatherFade); 
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let waveEffect; 
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        
        let energyLevel = 0.0;    
        let shockStrength = 0.0;  
        let gatherStrength = 0.0; 
        let waveOpacity = 0.0; 
        let waveScale = 0.0;
        let explosionBrightness = 2.0; 

        let isHolding = false;
        let holdStartTime = -1; 
        let lastHeldX = 0, lastHeldY = 0; 

        const meteors = [];
        const PARTICLE_COUNT = 125000;
        const SPACE_RANGE = 10000;

        init();
        animate();

        function init() {
            waveEffect = document.getElementById('waveEffect');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                sizes[i] = Math.random() * 2.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uEnergyLevel: { value: 0.0 },     
                    uShockStrength: { value: 0.0 },   
                    uGatherStrength: { value: 0.0 },  
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            createMeteors(10); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 

            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 

            window.addEventListener('resize', onWindowResize);
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            
            const meteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        function resetMeteor(meteor) {
            meteor.position.set(
                (Math.random() - 0.5) * 8000,
                (Math.random() - 0.5) * 6000,
                -4000 - Math.random() * 5000
            );
            meteor.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 8, 
                (Math.random() - 0.5) * 8 - 2, 
                15 + Math.random() * 20 
            );
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            // 2. 카메라 왜곡을 기존(80) 기준 10% 수준인 '8'로 대폭 축소
            targetX = mouseX * 8; 
            targetY = mouseY * 8;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            updateExplosionCenter(event.clientX, event.clientY); 
            if(isHolding) { 
                lastHeldX = event.clientX;
                lastHeldY = event.clientY;
            }
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                updateExplosionCenter(touch.clientX, touch.clientY); 
                if(isHolding) { 
                    lastHeldX = touch.clientX;
                    lastHeldY = touch.clientY;
                }
            }
        }

        function triggerHoldStart(clientX, clientY) {
            isHolding = true; 
            holdStartTime = -1; 
            lastHeldX = clientX;
            lastHeldY = clientY;
            shockStrength = 0.0;   
        }

        function triggerHoldEnd() {
            if (isHolding) { 
                isHolding = false; 
                holdStartTime = -1;
                shockStrength = 1.0; 
                explosionBrightness = Math.max(120.0, explosionBrightness * 1.5); 
            }
        }

        function onMouseDown(event) { triggerHoldStart(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                event.preventDefault(); 
                triggerHoldStart(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.005;
            camera.position.y += (targetY - camera.position.y) * 0.005;
            camera.lookAt(scene.position);

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            if (isHolding) {
                if (holdStartTime < 0) holdStartTime = time;
                
                let holdDuration = (time - holdStartTime) / 1000.0;
                let progress = Math.min(holdDuration / 10.0, 1.0); 

                energyLevel = progress; 
                gatherStrength = progress; 
                shockStrength = 0.0; 
                
                waveScale = 0.1 + (progress * 1.5) + Math.sin(time * 0.002) * 0.05; 
                waveOpacity = progress; 
                
                explosionBrightness = 2.0 + Math.pow(progress, 5.0) * 78.0; 
            } else {
                gatherStrength *= 0.98; 
                shockStrength *= 0.998; 
                energyLevel *= 0.995;    
                
                waveScale += (60.0 - waveScale) * 0.002; 
                waveOpacity *= 0.995; 
                
                explosionBrightness = Math.max(2.0, explosionBrightness * 0.96);
            }

            particlesMaterial.uniforms.uEnergyLevel.value = energyLevel;
            particlesMaterial.uniforms.uShockStrength.value = shockStrength;
            particlesMaterial.uniforms.uGatherStrength.value = gatherStrength;
            particlesMaterial.uniforms.uTime.value = time * 0.001; 
            
            if(isHolding) {
                waveEffect.style.left = lastHeldX + 'px';
                waveEffect.style.top = lastHeldY + 'px';
            }

            if (isHolding || waveOpacity > 0.005) {
                waveEffect.style.transform = `translate(-50%, -50%) scale(${waveScale})`;
                waveEffect.style.opacity = waveOpacity;
                waveEffect.style.filter = `blur(12px) brightness(${explosionBrightness})`; 
            } else if (waveScale > 0) {
                waveScale = 0;
                waveEffect.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
