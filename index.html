<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Mouse Pointer Light Sphere</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        #rayEffect {
            position: fixed;
            width: 0vmin; 
            height: 0vmin;
            --max-size: 12vmin;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: screen; 
            
            background: 
                repeating-conic-gradient(from 0deg, transparent 0deg, rgba(200,230,255,0.9) 2deg, transparent 4deg, transparent 45deg),
                radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(150,200,255,0.8) 30%, transparent 70%);
            border-radius: 50%;
            
            filter: blur(2px); 
            box-shadow: 0 0 75px 30px rgba(100, 200, 255, 0.8), 0 0 150px 60px rgba(255, 255, 255, 0.5);
            
            animation: spin 10s linear infinite;
        }

        #rayEffectOverlay {
            position: fixed;
            width: 0vmin; 
            height: 0vmin;
            --max-size: 12vmin;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0; 
            pointer-events: none;
            z-index: 101; 
            mix-blend-mode: screen; 
            
            background: 
                repeating-conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,1.0) 1deg, transparent 3deg, transparent 60deg),
                radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 40%, transparent 80%);
            border-radius: 50%;
            
            filter: blur(4px); 
            box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.7);
            
            animation: spin-reverse 8s linear infinite;
        }

        @keyframes spin { 
            100% { transform: translate(-50%, -50%) rotate(360deg); } 
        }
        @keyframes spin-reverse { 
            100% { transform: translate(-50%, -50%) rotate(-360deg); } 
        }

        #burstEffect {
            position: fixed;
            width: 0vmin; 
            height: 0vmin;
            --max-size: 40vmin; 
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            z-index: 102; 
            mix-blend-mode: screen; 
            background-image: url('image_1.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: brightness(2.0); 
        }

        #shockwaveEffect {
            position: fixed;
            width: 0vmin;
            height: 0vmin;
            --max-size: 150vmin; 
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            z-index: 103; 
            mix-blend-mode: overlay; 
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3); 
            background: radial-gradient(circle, transparent 70%, rgba(255, 255, 255, 0.1) 80%, transparent 90%);
            box-shadow: 0 0 100px 20px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(6px) brightness(1.2); 
        }
    </style>
</head>
<body>
    <div id="rayEffect"></div>
    <div id="rayEffectOverlay"></div>
    <div id="burstEffect"></div>
    <div id="shockwaveEffect"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="bgVertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uGatherProgress; 
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying float vAlpha;

        void main() {
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 15.0 + 5000.0, 10000.0) - 5000.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            
            vec2 targetMvXy = uExplosionCenter * abs(mvPosition.z) * 0.8; 
            vec2 mvDirToCenter = targetMvXy - mvPosition.xy;
            float mvDist = length(mvDirToCenter);
            vec2 mvDirNorm = mvDist > 0.001 ? (mvDirToCenter / mvDist) : vec2(0.0);

            float phase = fract(uTime * 0.1 + aSize * 15.0); 
            float easePhase = phase * phase; 
            
            float powerProgress = pow(uGatherProgress, 3.0);

            vec2 gatherMove = mvDirToCenter * easePhase * powerProgress;
            vec2 mvSwirl = vec2(-mvDirNorm.y, mvDirNorm.x) * mvDist * sin(phase * 3.14) * powerProgress * 2.25;

            mvPosition.xy += gatherMove + mvSwirl;
            mvPosition.z -= easePhase * 2400.0 * powerProgress; 

            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aSize; 
            
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float distToCenter = distance(uExplosionCenter, screenPos);
            float localEffect = exp(-distToCenter * 3.3);

            vAlpha = 0.3 + (localEffect * uGatherProgress * 3.0); 
        }
    </script>

    <script id="bgFragmentShader" type="x-shader/x-fragment">
        varying float vAlpha;
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            gl_FragColor = vec4(vec3(3.0), vAlpha); 
        }
    </script>

    <script id="burstVertexShader" type="x-shader/x-vertex">
        uniform float uBurstTime;
        uniform vec2 uBurstCenter;
        attribute vec3 aVelocity;
        attribute float aSize;

        varying float vBurstAlpha;

        void main() {
            vec3 finalPos = position + aVelocity * uBurstTime * 400.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
            mvPosition.xy += uBurstCenter * 2000.0; 

            gl_Position = projectionMatrix * mvPosition;
            
            float progress = smoothstep(0.0, 12.0, uBurstTime); 
            gl_PointSize = aSize * (1.0 - progress); 
            vBurstAlpha = 1.0 - progress; 
        }
    </script>

    <script id="burstFragmentShader" type="x-shader/x-fragment">
        varying float vBurstAlpha;
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5 || vBurstAlpha <= 0.0) discard;
            
            vec3 coreColor = vec3(1.0, 1.0, 1.0);
            vec3 edgeColor = vec3(0.3, 0.8, 1.0);
            vec3 color = mix(edgeColor, coreColor, vBurstAlpha);
            
            gl_FragColor = vec4(color, vBurstAlpha);
        }
    </script>

    <script>
        let scene, camera, renderer;
        let bgParticlesMaterial, bgParticles;
        let burstParticlesMaterial, burstParticles;
        let rayEffect, rayEffectOverlay, burstEffect, shockwaveEffect; 
        
        let mouseX = 0, mouseY = 0;
        
        let isHolding = false;
        let lastHeldX = window.innerWidth / 2;
        let lastHeldY = window.innerHeight / 2;
        
        let targetProgress = 0.0;
        let currentProgress = 0.0; 
        let rayScale = 0.0; 
        let rayOpacity = 0.0; 
        let explosionBrightness = 2.0; 

        let burstTime = 0.0;
        let isBursting = false;

        let mouseSphere; // 1. 마우스 포인터 구체 메시 변수

        const BG_PARTICLE_COUNT = 160000; 
        const BURST_PARTICLE_COUNT = 120000; 
        const SPACE_RANGE = 10000;
        
        const meteors = [];         
        const chargingMeteors = []; 
        const burstMeteors = [];    
        let burstMeteorMaterial;    

        init();
        animate();

        function init() {
            rayEffect = document.getElementById('rayEffect');
            rayEffectOverlay = document.getElementById('rayEffectOverlay'); 
            burstEffect = document.getElementById('burstEffect');
            shockwaveEffect = document.getElementById('shockwaveEffect');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const bgGeom = new THREE.BufferGeometry();
            const bgPos = new Float32Array(BG_PARTICLE_COUNT * 3);
            const bgSizes = new Float32Array(BG_PARTICLE_COUNT);

            for (let i = 0; i < BG_PARTICLE_COUNT; i++) {
                bgPos[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                bgPos[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                bgPos[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                bgSizes[i] = Math.random() * 2.0;
            }
            bgGeom.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
            bgGeom.setAttribute('aSize', new THREE.BufferAttribute(bgSizes, 1));

            bgParticlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uGatherProgress: { value: 0.0 },  
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('bgVertexShader').textContent,
                fragmentShader: document.getElementById('bgFragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });
            bgParticles = new THREE.Points(bgGeom, bgParticlesMaterial);
            scene.add(bgParticles);

            const burstGeom = new THREE.BufferGeometry();
            const burstPos = new Float32Array(BURST_PARTICLE_COUNT * 3);
            const burstVel = new Float32Array(BURST_PARTICLE_COUNT * 3);
            const burstSizes = new Float32Array(BURST_PARTICLE_COUNT);

            for (let i = 0; i < BURST_PARTICLE_COUNT; i++) {
                burstPos[i * 3] = 0; burstPos[i * 3 + 1] = 0; burstPos[i * 3 + 2] = 0;
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                const speed = 0.5 + Math.random() * 1.5;
                burstVel[i * 3] = Math.sin(phi) * Math.cos(theta) * speed;
                burstVel[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * speed;
                burstVel[i * 3 + 2] = Math.cos(phi) * speed;
                burstSizes[i] = (1.0 + Math.random() * 4.0) / 3.0; 
            }
            burstGeom.setAttribute('position', new THREE.BufferAttribute(burstPos, 3));
            burstGeom.setAttribute('aVelocity', new THREE.BufferAttribute(burstVel, 3));
            burstGeom.setAttribute('aSize', new THREE.BufferAttribute(burstSizes, 1));

            burstParticlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uBurstTime: { value: 0.0 },
                    uBurstCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('burstVertexShader').textContent,
                fragmentShader: document.getElementById('burstFragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true,
                visible: false 
            });
            burstParticles = new THREE.Points(burstGeom, burstParticlesMaterial);
            scene.add(burstParticles);

            createMeteors(300);
            createChargingMeteors(400);
            createBurstMeteors(1800);

            // 2. 마우스 포인터 작은 빛 구체 메시 생성 및 추가
            const sphereGeom = new THREE.SphereGeometry(15, 16, 16); // 아주 작은 구체
            const sphereMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, // 순백색
                transparent: true, 
                opacity: 0.8, 
                blending: THREE.AdditiveBlending, // 빛나는 효과
                depthTest: false
            });
            mouseSphere = new THREE.Mesh(sphereGeom, sphereMat);
            scene.add(mouseSphere);
            mouseSphere.position.set(0, 0, 1000); // 초기 위치 (카메라와 파티클 중심 사이 깊이)

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 
            window.addEventListener('resize', onWindowResize);
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            const meteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.5, 
                blending: THREE.AdditiveBlending,
                depthTest: false
            });
            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        function resetMeteor(meteor) {
            meteor.position.set(
                (Math.random() - 0.5) * 6000, 
                (Math.random() - 0.5) * 4000, 
                -2000 - Math.random() * 4000 
            );
            meteor.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 2.4,   
                (Math.random() - 0.5) * 2.4 - 0.4, 
                8 + Math.random() * 8          
            );
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function createChargingMeteors(count) {
            const geom = new THREE.CylinderGeometry(0.8, 0.1, 1500, 3); 
            geom.rotateX(Math.PI / 2); 
            
            for(let i = 0; i < count; i++) {
                const mat = new THREE.MeshBasicMaterial({ 
                    color: 0xffffff, 
                    transparent: true, 
                    opacity: 0.0, 
                    blending: THREE.AdditiveBlending,
                    depthTest: false
                });
                const meteor = new MeshWithData(geom, mat);
                meteor.userData.active = false;
                scene.add(meteor);
                chargingMeteors.push(meteor);
            }
        }

        function MeshWithData(geom, mat) {
            return new THREE.Mesh(geom, mat);
        }

        function resetChargingMeteor(meteor, targetPos) {
            const theta = Math.random() * Math.PI * 2;
            const radius = 3500 + Math.random() * 2000; 
            const zDist = (Math.random() - 0.5) * 4000;

            meteor.position.set(
                targetPos.x + Math.cos(theta) * radius,
                targetPos.y + Math.sin(theta) * radius,
                targetPos.z + zDist
            );

            const dir = new THREE.Vector3().subVectors(targetPos, meteor.position).normalize();
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);
            
            meteor.userData.direction = dir;
            meteor.userData.speed = 40 + Math.random() * 60; 
        }

        function createBurstMeteors(count) {
            const geom = new THREE.CylinderGeometry(2, 0.2, 1200, 3);
            geom.rotateX(Math.PI / 2); 
            geom.translate(0, 0, 600); 
            
            burstMeteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffddaa, 
                transparent: true, 
                opacity: 0.0, 
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(geom, burstMeteorMaterial);
                meteor.scale.z = 0.001; 
                scene.add(meteor);
                burstMeteors.push(meteor);
            }
        }

        function getMouse3DTarget() {
            let vec = new THREE.Vector3(mouseX, mouseY, 0.5);
            vec.unproject(camera);
            let dir = vec.sub(camera.position).normalize();
            let dist = -camera.position.z / dir.z; 
            return camera.position.clone().add(dir.multiplyScalar(dist));
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            bgParticlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            if(isHolding) { 
                lastHeldX = event.clientX;
                lastHeldY = event.clientY;
            }
            updateExplosionCenter(event.clientX, event.clientY); 
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                if(isHolding) { 
                    lastHeldX = touch.clientX;
                    lastHeldY = touch.clientY;
                }
                updateExplosionCenter(touch.clientX, touch.clientY); 
            }
        }

        function triggerHoldStart(clientX, clientY) {
            isHolding = true; 
            targetProgress = 1.0;
            lastHeldX = clientX;
            lastHeldY = clientY;
            updateExplosionCenter(clientX, clientY);
        }

        function triggerHoldEnd() {
            if (isHolding) { 
                isHolding = false; 
                targetProgress = 0.0;
                
                if(currentProgress > 0.1) {
                    isBursting = true;
                    burstTime = 0.0;
                    
                    burstParticlesMaterial.visible = true;
                    burstParticlesMaterial.uniforms.uBurstCenter.value.set(mouseX, mouseY);
                    explosionBrightness = Math.max(240.0, explosionBrightness * 2.0); 

                    burstEffect.style.left = lastHeldX + 'px';
                    burstEffect.style.top = lastHeldY + 'px';
                    burstEffect.style.transition = 'none';
                    burstEffect.style.width = '0vmin';
                    burstEffect.style.height = '0vmin';
                    burstEffect.style.opacity = '1';
                    burstEffect.style.transform = 'translate(-50%, -50%) scale(0)';
                    
                    requestAnimationFrame(() => {
                        burstEffect.style.transition = 'width 0.8s ease-out, height 0.8s ease-out, transform 0.8s ease-out, opacity 0.8s ease-in';
                        burstEffect.style.width = 'var(--max-size)';
                        burstEffect.style.height = 'var(--max-size)';
                        burstEffect.style.transform = 'translate(-50%, -50%) scale(1)';
                        burstEffect.style.opacity = '0'; 
                    });

                    shockwaveEffect.style.left = lastHeldX + 'px';
                    shockwaveEffect.style.top = lastHeldY + 'px';
                    shockwaveEffect.style.transition = 'none';
                    shockwaveEffect.style.width = '0vmin';
                    shockwaveEffect.style.height = '0vmin';
                    shockwaveEffect.style.opacity = '1';
                    shockwaveEffect.style.transform = 'translate(-50%, -50%) scale(0)';
                    
                    requestAnimationFrame(() => {
                        shockwaveEffect.style.transition = 'width 15.0s cubic-bezier(0.1, 0.8, 0.2, 1), height 15.0s cubic-bezier(0.1, 0.8, 0.2, 1), transform 15.0s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 15.0s ease-out';
                        shockwaveEffect.style.width = 'var(--max-size)';
                        shockwaveEffect.style.height = 'var(--max-size)';
                        shockwaveEffect.style.transform = 'translate(-50%, -50%) scale(1)';
                        shockwaveEffect.style.opacity = '0'; 
                    });

                    const burstTarget3D = getMouse3DTarget();
                    burstMeteorMaterial.opacity = 1.0; 

                    burstMeteors.forEach(meteor => {
                        meteor.position.copy(burstTarget3D);
                        meteor.scale.set(1, 1, 0.001); 
                        
                        const u = Math.random();
                        const v = Math.random();
                        const theta = u * 2.0 * Math.PI;
                        const phi = Math.acos(2.0 * v - 1.0);
                        
                        const speed = 7.5 + Math.random() * 12.5; 

                        const vx = Math.sin(phi) * Math.cos(theta) * speed;
                        const vy = Math.sin(phi) * Math.sin(theta) * speed;
                        const vz = Math.cos(phi) * speed;

                        const vel = new THREE.Vector3(vx, vy, vz);
                        meteor.userData.velocity = vel;
                        
                        meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), vel.clone().normalize());
                    });
                }
            }
        }

        function onMouseDown(event) { triggerHoldStart(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                event.preventDefault(); 
                triggerHoldStart(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            // 3. 마우스 구체 위치 업데이트 (3D 공간으로 역투영)
            let mousePos3D = new THREE.Vector3(mouseX, mouseY, 0.5); // Normalized device coordinates
            mousePos3D.unproject(camera); // Transform to world space
            let dir = mousePos3D.sub(camera.position).normalize(); // Direction from camera to mouse unprojected point
            let distance = (1000 - camera.position.z) / dir.z; // Distance to reach Z=1000 plane
            let finalPos = camera.position.clone().add(dir.multiplyScalar(distance)); // Final position on Z=1000
            mouseSphere.position.copy(finalPos); // Update sphere position

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            const mouseTarget3D = getMouse3DTarget();
            
            const activeChargingLimit = Math.floor(50 + (350 * currentProgress));

            chargingMeteors.forEach((meteor, index) => {
                if (isHolding && index < activeChargingLimit) {
                    if (!meteor.userData.active) {
                        resetChargingMeteor(meteor, mouseTarget3D);
                        meteor.userData.active = true;
                        meteor.material.opacity = 0.2; 
                    }
                    
                    if(meteor.material.opacity < 1.0) {
                        meteor.material.opacity = Math.min(1.0, meteor.material.opacity + 0.02);
                    }

                    const dir = new THREE.Vector3().subVectors(mouseTarget3D, meteor.position).normalize();
                    meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);
                    meteor.position.add(dir.multiplyScalar(meteor.userData.speed));

                    if (meteor.position.distanceTo(mouseTarget3D) < 200) {
                        resetChargingMeteor(meteor, mouseTarget3D);
                    }
                } else {
                    meteor.material.opacity = Math.max(meteor.material.opacity - 0.1, 0.0);
                    if (meteor.material.opacity <= 0) {
                        meteor.userData.active = false;
                    }
                }
            });

            if (isBursting) {
                if (burstTime < 6.0) {
                    burstMeteorMaterial.opacity = 1.0 - (burstTime / 6.0);
                    burstMeteors.forEach(meteor => {
                        meteor.scale.z = Math.min(1.0, meteor.scale.z + 0.1); 
                        meteor.position.add(meteor.userData.velocity);
                    });
                }
            }

            let easing = isHolding ? 0.005 : 0.02; 
            currentProgress += (targetProgress - currentProgress) * easing;
            
            rayEffect.style.width = `calc(var(--max-size) * ${currentProgress})`;
            rayEffect.style.height = `calc(var(--max-size) * ${currentProgress})`;
            
            rayEffectOverlay.style.width = `calc(var(--max-size) * ${currentProgress})`;
            rayEffectOverlay.style.height = `calc(var(--max-size) * ${currentProgress})`;

            rayScale = currentProgress; 
            rayOpacity = currentProgress; 

            bgParticlesMaterial.uniforms.uGatherProgress.value = currentProgress;
            bgParticlesMaterial.uniforms.uTime.value = time * 0.001; 

            if (isHolding) {
                explosionBrightness = 2.0 + Math.pow(currentProgress, 5.0) * 158.0; 
            } else {
                explosionBrightness = Math.max(2.0, explosionBrightness * 0.96);
            }

            if (isBursting) {
                burstTime += 0.016;
                burstParticlesMaterial.uniforms.uBurstTime.value = burstTime;
                
                if (burstTime > 12.0) {
                    isBursting = false;
                    burstParticlesMaterial.visible = false;
                }
            }
            
            rayEffect.style.left = lastHeldX + 'px';
            rayEffect.style.top = lastHeldY + 'px';
            
            rayEffectOverlay.style.left = lastHeldX + 'px';
            rayEffectOverlay.style.top = lastHeldY + 'px';

            if (rayScale > 0.01) {
                rayEffect.style.transform = `translate(-50%, -50%) scale(${rayScale})`;
                rayEffect.style.opacity = rayOpacity;
                rayEffect.style.filter = `blur(2px) brightness(${explosionBrightness})`; 
                
                rayEffectOverlay.style.transform = `translate(-50%, -50%) scale(${rayScale})`;
                rayEffectOverlay.style.opacity = currentProgress; 
                rayEffectOverlay.style.filter = `blur(4px) brightness(${explosionBrightness * 1.5})`; 
            } else {
                rayEffect.style.transform = `translate(-50%, -50%) scale(0)`;
                rayEffectOverlay.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
