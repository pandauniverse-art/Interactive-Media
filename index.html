<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Overcharge & Massive Big Bang</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        /* 기존 렌즈 플레어 코어 */
        #rayEffect {
            position: fixed;
            width: 20vmin; 
            height: 20vmin;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: screen; 
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,230,255,0.8) 15%, rgba(100,180,255,0.4) 40%, transparent 70%);
            box-shadow: 0 0 100px 40px rgba(100, 200, 255, 0.4), 0 0 200px 80px rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            filter: blur(12px) brightness(2.0); 
        }

        /* 1. 폭발 버스트 이펙트 (image_1.png 사용) */
        #burstEffect {
            position: fixed;
            width: 0vmin; /* 초기 크기 0 */
            height: 0vmin;
            --max-size: 30vmin; /* 폭발 시 최대 크기 (크게) */
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            z-index: 101; /* rayEffect보다 앞에 */
            mix-blend-mode: screen; /* 또는 add */
            background-image: url('image_1.png'); /* image_1.png 사용 */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: brightness(2.0); /* image_1.png를 더 밝게 */
            
        }

        /* 2. 공기 파장 이펙트 (Shockwave/Refraction) */
        #shockwaveEffect {
            position: fixed;
            width: 0vmin;
            height: 0vmin;
            --max-size: 150vmin; /* 화면 밖까지 퍼지게 */
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            z-index: 102; /* 가장 앞에 */
            mix-blend-mode: overlay; /* overlay 또는 soft-light로 굴절 느낌 */
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3); /* 희미한 테두리 */
            background: radial-gradient(circle, transparent 70%, rgba(255, 255, 255, 0.1) 80%, transparent 90%);
            box-shadow: 0 0 100px 20px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px) brightness(1.2); /* 배경 굴절 효과 */
        }
    </style>
</head>
<body>
    <div id="rayEffect"></div>
    <div id="burstEffect"></div> <div id="shockwaveEffect"></div> <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uEnergyLevel;
        uniform float uShockStrength;
        uniform float uGatherStrength; 
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying float vAlpha;
        varying float vShock; 
        varying float vGatherPhase; 

        void main() {
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 18.0 + 5000.0, 10000.0) - 5000.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            
            vec2 targetMvXy = uExplosionCenter * abs(mvPosition.z) * 0.8; 
            vec2 mvDirToCenter = targetMvXy - mvPosition.xy;
            float mvDist = length(mvDirToCenter);
            vec2 mvDirNorm = mvDist > 0.001 ? (mvDirToCenter / mvDist) : vec2(0.0);

            float phase = fract(uTime * 0.13 + aSize * 15.0); 
            vGatherPhase = phase * uGatherStrength; 

            float easePhase = phase * phase; 
            
            vec2 gatherMove = mvDirToCenter * easePhase * uGatherStrength;
            vec2 mvSwirl = vec2(-mvDirNorm.y, mvDirNorm.x) * mvDist * sin(phase * 3.14) * uGatherStrength * 1.5;

            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float distToCenterScreen = distance(uExplosionCenter, screenPos);
            float localEffect = exp(-distToCenterScreen * 5.0);
            
            float pushForce = localEffect * uShockStrength * 1500.0; 
            vec2 pushMove = -mvDirNorm * pushForce; 

            mvPosition.xy += gatherMove + mvSwirl + pushMove;
            mvPosition.z += pushForce * 0.1 - (easePhase * 800.0 * uGatherStrength); 

            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aSize; 
            
            vAlpha = 0.36 + (localEffect * uEnergyLevel * 25.0); 
            vShock = uShockStrength * localEffect * 3.0;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vAlpha;
        varying float vShock;
        varying float vGatherPhase;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            float gatherFade = 1.0 - smoothstep(0.8, 1.0, vGatherPhase);

            vec3 baseColor = vec3(1.0, 1.0, 1.0);
            vec3 explosionColor = vec3(0.3, 0.9, 1.0); 
            
            vec3 finalColor = mix(baseColor, explosionColor, min(vShock, 1.0));
            vec3 gatherColor = mix(finalColor, vec3(0.5, 0.9, 1.0), vGatherPhase);
            
            gl_FragColor = vec4(gatherColor, (vAlpha + vShock) * gatherFade); 
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let rayEffect, burstEffect, shockwaveEffect; // 새 요소 추가
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        
        let energyLevel = 0.0;    
        let shockStrength = 0.0;  
        let gatherStrength = 0.0; 
        let waveOpacity = 0.0; 
        let waveScale = 0.0;
        let explosionBrightness = 2.0; 

        let isHolding = false;
        let holdStartTime = -1; 
        let lastHeldX = 0, lastHeldY = 0;

        const meteors = [];
        const PARTICLE_COUNT = 125000;
        const SPACE_RANGE = 10000;

        init();
        animate();

        function init() {
            rayEffect = document.getElementById('rayEffect');
            burstEffect = document.getElementById('burstEffect'); // 새 요소 가져오기
            shockwaveEffect = document.getElementById('shockwaveEffect'); // 새 요소 가져오기

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                sizes[i] = Math.random() * 2.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uEnergyLevel: { value: 0.0 },     
                    uShockStrength: { value: 0.0 },   
                    uGatherStrength: { value: 0.0 },  
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            createMeteors(10); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 

            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 

            window.addEventListener('resize', onWindowResize);
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            
            const meteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        function resetMeteor(meteor) {
            meteor.position.set(
                (Math.random() - 0.5) * 8000,
                (Math.random() - 0.5) * 6000,
                -4000 - Math.random() * 5000
            );
            meteor.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 8, 
                (Math.random() - 0.5) * 8 - 2, 
                15 + Math.random() * 20 
            );
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            targetX = mouseX * 80; 
            targetY = mouseY * 80;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            updateExplosionCenter(event.clientX, event.clientY); 
            if(isHolding) { 
                lastHeldX = event.clientX;
                lastHeldY = event.clientY;
            }
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                updateExplosionCenter(touch.clientX, touch.clientY); 
                if(isHolding) { 
                    lastHeldX = touch.clientX;
                    lastHeldY = touch.clientY;
                }
            }
        }

        function triggerHoldStart(clientX, clientY) {
            isHolding = true; 
            holdStartTime = -1; 
            lastHeldX = clientX;
            lastHeldY = clientY;
            shockStrength = 0.0;   
        }

        function triggerHoldEnd() {
            if (isHolding) { 
                isHolding = false; 
                holdStartTime = -1;
                shockStrength = 1.0; 
                explosionBrightness = Math.max(40.0, explosionBrightness * 1.5); 

                // --- 새로운 폭발 이펙트 트리거 (JS 트랜지션 사용) ---

                // 1. 폭발 버스트 (image_1.png 사용)
                burstEffect.style.left = lastHeldX + 'px';
                burstEffect.style.top = lastHeldY + 'px';
                burstEffect.style.transition = 'none'; // 이전 트랜지션 제거
                burstEffect.style.width = '0vmin'; // 초기 크기
                burstEffect.style.height = '0vmin';
                burstEffect.style.opacity = '1';
                burstEffect.style.transform = 'translate(-50%, -50%) scale(0)';
                // 브라우저 렌더링을 위한 짤막한 지연
                requestAnimationFrame(() => {
                    burstEffect.style.transition = 'width 0.2s ease-out, height 0.2s ease-out, transform 0.2s ease-out, opacity 0.3s ease-in';
                    burstEffect.style.width = 'var(--max-size)';
                    burstEffect.style.height = 'var(--max-size)';
                    burstEffect.style.transform = 'translate(-50%, -50%) scale(1)';
                    burstEffect.style.opacity = '0'; // 동시에 페이드아웃
                });

                // 2. 공기 파장 (Shockwave/Refraction)
                shockwaveEffect.style.left = lastHeldX + 'px';
                shockwaveEffect.style.top = lastHeldY + 'px';
                shockwaveEffect.style.transition = 'none'; // 이전 트랜지션 제거
                shockwaveEffect.style.width = '0vmin'; // 초기 크기
                shockwaveEffect.style.height = '0vmin';
                shockwaveEffect.style.opacity = '1';
                shockwaveEffect.style.transform = 'translate(-50%, -50%) scale(0)';
                // 브라우저 렌더링을 위한 짤막한 지연
                requestAnimationFrame(() => {
                    shockwaveEffect.style.transition = 'width 0.15s ease-out, height 0.15s ease-out, transform 0.15s ease-out, opacity 0.2s ease-in';
                    shockwaveEffect.style.width = 'var(--max-size)';
                    shockwaveEffect.style.height = 'var(--max-size)';
                    shockwaveEffect.style.transform = 'translate(-50%, -50%) scale(1)';
                    shockwaveEffect.style.opacity = '0'; // 동시에 페이드아웃
                });
            }
        }

        function onMouseDown(event) { triggerHoldStart(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                event.preventDefault(); 
                triggerHoldStart(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.005;
            camera.position.y += (targetY - camera.position.y) * 0.005;
            camera.lookAt(scene.position);

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            if (isHolding) {
                if (holdStartTime < 0) holdStartTime = time;
                
                let holdDuration = (time - holdStartTime) / 1000.0;
                let progress = Math.min(holdDuration / 10.0, 1.0); 

                energyLevel = progress; 
                gatherStrength = progress; 
                shockStrength = 0.0; 
                
                waveScale = 0.1 + (progress * 1.5) + Math.sin(time * 0.002) * 0.05; 
                waveOpacity = progress; 
                
                explosionBrightness = 2.0 + Math.pow(progress, 4.0) * 28.0; 
            } else {
                gatherStrength *= 0.98; 
                shockStrength *= 0.998; 
                energyLevel *= 0.995;    
                
                waveScale += (60.0 - waveScale) * 0.002; 
                waveOpacity *= 0.995; 
                
                explosionBrightness = Math.max(2.0, explosionBrightness * 0.96);
            }

            particlesMaterial.uniforms.uEnergyLevel.value = energyLevel;
            particlesMaterial.uniforms.uShockStrength.value = shockStrength;
            particlesMaterial.uniforms.uGatherStrength.value = gatherStrength;
            particlesMaterial.uniforms.uTime.value = time * 0.001; 
            
            if(isHolding) {
                rayEffect.style.left = lastHeldX + 'px';
                rayEffect.style.top = lastHeldY + 'px';
            }

            if (isHolding || waveOpacity > 0.005) {
                rayEffect.style.transform = `translate(-50%, -50%) scale(${waveScale})`;
                rayEffect.style.opacity = waveOpacity;
                rayEffect.style.filter = `blur(12px) brightness(${explosionBrightness})`; 
            } else if (waveScale > 0) {
                waveScale = 0;
                rayEffect.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
