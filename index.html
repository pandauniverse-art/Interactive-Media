<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Flash Media Art - Localized Glow</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        /* 1. 전체 덮기가 아닌 부분 방사형 빛 무리(Glow) 효과로 변경 */
        #flashEffect {
            position: fixed;
            /* 빛 무리의 크기 설정 (화면 크기에 비례) */
            width: 80vmin; 
            height: 80vmin;
            /* 중심은 완전한 흰색, 바깥으로 갈수록 투명해지는 그라데이션 */
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.8) 20%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            /* x, y 좌표 지정 시 요소의 중앙이 마우스에 오도록 설정 */
            transform: translate(-50%, -50%); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            /* 배경 별들과 자연스럽게 빛이 합쳐지도록 블렌드 모드 추가 */
            mix-blend-mode: screen; 
        }
    </style>
</head>
<body>
    <div id="flashEffect"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uExplosionTime;
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying vec2 vUv;
        varying float vDistanceFactor;

        void main() {
            vUv = uv;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float dist = distance(uExplosionCenter, screenPos);
            
            vDistanceFactor = mix(1.0, 0.0, uExplosionTime);
            float force = mix(1.0, 0.1, dist) * uExplosionTime * 100.0;
            vec2 direction = normalize(screenPos - uExplosionCenter);
            
            vec4 finalPosition = projectionMatrix * (mvPosition + vec4(direction * force, force * 0.2, 0.0));
            gl_Position = finalPosition;
            gl_PointSize = aSize * (1.0 + uExplosionTime * 3.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vDistanceFactor;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            vec3 color = mix(vec3(0.01, 0.1, 0.2), vec3(1.0, 1.0, 1.0), vDistanceFactor);
            gl_FragColor = vec4(color, vDistanceFactor * 0.8);
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let flashEffect; 
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        let explosionTime = 0.0;
        let flashOpacity = 0.0; 

        const PARTICLE_COUNT = 250000;
        const SPACE_RANGE = 10000;

        init();
        animate();

        function init() {
            flashEffect = document.getElementById('flashEffect');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.z = 3000;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                sizes[i] = Math.random() * 2.5;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uExplosionTime: { value: 0.0 },
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 이벤트 리스너 등록
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onClick);
            
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            
            window.addEventListener('resize', onWindowResize);
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            targetX = mouseX * 500; 
            targetY = mouseY * 500;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            updateExplosionCenter(event.clientX, event.clientY); 
        }
        
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY); 
            }
        }

        // 3. 발광 이펙트 트리거 함수 분리 (좌표값을 받아 해당 위치에서 빛나게 함)
        function triggerFlash(clientX, clientY) {
            explosionTime = 1.0;
            flashOpacity = 1.0;
            
            // 빛 무리의 중심을 클릭/터치한 픽셀 좌표로 이동
            flashEffect.style.left = clientX + 'px';
            flashEffect.style.top = clientY + 'px';
        }

        // 마우스 클릭 시
        function onClick(event) {
            triggerFlash(event.clientX, event.clientY);
        }

        // 모바일 화면 터치 시 (터치 즉시 반응하도록 touchstart 사용)
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                triggerFlash(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            explosionTime *= 0.96;
            particlesMaterial.uniforms.uExplosionTime.value = explosionTime;
            particlesMaterial.uniforms.uTime.value = time * 0.001;
            
            // 4. 빛 무리 페이드아웃 적용
            flashOpacity *= 0.90; // 자연스럽게 빛이 사라지도록 설정
            flashEffect.style.opacity = flashOpacity;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
