<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space Big Bang - Fixed Hold & Sustained Universe</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        #bigBangEffect {
            position: fixed;
            width: 10vmin; 
            height: 10vmin;
            /* 좁고 선명한 빛 범위 유지 */
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,225,255,0.9) 15%, rgba(255,255,255,0) 40%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: screen; 
            /* 블러(box-shadow) 제거됨 */
        }
    </style>
</head>
<body>
    <div id="bigBangEffect"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uEnergyLevel;    // 에너지 축적 상태 (밝기) - 0.0 ~ 1.0
        uniform float uShockStrength;   // 폭발 충격파 강도 (입자 push) - 0.0 ~ 1.0
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying vec2 vUv;
        varying float vEnergyFactor;

        void main() {
            vUv = uv;
            vEnergyFactor = uEnergyLevel; // Fragment Shader로 에너지 레벨 전달

            // 천천히 빨려 들어가는 무한 줌인 효과 유지
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 200.0 + 5000.0, 10000.0) - 5000.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float dist = distance(uExplosionCenter, screenPos);
            
            // 1. 충격파 로직 수정: 오직 uShockStrength(폭발) 상태에서만 입자를 밀어냄
            // 누르고 있을 때(uShockStrength=0)는 입자가 밀려나지 않고 배경 유지
            float pushForce = exp(-dist * 3.0) * uShockStrength * 250.0; 
            vec2 direction = normalize(screenPos - uExplosionCenter);
            
            // 최종 위치 계산: pushForce가 0이면 mvPosition 유지 (배경 안정화)
            vec4 finalPosition = projectionMatrix * (mvPosition + vec4(direction * pushForce, pushForce * 0.1, 0.0));
            gl_Position = finalPosition;
            gl_PointSize = aSize * (1.0 + uShockStrength * 5.0); // 폭발 시 입자 거대화
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vEnergyFactor;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            // 2. 밝기 로직 수정: vEnergyFactor(누르는 강도)가 클수록 입자가 '환하게 빛나게' (10% 더 밝게)
            // 누르고 있을 때 배경 별들의 색상이 100% 밝게 유지되어 어두워지는artifact 제거
            vec3 color = mix(vec3(0.02, 0.08, 0.2), vec3(0.9, 1.0, 1.0), vEnergyFactor);
            gl_FragColor = vec4(color, mix(0.6, 1.0, vEnergyFactor));
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let bigBangEffect; 
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        
        // 상태 및 연출 변수 정리
        let energyLevel = 0.0;    // 에너지 축적 상태 (밝기) - Uniform uEnergyLevel
        let shockStrength = 0.0;  // 폭발 충격파 강도 (입자 push) - Uniform uShockStrength
        
        let flashOpacity = 0.0; 
        let flashScale = 0.0;

        let isHolding = false;
        let lastHeldX = 0, lastHeldY = 0;

        const meteors = [];

        const PARTICLE_COUNT = 125000;
        const SPACE_RANGE = 10000;

        init();
        animate();

        function init() {
            bigBangEffect = document.getElementById('bigBangEffect');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                sizes[i] = Math.random() * 2.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            // 3. Uniforms 업데이트: 에너지 레벨과 충격파 강도를 분리하여 셰이더로 전달
            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uEnergyLevel: { value: 0.0 },     // 에너지 축적 상태
                    uShockStrength: { value: 0.0 },   // 폭발 충격파 강도
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            createMeteors(10); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown); 
            document.addEventListener('mouseup', triggerHoldEnd); 

            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', triggerHoldEnd, { passive: false }); 

            window.addEventListener('resize', onWindowResize);
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            
            const meteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        function resetMeteor(meteor) {
            meteor.position.set(
                (Math.random() - 0.5) * 8000,
                (Math.random() - 0.5) * 6000,
                -4000 - Math.random() * 5000
            );
            
            meteor.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 80, 
                (Math.random() - 0.5) * 80 - 20, 
                150 + Math.random() * 200 
            );
            
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            targetX = mouseX * 400; 
            targetY = mouseY * 400;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { 
            updateExplosionCenter(event.clientX, event.clientY); 
            if(isHolding) { 
                lastHeldX = event.clientX;
                lastHeldY = event.clientY;
            }
        }
        function onTouchMove(event) { 
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                updateExplosionCenter(touch.clientX, touch.clientY); 
                if(isHolding) { 
                    lastHeldX = touch.clientX;
                    lastHeldY = touch.clientY;
                }
            }
        }

        function triggerHoldStart(clientX, clientY) {
            isHolding = true; 
            lastHeldX = clientX;
            lastHeldY = clientY;
            
            // 누르기 시작: 에너지 축적 상태로 전환
            energyLevel = 1.0;     // 배경 별들을 즉시 환하게 밝게
            shockStrength = 0.0;   // 충격파는 0으로 고정 (배경 유지)
            
            flashOpacity = 1.0;
            flashScale = 0.5; 
        }

        function triggerHoldEnd() {
            isHolding = false; 
            // 손가락을 떼는 순간: 오직 이때만 폭발 충격파를 트리거 (Spiking to 1.0)
            shockStrength = 1.0;
        }

        function onMouseDown(event) { triggerHoldStart(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                event.preventDefault(); 
                triggerHoldStart(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            // 시간 기반 애니메이션 팩터 계산
            const pulseTime = time * 0.005; // 파장 속도 조절

            // 4. 지속/팽창 로직 업데이트: 일렁이는 파장 및 배경 유지 적용
            if (isHolding) {
                // 누르고 있을 때: 일렁이는 파장 시각화 + **배경 우주 유지**
                energyLevel = 1.0; 
                shockStrength = 0.0; // **CRUCIAL FIX**: 누르고 있을 때 충격파 0 고정 (입자 배경 유지)
                
                // HTML 빛 무리 진동 (0.8 ~ 1.0)
                flashOpacity = 0.9 + Math.sin(pulseTime * 2.0) * 0.1; 
                // HTML 빛 무리 크기 진동 및 절반 축소 (최대 14배 진동)
                const baseHoldScale = 14.0;
                flashScale = baseHoldScale + Math.sin(pulseTime) * 1.0; 
            } else {
                // 손을 떼면 기존의 팽창 및 페이드아웃
                shockStrength *= 0.975;  // 충격파 서서히 감쇄 (burst)
                energyLevel *= 0.965;    // 밝기 서서히 감쇄
                
                // 손을 떼는 순간 극적으로 팽창하되 최대 크기는 절반(40배)으로 제한
                const maxExplosionScale = 40.0;
                flashScale += (maxExplosionScale - flashScale) * 0.03; 
                flashOpacity *= 0.965; // HTML 빛 무리 페이드아웃
            }

            // 5. 업데이트된 Uniforms 셰이더로 전달
            particlesMaterial.uniforms.uEnergyLevel.value = energyLevel;
            particlesMaterial.uniforms.uShockStrength.value = shockStrength;
            particlesMaterial.uniforms.uTime.value = time * 0.001; 
            
            if(isHolding) {
                bigBangEffect.style.left = lastHeldX + 'px';
                bigBangEffect.style.top = lastHeldY + 'px';
            }

            if (isHolding || flashOpacity > 0.005) {
                bigBangEffect.style.transform = `translate(-50%, -50%) scale(${flashScale})`;
                bigBangEffect.style.opacity = flashOpacity;
            } else if (flashScale > 0) {
                flashScale = 0;
                bigBangEffect.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
