<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Inward Shockwave & Ultimate Burst</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        /* 코어 이펙트 그룹 */
        #rayEffectGlow, #rayEffect, #rayEffectOverlay, #rayEffectCondensed {
            position: fixed; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; border-radius: 50%; will-change: transform, opacity, box-shadow;
        }
        #rayEffectGlow { width: 24vmin; height: 24vmin; z-index: 99; mix-blend-mode: screen; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 40%, transparent 80%); filter: blur(16px); box-shadow: 0 0 150px 80px rgba(100, 180, 255, 0.4); }
        #rayEffect { width: 12vmin; height: 12vmin; z-index: 100; mix-blend-mode: screen; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(150,200,255,0.8) 30%, transparent 70%); filter: blur(2px); box-shadow: 0 0 75px 30px rgba(100, 200, 255, 0.8), 0 0 150px 60px rgba(255, 255, 255, 0.5); }
        #rayEffectOverlay { width: 12vmin; height: 12vmin; z-index: 101; mix-blend-mode: screen; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 40%, transparent 80%); filter: blur(4px); box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.7); }
        #rayEffectCondensed { width: 14vmin; height: 14vmin; z-index: 102; mix-blend-mode: screen; background: radial-gradient(circle, #ffffff 10%, #dcf0ff 50%, transparent 80%); filter: blur(2px) brightness(3.0); box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.9), 0 0 200px 80px rgba(0, 170, 255, 0.6); }
        
        /* 폭발 및 파장 그룹 */
        .burst-effect, .shockwave-effect, .fast-shockwave-effect, .flash-effect, .rev-shockwave {
            position: fixed; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; mix-blend-mode: screen; will-change: transform, opacity, width, height;
        }
        .burst-effect { z-index: 103; background-image: url('image_1.png'); background-size: contain; background-repeat: no-repeat; background-position: center; filter: brightness(2.0); }
        .shockwave-effect { z-index: 104; mix-blend-mode: overlay; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3); background: radial-gradient(circle, transparent 70%, rgba(255, 255, 255, 0.1) 80%, transparent 90%); box-shadow: 0 0 100px 20px rgba(255, 255, 255, 0.2); backdrop-filter: blur(6px) brightness(1.2); }
        .fast-shockwave-effect { z-index: 105; mix-blend-mode: overlay; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 0 50px 10px rgba(255, 255, 255, 0.3); backdrop-filter: blur(2px) brightness(1.4); }
        .flash-effect { width: 300vmin; height: 300vmin; z-index: 106; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,1) 10%, rgba(100,180,255,0.5) 30%, transparent 70%); filter: blur(10px) brightness(3.0); }
        
        /* 신규: 안으로 빨려 들어오는 역방향 파장 */
        .rev-shockwave { 
            width: 100vmin; height: 100vmin; z-index: 107; border-radius: 50%; mix-blend-mode: overlay;
            border: 6px solid rgba(200, 240, 255, 0.5); box-shadow: inset 0 0 100px 20px rgba(100, 200, 255, 0.3);
            filter: blur(2px);
        }
    </style>
</head>
<body>
    <div id="rayEffectGlow"></div>
    <div id="rayEffect"></div>
    <div id="rayEffectOverlay"></div>
    <div id="rayEffectCondensed"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="bgVertexShader" type="x-shader/x-vertex">
        uniform float uTime; uniform float uGatherProgress; uniform vec2 uExplosionCenter; uniform float uDistortion; 
        attribute float aSize; varying float vAlpha; varying vec3 vColor; 
        void main() {
            vec3 modPos = position; modPos.z = mod(position.z + uTime * 15.0 + 5000.0, 10000.0) - 5000.0;
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            vec2 targetMvXy = uExplosionCenter * abs(mvPosition.z) * 0.8; 
            vec2 mvDirToCenter = targetMvXy - mvPosition.xy; float mvDist = length(mvDirToCenter);
            vec2 mvDirNorm = mvDist > 0.001 ? (mvDirToCenter / mvDist) : vec2(0.0);
            float phase = fract(uTime * 0.1 + aSize * 15.0); float powerProgress = pow(uGatherProgress, 3.0);
            mvPosition.xy += mvDirToCenter * phase * phase * powerProgress;
            float lensEffect = exp(-mvDist * 0.0005) * uDistortion * 2000.0;
            mvPosition.xy += mvDirNorm * lensEffect; 
            gl_Position = projectionMatrix * mvPosition; gl_PointSize = aSize; 
            float localEffect = exp(-distance(uExplosionCenter, (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w) * 3.3);
            vAlpha = 0.3 + (localEffect * uGatherProgress * 3.0); 
            vec3 targetColor = mix(mix(vec3(0.8, 0.2, 1.0), vec3(0.0, 0.9, 0.8), smoothstep(-1.0, 1.0, sin(position.x * 0.0005) * cos(position.y * 0.0005))), vec3(0.1, 0.3, 1.0), sin(position.z * 0.001) * 0.5 + 0.5);
            vColor = mix(vec3(3.0), targetColor * 4.0, clamp(uGatherProgress * localEffect * 2.0, 0.0, 1.0));
        }
    </script>
    <script id="bgFragmentShader" type="x-shader/x-fragment">
        uniform float uBlackout; varying float vAlpha; varying vec3 vColor; 
        void main() { if (distance(gl_PointCoord, vec2(0.5)) > 0.5) discard; gl_FragColor = vec4(vColor, vAlpha * (1.0 - uBlackout)); }
    </script>
    <script id="burstVertexShader" type="x-shader/x-vertex">
        uniform float uBurstTime; uniform float uBurstPower; uniform vec2 uBurstCenter;
        attribute vec3 aVelocity; attribute float aSize; varying float vBurstAlpha;
        void main() {
            vec4 mvPosition = modelViewMatrix * vec4(position + aVelocity * uBurstTime * 400.0 * uBurstPower, 1.0);
            mvPosition.xy += uBurstCenter * 2000.0; gl_Position = projectionMatrix * mvPosition;
            float progress = smoothstep(0.0, 12.0, uBurstTime); gl_PointSize = aSize * (1.0 - progress); vBurstAlpha = 1.0 - progress; 
        }
    </script>
    <script id="burstFragmentShader" type="x-shader/x-fragment">
        varying float vBurstAlpha;
        void main() { if (distance(gl_PointCoord, vec2(0.5)) > 0.5 || vBurstAlpha <= 0.0) discard; gl_FragColor = vec4(mix(vec3(0.3, 0.8, 1.0), vec3(1.0), vBurstAlpha), vBurstAlpha); }
    </script>

    <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        const Q_MULT = isMobile ? 0.33 : 1.0; 

        // 오디오 안전 로드
        function safeAudio(src) { 
            let a = new Audio(src); 
            a.onerror = () => { a.play = () => Promise.resolve(); }; return a;
        }
        let chargeAudio = safeAudio('charge.mp3'); chargeAudio.loop = true;
        let glitchAudio = safeAudio('glitch.mp3'); glitchAudio.loop = true;

        let scene, camera, renderer, mouseGlow;
        let rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed, bgParticlesMaterial;
        let mouseX = 0, mouseY = 0, isHolding = false, lastHeldX = window.innerWidth/2, lastHeldY = window.innerHeight/2;
        let targetProgress = 0, currentProgress = 0, explosionBrightness = 2.0;
        let holdTime = 0, lastFrameTime = performance.now(), rotAngle1 = 0, rotAngle2 = 0, uBlackoutValue = 0;
        
        let isCollapsing = false, collapseTime = 0, releaseBurstIntensity = 0, releaseScale = 0;
        const COLLAPSE_DURATION = 0.15;

        // 신규: 흡수 파장 풀
        const revWaves = [];
        let revWaveTimer = 0, revWaveIndex = 0;

        const meteors = [], chargingMeteors = [], condenseMeteors = [], burstPool = [];
        const MAX_BURSTS = 3;
        const maxChargingMeteors = Math.floor(400 * Q_MULT), maxCondenseMeteors = Math.floor(800 * Q_MULT), maxBurstMeteors = Math.floor(2700 * Q_MULT);

        init();
        animate();

        function init() {
            rayEffectGlow = document.getElementById('rayEffectGlow'); rayEffect = document.getElementById('rayEffect');
            rayEffectOverlay = document.getElementById('rayEffectOverlay'); rayEffectCondensed = document.getElementById('rayEffectCondensed');

            // 흡수 파장 DOM 생성
            for(let i=0; i<3; i++) {
                let div = document.createElement('div'); div.className = 'rev-shockwave'; document.body.appendChild(div); revWaves.push(div);
            }

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000); camera.position.z = 2500;

            const bgGeom = new THREE.BufferGeometry(), count = Math.floor(160000 * Q_MULT);
            const bgPos = new Float32Array(count * 3), bgSizes = new Float32Array(count);
            for (let i=0; i<count; i++) {
                bgPos[i*3] = THREE.MathUtils.randFloatSpread(10000); bgPos[i*3+1] = THREE.MathUtils.randFloatSpread(10000); bgPos[i*3+2] = THREE.MathUtils.randFloatSpread(10000);
                bgSizes[i] = Math.random() * (isMobile ? 3.0 : 2.0); 
            }
            bgGeom.setAttribute('position', new THREE.BufferAttribute(bgPos, 3)); bgGeom.setAttribute('aSize', new THREE.BufferAttribute(bgSizes, 1));
            bgParticlesMaterial = new THREE.ShaderMaterial({ uniforms: { uTime: { value: 0 }, uGatherProgress: { value: 0 }, uExplosionCenter: { value: new THREE.Vector2(0, 0) }, uDistortion: { value: 0 }, uBlackout: { value: 0 } }, vertexShader: document.getElementById('bgVertexShader').textContent, fragmentShader: document.getElementById('bgFragmentShader').textContent, blending: THREE.AdditiveBlending, depthTest: false, transparent: true });
            scene.add(new THREE.Points(bgGeom, bgParticlesMaterial));

            const mMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthTest: false });
            for(let i=0; i<Math.floor(300*Q_MULT); i++) {
                const m = new THREE.Mesh(new THREE.CylinderGeometry(1, 0.1, 800, 3), mMat); m.geometry.rotateX(Math.PI/2);
                resetMeteor(m); scene.add(m); meteors.push(m);
            }

            for(let i=0; i<maxChargingMeteors; i++) {
                const m = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.1, 1500, 3), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthTest: false }));
                m.geometry.rotateX(Math.PI/2); m.userData.active = false; scene.add(m); chargingMeteors.push(m);
            }
            for(let i=0; i<maxCondenseMeteors; i++) {
                const m = new THREE.Mesh(new THREE.CylinderGeometry(2.0, 0.4, Math.random()>0.5?50:2000, 3), new THREE.MeshBasicMaterial({ color: Math.random()>0.5?0xffffff:0x88ddff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthTest: false }));
                m.geometry.rotateX(Math.PI/2); m.userData.active = false; scene.add(m); condenseMeteors.push(m);
            }

            for(let i=0; i<MAX_BURSTS; i++) {
                const bD=document.createElement('div'), sD=document.createElement('div'), fD=document.createElement('div'), lD=document.createElement('div');
                bD.className='burst-effect'; sD.className='shockwave-effect'; fD.className='fast-shockwave-effect'; lD.className='flash-effect';
                document.body.append(bD, sD, fD, lD);
                const bG = new THREE.BufferGeometry(), bP = new Float32Array(80000*Q_MULT*3), bV = new Float32Array(80000*Q_MULT*3), bS = new Float32Array(80000*Q_MULT);
                for(let j=0; j<80000*Q_MULT; j++) {
                    const u = Math.random(), v = Math.random(), th = u*Math.PI*2, ph = Math.acos(2*v-1), spd = 0.5+Math.random()*1.5;
                    bV[j*3] = Math.sin(ph)*Math.cos(th)*spd; bV[j*3+1] = Math.sin(ph)*Math.sin(th)*spd; bV[j*3+2] = Math.cos(ph)*spd; bS[j] = (1+Math.random()*4)/3;
                }
                bG.setAttribute('position', new THREE.BufferAttribute(bP,3)); bG.setAttribute('aVelocity', new THREE.BufferAttribute(bV,3)); bG.setAttribute('aSize', new THREE.BufferAttribute(bS,1));
                const pM = new THREE.Points(bG, new THREE.ShaderMaterial({ uniforms:{ uBurstTime:{value:0}, uBurstCenter:{value:new THREE.Vector2(0,0)}, uBurstPower:{value:1} }, vertexShader: document.getElementById('burstVertexShader').textContent, fragmentShader: document.getElementById('burstFragmentShader').textContent, blending: THREE.AdditiveBlending, depthTest: false, transparent: true, visible: false }));
                scene.add(pM);
                const metMat = new THREE.MeshBasicMaterial({ color: 0xffddaa, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthTest: false }), mArr = [];
                for(let k=0; k<maxBurstMeteors; k++) { const m = new THREE.Mesh(new THREE.CylinderGeometry(2,0.2,1200,3), metMat); m.geometry.rotateX(Math.PI/2); m.geometry.translate(0,0,600); m.scale.z=0.001; m.visible=false; scene.add(m); mArr.push(m); }
                burstPool.push({ active:false, time:0, burstDiv:bD, shockwaveDiv:sD, fastShockwaveDiv:fD, flashDiv:lD, particlesMat:pM.material, particlesMesh:pM, meteorMat:metMat, meteors:mArr, audio:safeAudio('explosion.mp3') });
            }

            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128; const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64,64,0,64,64,64); grad.addColorStop(0,'#fff'); grad.addColorStop(0.2,'rgba(200,230,255,0.8)'); grad.addColorStop(1,'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
            mouseGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), blending: THREE.AdditiveBlending }));
            mouseGlow.scale.set(150, 150, 1); scene.add(mouseGlow);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2.0));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', e => { if(isHolding){lastHeldX=e.clientX; lastHeldY=e.clientY;} updateExplCenter(e.clientX, e.clientY); });
            document.addEventListener('mousedown', e => triggerStart(e.clientX, e.clientY));
            document.addEventListener('mouseup', triggerEnd);
            document.addEventListener('touchstart', e => { e.preventDefault(); triggerStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
            document.addEventListener('touchmove', e => { if(isHolding){lastHeldX=e.touches[0].clientX; lastHeldY=e.touches[0].clientY;} updateExplCenter(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
            document.addEventListener('touchend', triggerEnd);
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        function updateExplCenter(x, y) { mouseX = (x-window.innerWidth/2)/(window.innerWidth/2); mouseY = -(y-window.innerHeight/2)/(window.innerHeight/2); bgParticlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY); }
        function triggerStart(x, y) { if(isCollapsing)return; isHolding=true; targetProgress=1; holdTime=0; lastHeldX=x; lastHeldY=y; updateExplCenter(x,y); chargeAudio.currentTime=0; chargeAudio.play(); }
        function triggerEnd() {
            if(isHolding) {
                isHolding=false; chargeAudio.pause(); glitchAudio.pause(); glitchAudio.currentTime=0;
                if(currentProgress>0.05) {
                    let cProg = Math.max(0, Math.min(1, (holdTime-6)/3)), smoothC = cProg*cProg*(3-2*cProg);
                    releaseBurstIntensity = Math.max(0.05, currentProgress) + cProg*1.5;
                    releaseScale = currentProgress * (1 - 0.6*smoothC);
                    isCollapsing = true; collapseTime = 0;
                } else targetProgress = 0;
            }
        }
        function resetMeteor(m) { m.position.set((Math.random()-0.5)*6000, (Math.random()-0.5)*4000, -2000-Math.random()*4000); m.userData.velocity = new THREE.Vector3((Math.random()-0.5)*2.4, (Math.random()-0.5)*2.4-0.4, 8+Math.random()*8); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), m.userData.velocity.clone().normalize()); }
        function resetCharging(m, tPos) { const th=Math.random()*Math.PI*2, r=3500+Math.random()*2000, zd=(Math.random()-0.5)*4000; m.position.set(tPos.x+Math.cos(th)*r, tPos.y+Math.sin(th)*r, tPos.z+zd); const dir=new THREE.Vector3().subVectors(tPos, m.position).normalize(); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir); m.userData.dir=dir; m.userData.speed=40+Math.random()*60; }
        function resetCondense(m, tPos) { const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1), r=4000+Math.random()*3000; m.position.set(tPos.x+Math.sin(ph)*Math.cos(th)*r, tPos.y+Math.sin(ph)*Math.sin(th)*r, tPos.z+Math.cos(ph)*r); m.userData.speed=(150+Math.random()*200)*(0.4+Math.random()*0.1); }
        function getM3D() { let v = new THREE.Vector3(mouseX, mouseY, 0.5); v.unproject(camera); return camera.position.clone().add(v.sub(camera.position).normalize().multiplyScalar((1000-camera.position.z)/v.z)); }

        function executeBurst(int) {
            uBlackoutValue = 0; let vInt = int * 1.5; const b = burstPool[currentBurstIndex]; currentBurstIndex = (currentBurstIndex+1)%MAX_BURSTS;
            b.active=true; b.time=0; b.audio.currentTime=0; b.audio.volume=Math.min(1, Math.max(0.1, vInt/2.5)); b.audio.play();
            b.particlesMesh.visible=true; b.particlesMat.uniforms.uBurstCenter.value.set(mouseX, mouseY); b.particlesMat.uniforms.uBurstPower.value=Math.max(0.2, vInt); b.meteorMat.opacity=1;
            
            const tr = (el, s, dur, ease) => { el.style.transition='none'; el.style.transform=`translate(-50%,-50%) scale(0)`; el.style.opacity='1'; el.style.left=lastHeldX+'px'; el.style.top=lastHeldY+'px'; if(s) {el.style.width=`calc(var(--max-size)*${vInt})`; el.style.height=`calc(var(--max-size)*${vInt})`;} void el.offsetWidth; el.style.transition=`transform ${dur} ${ease}, opacity ${dur} ease-out`; el.style.transform=`translate(-50%,-50%) scale(1)`; el.style.opacity='0'; };
            
            b.flashDiv.style.transition='none'; b.flashDiv.style.transform=`translate(-50%,-50%) scale(${vInt*0.1})`; b.flashDiv.style.opacity=Math.min(1,vInt); b.flashDiv.style.left=lastHeldX+'px'; b.flashDiv.style.top=lastHeldY+'px'; void b.flashDiv.offsetWidth; b.flashDiv.style.transition='transform 0.15s cubic-bezier(0.1,0.8,0.2,1), opacity 3s ease-out'; b.flashDiv.style.transform=`translate(-50%,-50%) scale(${Math.max(0.5,vInt)})`; b.flashDiv.style.opacity='0';
            
            tr(b.burstDiv, true, '0.8s', 'ease-out'); tr(b.shockwaveDiv, true, '15s', 'cubic-bezier(0.1,0.8,0.2,1)');
            b.fastShockwaveDiv.style.transition='none'; b.fastShockwaveDiv.style.transform='translate(-50%,-50%) scale(0)'; b.fastShockwaveDiv.style.opacity='1'; b.fastShockwaveDiv.style.left=lastHeldX+'px'; b.fastShockwaveDiv.style.top=lastHeldY+'px'; b.fastShockwaveDiv.style.width=`calc(var(--max-size)*${vInt})`; b.fastShockwaveDiv.style.height=`calc(var(--max-size)*${vInt})`;
            setTimeout(()=>{ void b.fastShockwaveDiv.offsetWidth; b.fastShockwaveDiv.style.transition='transform 7.5s cubic-bezier(0.1,0.8,0.2,1), opacity 7.5s ease-out'; b.fastShockwaveDiv.style.transform='translate(-50%,-50%) scale(1)'; b.fastShockwaveDiv.style.opacity='0'; }, 150);

            const m3d = getM3D(), maxM = Math.min(b.meteors.length, Math.floor(1800*Q_MULT*vInt));
            b.meteors.forEach((m, i) => {
                if(i<maxM) { m.visible=true; m.position.copy(m3d); m.scale.z=0.001; const u=Math.random(), v=Math.random(), th=u*Math.PI*2, ph=Math.acos(2*v-1), spd=(2.25+Math.random()*3.75)*Math.max(0.2, vInt); m.userData.velocity=new THREE.Vector3(Math.sin(ph)*Math.cos(th)*spd, Math.sin(ph)*Math.sin(th)*spd, Math.cos(ph)*spd); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), m.userData.velocity.clone().normalize()); } else m.visible=false;
            });
        }

        function animate(t) {
            requestAnimationFrame(animate);
            let dt = (t - lastFrameTime)/1000; if(dt>0.1||isNaN(dt)) dt=0.016; lastFrameTime = t;
            if(isHolding) holdTime += dt;
            rotAngle1 += 30*dt; rotAngle2 -= 45*dt;

            let m3d = getM3D();
            mouseGlow.position.copy(camera.position.clone().add(m3d.clone().sub(camera.position).normalize().multiplyScalar((1000-camera.position.z)/m3d.clone().sub(camera.position).normalize().z)));
            
            let isG = false, gInt = 0, shake = 0, cRaw = (isHolding&&holdTime>6)?Math.min(1,(holdTime-6)/3):0;
            let smC = cRaw*cRaw*(3-2*cRaw), sMult = 1-(0.6*smC);
            uBlackoutValue += ((isHolding&&holdTime>8?0.85:0) - uBlackoutValue) * 0.15; let gAlpha = 1-uBlackoutValue;

            let fScale = 0;
            if(isCollapsing) {
                collapseTime += dt; let cr = Math.min(1, collapseTime/COLLAPSE_DURATION); fScale = releaseScale * (1 - cr*cr*cr); uBlackoutValue = 1;
                if(cr >= 1) { isCollapsing=false; executeBurst(releaseBurstIntensity); fScale=0; currentProgress=0; targetProgress=0; holdTime=0; }
            } else if(isHolding) {
                fScale = currentProgress * sMult;
                if(holdTime>4.8 && holdTime<=6) { isG=true; gInt=(holdTime-4.8)/1.2; } else if(holdTime>6) { isG=true; gInt=1+smC; }
            } else { fScale = currentProgress; uBlackoutValue += (0-uBlackoutValue)*0.15; }

            // --- 5. 신규: 6초 이후 안으로 빨려 들어오는 공기 파장(Reverse Shockwave) ---
            if(isHolding && holdTime > 6.0) {
                revWaveTimer += dt;
                // 0.5초마다 하나씩 거대한 파장이 마우스를 향해 빨려들어감
                if(revWaveTimer > 0.5) {
                    revWaveTimer = 0;
                    let rw = revWaves[revWaveIndex]; revWaveIndex = (revWaveIndex + 1) % 3;
                    rw.style.transition = 'none';
                    rw.style.transform = `translate(-50%, -50%) scale(${3.0 - smC})`; // 화면 밖에서 생성
                    rw.style.opacity = '0';
                    rw.style.left = lastHeldX + 'px'; rw.style.top = lastHeldY + 'px';
                    void rw.offsetWidth;
                    // 중심으로 빨려 들어가며 사라짐 (Ease-in)
                    rw.style.transition = 'transform 0.6s cubic-bezier(0.5, 0, 1, 1), opacity 0.6s ease-out';
                    rw.style.transform = 'translate(-50%, -50%) scale(0)';
                    rw.style.opacity = String(0.3 + smC * 0.5); // 응축될수록 진해짐
                }
            }

            if(isG) {
                shake = gInt*40*gAlpha; scene.position.x = (Math.random()-0.5)*shake; scene.position.y = (Math.random()-0.5)*shake;
                mouseGlow.material.opacity = (0.3+Math.random()*0.7)*gAlpha; mouseGlow.scale.set(150+(Math.random()-0.5)*80*gInt, 150+(Math.random()-0.5)*80*gInt, 1);
                let off = (Math.random()-0.5)*60*gInt; rayEffectOverlay.style.boxShadow = `${off}px 0 0 rgba(255,0,100,0.8), ${-off}px 0 0 rgba(0,255,255,0.8), 0 0 100px 50px rgba(255,255,255,0.7)`;
            } else {
                scene.position.x += -scene.position.x*0.1; scene.position.y += -scene.position.y*0.1; mouseGlow.material.opacity = 0.8*gAlpha; mouseGlow.scale.set(150,150,1); rayEffectOverlay.style.boxShadow = `0 0 100px 50px rgba(255,255,255,0.7)`;
            }

            meteors.forEach(m => { m.position.add(m.userData.velocity); if(m.position.z>camera.position.z+1000||Math.abs(m.position.x)>6000||Math.abs(m.position.y)>6000) resetMeteor(m); });

            let lim = Math.floor(50*Q_MULT + (350*Q_MULT)*currentProgress);
            chargingMeteors.forEach((m, i) => {
                if((isHolding||isCollapsing) && i<lim) {
                    if(!m.userData.active){resetCharging(m, m3d); m.userData.active=true; m.material.opacity=0.2*gAlpha;}
                    if(m.material.opacity<1*gAlpha) m.material.opacity = Math.min(1*gAlpha, m.material.opacity+0.02);
                    const dir = new THREE.Vector3().subVectors(m3d, m.position).normalize(); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir);
                    m.position.add(dir.multiplyScalar(m.userData.speed * (1+smC*3) * (isCollapsing?3:1)));
                    if(m.position.distanceTo(m3d)<200) resetCharging(m, m3d);
                } else { m.material.opacity = Math.max(m.material.opacity-0.1, 0); if(m.material.opacity<=0) m.userData.active=false; }
            });

            condenseMeteors.forEach((m, i) => {
                if((isHolding&&smC>0)||isCollapsing) {
                    if(i < Math.floor(maxCondenseMeteors * (isCollapsing?1:smC))) {
                        if(!m.userData.active){resetCondense(m, m3d); m.userData.active=true; m.material.opacity=0;}
                        m.material.opacity = Math.min(1*gAlpha, m.material.opacity+0.05);
                        const dir = new THREE.Vector3().subVectors(m3d, m.position).normalize(); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir);
                        m.position.add(dir.multiplyScalar(m.userData.speed * (isCollapsing?3:1)));
                        if(m.position.distanceTo(m3d)<300) resetCondense(m, m3d);
                    } else { m.material.opacity = Math.max(m.material.opacity-0.1, 0); if(m.material.opacity<=0) m.userData.active=false; }
                } else { m.material.opacity = Math.max(m.material.opacity-0.1, 0); if(m.material.opacity<=0) m.userData.active=false; }
            });

            burstPool.forEach(b => { if(b.active) { b.time+=0.016; b.particlesMat.uniforms.uBurstTime.value=b.time; if(b.time<6) { b.meteorMat.opacity=1-b.time/6; b.meteors.forEach(m => { if(m.visible){m.scale.z=Math.min(1,m.scale.z+0.03); m.position.add(m.userData.velocity);} }); } if(b.time>12) {b.active=false; b.particlesMesh.visible=false;} } });

            currentProgress += (targetProgress - currentProgress) * (isHolding?0.005:0.02);
            bgParticlesMaterial.uniforms.uGatherProgress.value = currentProgress; bgParticlesMaterial.uniforms.uTime.value = time*0.001;
            bgParticlesMaterial.uniforms.uDistortion.value = isCollapsing?2.0:smC; bgParticlesMaterial.uniforms.uBlackout.value = uBlackoutValue;

            explosionBrightness = (isHolding||isCollapsing) ? (2+Math.pow(currentProgress,5)*158+smC*300)*gAlpha*(isCollapsing?2:1) : Math.max(2, explosionBrightness*0.96);
            
            [rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed].forEach(el => { el.style.left=lastHeldX+'px'; el.style.top=lastHeldY+'px'; });
            if(fScale > 0.01) {
                rayEffectGlow.style.transform=`translate(-50%,-50%) scale(${fScale}) rotate(${rotAngle1*0.5}deg)`; rayEffectGlow.style.opacity=currentProgress*gAlpha; rayEffectGlow.style.filter=`blur(16px) brightness(${explosionBrightness})`;
                rayEffect.style.transform=`translate(-50%,-50%) scale(${fScale}) rotate(${rotAngle1}deg)`; rayEffect.style.opacity=currentProgress*gAlpha; rayEffect.style.filter=`blur(2px) brightness(${explosionBrightness})`;
                rayEffectOverlay.style.transform=`translate(-50%,-50%) scale(${fScale}) rotate(${rotAngle2}deg)`; rayEffectOverlay.style.opacity=currentProgress*gAlpha; rayEffectOverlay.style.filter=`blur(4px) brightness(${explosionBrightness*1.5})`;
                rayEffectCondensed.style.transform=`translate(-50%,-50%) scale(${fScale}) rotate(${rotAngle1*2}deg)`; rayEffectCondensed.style.opacity=isCollapsing?1:smC*gAlpha; rayEffectCondensed.style.filter=`blur(${2+smC*2}px) brightness(${explosionBrightness*2})`;
            } else [rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed].forEach(el => el.style.transform='translate(-50%,-50%) scale(0)');

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
