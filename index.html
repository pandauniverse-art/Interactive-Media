<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space Big Bang Media Art - Final</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        /* 블러(box-shadow) 제거, 밝기 10% 증가, 더 선명한 빛 확산 */
        #bigBangEffect {
            position: fixed;
            width: 10vmin; 
            height: 10vmin;
            /* 중심부 흰색 영역을 넓히고 중간 단계의 밝기와 불투명도를 올려 10% 더 밝게 세팅 */
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,225,255,0.9) 30%, rgba(255,255,255,0) 80%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0); 
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: screen; 
            /* box-shadow 제거됨 */
        }
    </style>
</head>
<body>
    <div id="bigBangEffect"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uExplosionTime;
        uniform vec2 uExplosionCenter;
        attribute float aSize;

        varying vec2 vUv;
        varying float vDistanceFactor;

        void main() {
            vUv = uv;
            
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 200.0 + 5000.0, 10000.0) - 5000.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float dist = distance(uExplosionCenter, screenPos);
            
            vDistanceFactor = mix(1.0, 0.0, uExplosionTime);
            float shockwave = exp(-dist * 3.0) * uExplosionTime * 250.0; 
            vec2 direction = normalize(screenPos - uExplosionCenter);
            
            vec4 finalPosition = projectionMatrix * (mvPosition + vec4(direction * shockwave, shockwave * 0.1, 0.0));
            gl_Position = finalPosition;
            gl_PointSize = aSize * (1.0 + uExplosionTime * 5.0); 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vDistanceFactor;
        
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            // 폭발 시 파티클 색상도 기존보다 약 10% 밝게 세팅 (0.8, 0.9 -> 0.9, 1.0)
            vec3 color = mix(vec3(0.02, 0.08, 0.2), vec3(0.9, 1.0, 1.0), vDistanceFactor);
            gl_FragColor = vec4(color, mix(0.6, 1.0, vDistanceFactor));
        }
    </script>

    <script>
        let scene, camera, renderer, particlesMaterial;
        let bigBangEffect; 
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        
        let explosionTime = 0.0;
        let flashOpacity = 0.0; 
        let flashScale = 0.0;

        const meteors = [];

        const PARTICLE_COUNT = 125000;
        const SPACE_RANGE = 10000;

        init();
        animate();

        function init() {
            bigBangEffect = document.getElementById('bigBangEffect');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions[i * 3] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(SPACE_RANGE);
                positions[i * 3 + 2] = (Math.random() - 0.5) * SPACE_RANGE; 
                sizes[i] = Math.random() * 2.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            particlesMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uExplosionTime: { value: 0.0 },
                    uExplosionCenter: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const particles = new THREE.Points(geometry, particlesMaterial);
            scene.add(particles);

            createMeteors(10); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onClick);
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('resize', onWindowResize);
        }

        function createMeteors(count) {
            const meteorGeometry = new THREE.CylinderGeometry(1, 0.1, 800, 3);
            meteorGeometry.rotateX(Math.PI / 2); 
            
            const meteorMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            for(let i = 0; i < count; i++) {
                const meteor = new THREE.Mesh(meteorGeometry, meteorMaterial);
                resetMeteor(meteor);
                scene.add(meteor);
                meteors.push(meteor);
            }
        }

        function resetMeteor(meteor) {
            meteor.position.set(
                (Math.random() - 0.5) * 8000,
                (Math.random() - 0.5) * 6000,
                -4000 - Math.random() * 5000
            );
            
            meteor.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 80, 
                (Math.random() - 0.5) * 80 - 20, 
                150 + Math.random() * 200 
            );
            
            meteor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), meteor.userData.velocity.clone().normalize());
        }

        function updateExplosionCenter(clientX, clientY) {
            mouseX = (clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            mouseY = -(clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            targetX = mouseX * 400; 
            targetY = mouseY * 400;
            
            particlesMaterial.uniforms.uExplosionCenter.value.set(mouseX, mouseY);
        }

        function onMouseMove(event) { updateExplosionCenter(event.clientX, event.clientY); }
        function onTouchMove(event) { if (event.touches.length > 0) updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY); }

        function triggerBigBang(clientX, clientY) {
            explosionTime = 1.0;
            flashOpacity = 1.0;
            flashScale = 0.5; 
            
            bigBangEffect.style.left = clientX + 'px';
            bigBangEffect.style.top = clientY + 'px';
        }

        function onClick(event) { triggerBigBang(event.clientX, event.clientY); }
        function onTouchStart(event) {
            if (event.touches.length > 0) {
                triggerBigBang(event.touches[0].clientX, event.touches[0].clientY);
                updateExplosionCenter(event.touches[0].clientX, event.touches[0].clientY);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            meteors.forEach(meteor => {
                meteor.position.add(meteor.userData.velocity);
                if(meteor.position.z > camera.position.z + 1000 || Math.abs(meteor.position.x) > 6000 || Math.abs(meteor.position.y) > 6000) {
                    resetMeteor(meteor);
                }
            });

            // 지속 시간 2배 증가: 감소 수치를 절반 수준으로 조정 (0.95 -> 0.975)
            explosionTime *= 0.975; 
            particlesMaterial.uniforms.uExplosionTime.value = explosionTime;
            particlesMaterial.uniforms.uTime.value = time * 0.001; 
            
            // 빛 효과 지속 시간 2배 증가
            if (flashOpacity > 0.005) {
                // 커지는 속도를 늦춰 긴 시간에 맞춤
                flashScale += (80.0 - flashScale) * 0.02; 
                // 투명도 감소 수치를 늦춰(0.93 -> 0.965) 약 2배 오래 남아있게 조정
                flashOpacity *= 0.965; 
                
                bigBangEffect.style.transform = `translate(-50%, -50%) scale(${flashScale})`;
                bigBangEffect.style.opacity = flashOpacity;
            } else if (flashScale > 0) {
                flashScale = 0;
                bigBangEffect.style.transform = `translate(-50%, -50%) scale(0)`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
