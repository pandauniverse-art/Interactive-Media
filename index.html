<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Space - Final Fixed Art</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        canvas { display: block; }
        
        #rayEffectGlow, #rayEffect, #rayEffectOverlay, #rayEffectCondensed {
            position: fixed; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; border-radius: 50%; will-change: transform, opacity;
        }
        #rayEffectGlow { width: 24vmin; height: 24vmin; z-index: 99; mix-blend-mode: screen; background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,1.0) 1deg, transparent 3deg, transparent 60deg), radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 40%, transparent 80%); filter: blur(16px); box-shadow: 0 0 150px 80px rgba(100, 180, 255, 0.4); }
        #rayEffect { width: 12vmin; height: 12vmin; z-index: 100; mix-blend-mode: screen; background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(200,230,255,0.9) 2deg, transparent 4deg, transparent 45deg), radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(150,200,255,0.8) 30%, transparent 70%); filter: blur(2px); box-shadow: 0 0 75px 30px rgba(100, 200, 255, 0.8), 0 0 150px 60px rgba(255, 255, 255, 0.5); }
        #rayEffectOverlay { width: 12vmin; height: 12vmin; z-index: 101; mix-blend-mode: screen; background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,1.0) 1deg, transparent 3deg, transparent 60deg), radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 40%, transparent 80%); filter: blur(4px); box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.7); }
        #rayEffectCondensed { width: 14vmin; height: 14vmin; z-index: 102; mix-blend-mode: screen; background: radial-gradient(circle, #ffffff 10%, #dcf0ff 50%, transparent 80%); filter: blur(2px) brightness(3.0); box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.9), 0 0 200px 80px rgba(0, 170, 255, 0.6); }
        
        .burst-effect { position: fixed; width: 0vmin; height: 0vmin; --max-size: 40vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 103; mix-blend-mode: screen; background-image: url('image_1.png'); background-size: contain; background-repeat: no-repeat; background-position: center; filter: brightness(2.0); will-change: transform, opacity, width, height; }
        .shockwave-effect, .fast-shockwave-effect { position: fixed; width: 0vmin; height: 0vmin; --max-size: 150vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; mix-blend-mode: overlay; border-radius: 50%; will-change: transform, opacity, width, height; }
        .shockwave-effect { z-index: 104; border: 2px solid rgba(255, 255, 255, 0.3); background: radial-gradient(circle, transparent 70%, rgba(255, 255, 255, 0.1) 80%, transparent 90%); box-shadow: 0 0 100px 20px rgba(255, 255, 255, 0.2); backdrop-filter: blur(6px) brightness(1.2); }
        .fast-shockwave-effect { z-index: 105; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 0 50px 10px rgba(255, 255, 255, 0.3); backdrop-filter: blur(2px) brightness(1.4); }
        .flash-effect { position: fixed; width: 300vmin; height: 300vmin; transform: translate(-50%, -50%) scale(0); opacity: 0; pointer-events: none; z-index: 106; mix-blend-mode: screen; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(200,240,255,1) 10%, rgba(100,180,255,0.5) 30%, transparent 70%); filter: blur(10px) brightness(3.0); will-change: transform, opacity; }
    </style>
</head>
<body>
    <div id="rayEffectGlow"></div>
    <div id="rayEffect"></div>
    <div id="rayEffectOverlay"></div>
    <div id="rayEffectCondensed"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="bgVertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uGatherProgress; 
        uniform vec2 uExplosionCenter;
        uniform float uDistortion;
        attribute float aSize;
        varying float vAlpha;
        varying vec3 vColor; 
        void main() {
            vec3 modPos = position;
            modPos.z = mod(position.z + uTime * 15.0 + 5000.0, 10000.0) - 5000.0;
            vec4 mvPosition = modelViewMatrix * vec4(modPos, 1.0);
            vec2 targetMvXy = uExplosionCenter * abs(mvPosition.z) * 0.8; 
            vec2 mvDirToCenter = targetMvXy - mvPosition.xy;
            float mvDist = length(mvDirToCenter);
            vec2 mvDirNorm = mvDist > 0.001 ? (mvDirToCenter / mvDist) : vec2(0.0);
            float phase = fract(uTime * 0.1 + aSize * 15.0); 
            float powerProgress = pow(uGatherProgress, 3.0);
            mvPosition.xy += mvDirToCenter * phase * phase * powerProgress;
            float lensEffect = exp(-mvDist * 0.0005) * uDistortion * 2000.0;
            mvPosition.xy += mvDirNorm * lensEffect; 
            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aSize; 
            vec2 screenPos = (projectionMatrix * mvPosition).xy / (projectionMatrix * mvPosition).w;
            float localEffect = exp(-distance(uExplosionCenter, screenPos) * 3.3);
            vAlpha = 0.3 + (localEffect * uGatherProgress * 3.0); 
            vec3 c1 = vec3(0.8, 0.2, 1.0), c2 = vec3(0.0, 0.9, 0.8), c3 = vec3(0.1, 0.3, 1.0);
            float mixVal = smoothstep(-1.0, 1.0, sin(position.x * 0.0005) * cos(position.y * 0.0005));
            vec3 targetColor = mix(mix(c1, c2, mixVal), c3, sin(position.z * 0.001) * 0.5 + 0.5);
            vColor = mix(vec3(3.0), targetColor * 4.0, clamp(uGatherProgress * localEffect * 2.0, 0.0, 1.0));
        }
    </script>
    <script id="bgFragmentShader" type="x-shader/x-fragment">
        uniform float uBlackout;
        varying float vAlpha;
        varying vec3 vColor; 
        void main() {
            if (distance(gl_PointCoord, vec2(0.5)) > 0.5) discard;
            gl_FragColor = vec4(vColor, vAlpha * (1.0 - uBlackout)); 
        }
    </script>
    <script id="burstVertexShader" type="x-shader/x-vertex">
        uniform float uBurstTime; uniform float uBurstPower; uniform vec2 uBurstCenter;
        attribute vec3 aVelocity; attribute float aSize; varying float vBurstAlpha;
        void main() {
            vec3 finalPos = position + aVelocity * uBurstTime * 400.0 * uBurstPower;
            vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
            mvPosition.xy += uBurstCenter * 2000.0; 
            gl_Position = projectionMatrix * mvPosition;
            float progress = smoothstep(0.0, 12.0, uBurstTime); 
            gl_PointSize = aSize * (1.0 - progress); 
            vBurstAlpha = 1.0 - progress; 
        }
    </script>
    <script id="burstFragmentShader" type="x-shader/x-fragment">
        varying float vBurstAlpha;
        void main() {
            if (distance(gl_PointCoord, vec2(0.5)) > 0.5 || vBurstAlpha <= 0.0) discard;
            gl_FragColor = vec4(mix(vec3(0.3, 0.8, 1.0), vec3(1.0), vBurstAlpha), vBurstAlpha);
        }
    </script>

    <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        const Q_MULT = isMobile ? 0.33 : 1.0; 

        // 사운드 안전 로드
        function safeAudio(src) { 
            let a = new Audio(src); 
            a.onerror = () => { console.warn(src + " 파일을 찾을 수 없습니다."); a.play = () => Promise.resolve(); };
            return a;
        }
        let chargeAudio = safeAudio('charge.mp3'); chargeAudio.loop = true;
        let glitchAudio = safeAudio('glitch.mp3'); glitchAudio.loop = true;

        let scene, camera, renderer, mouseGlow;
        let bgParticlesMaterial, rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed;
        let fadeScene, fadeCamera, fadePlane;
        let mouseX = 0, mouseY = 0, isHolding = false, lastHeldX = window.innerWidth / 2, lastHeldY = window.innerHeight / 2;
        let targetProgress = 0, currentProgress = 0, explosionBrightness = 2.0;
        let holdTime = 0, lastFrameTime = performance.now(), rotAngle1 = 0, rotAngle2 = 0, uBlackoutValue = 0;
        let isCollapsing = false, collapseTime = 0, releaseBurstIntensity = 0, releaseScale = 0;
        const COLLAPSE_DURATION = 0.15;

        const meteors = [], chargingMeteors = [], condenseMeteors = [], burstPool = [];
        const MAX_BURSTS = 3;
        const maxChargingMeteors = Math.floor(400 * Q_MULT), maxCondenseMeteors = Math.floor(800 * Q_MULT), maxBurstMeteors = Math.floor(1800 * Q_MULT), startChargingMeteors = Math.floor(50 * Q_MULT);

        init();
        animate();

        function init() {
            rayEffectGlow = document.getElementById('rayEffectGlow');
            rayEffect = document.getElementById('rayEffect');
            rayEffectOverlay = document.getElementById('rayEffectOverlay'); 
            rayEffectCondensed = document.getElementById('rayEffectCondensed');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.z = 2500;

            // 배경 파티클
            const bgGeom = new THREE.BufferGeometry();
            const bgPos = new Float32Array(Math.floor(160000 * Q_MULT) * 3);
            const bgSizes = new Float32Array(Math.floor(160000 * Q_MULT));
            for (let i = 0; i < bgSizes.length; i++) {
                bgPos[i * 3] = THREE.MathUtils.randFloatSpread(10000);
                bgPos[i * 3 + 1] = THREE.MathUtils.randFloatSpread(10000);
                bgPos[i * 3 + 2] = THREE.MathUtils.randFloatSpread(10000);
                bgSizes[i] = Math.random() * (isMobile ? 3.0 : 2.0);
            }
            bgGeom.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
            bgGeom.setAttribute('aSize', new THREE.BufferAttribute(bgSizes, 1));
            bgParticlesMaterial = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uGatherProgress: { value: 0 }, uExplosionCenter: { value: new THREE.Vector2(0, 0) }, uDistortion: { value: 0 }, uBlackout: { value: 0 } },
                vertexShader: document.getElementById('bgVertexShader').textContent,
                fragmentShader: document.getElementById('bgFragmentShader').textContent,
                blending: THREE.AdditiveBlending, transparent: true, depthTest: false
            });
            scene.add(new THREE.Points(bgGeom, bgParticlesMaterial));

            // 기본 유성우
            const metGeom = new THREE.CylinderGeometry(1, 0.1, 800, 3); metGeom.rotateX(Math.PI / 2);
            const metMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            for(let i = 0; i < Math.floor(300 * Q_MULT); i++) {
                const m = new THREE.Mesh(metGeom, metMat);
                m.position.set(THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(4000), -2000 - Math.random() * 4000);
                m.userData.velocity = new THREE.Vector3((Math.random()-0.5)*2.4, (Math.random()-0.5)*2.4-0.4, 8 + Math.random()*8);
                scene.add(m); meteors.push(m);
            }

            // 차징 및 흡수 유성
            const cMetGeom = new THREE.CylinderGeometry(0.8, 0.1, 1500, 3); cMetGeom.rotateX(Math.PI / 2);
            for(let i = 0; i < maxChargingMeteors; i++) {
                const m = new THREE.Mesh(cMetGeom, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending }));
                scene.add(m); chargingMeteors.push(m);
            }
            for(let i = 0; i < maxCondenseMeteors; i++) {
                const m = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 0.2, 2000, 3), new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending }));
                m.geometry.rotateX(Math.PI / 2);
                scene.add(m); condenseMeteors.push(m);
            }

            // 폭발 풀
            for(let i = 0; i < MAX_BURSTS; i++) {
                const bDiv = document.createElement('div'); bDiv.className = 'burst-effect'; document.body.appendChild(bDiv);
                const sDiv = document.createElement('div'); sDiv.className = 'shockwave-effect'; document.body.appendChild(sDiv);
                const fDiv = document.createElement('div'); fDiv.className = 'fast-shockwave-effect'; document.body.appendChild(fDiv);
                const lDiv = document.createElement('div'); lDiv.className = 'flash-effect'; document.body.appendChild(lDiv);
                const pMat = new THREE.ShaderMaterial({ uniforms: { uBurstTime: { value: 0 }, uBurstPower: { value: 1 }, uBurstCenter: { value: new THREE.Vector2(0,0) } }, vertexShader: document.getElementById('burstVertexShader').textContent, fragmentShader: document.getElementById('burstFragmentShader').textContent, blending: THREE.AdditiveBlending, transparent: true, visible: false });
                const pMesh = new THREE.Points(new THREE.BufferGeometry(), pMat); scene.add(pMesh);
                const mMat = new THREE.MeshBasicMaterial({ color: 0xffddaa, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
                const mArr = [];
                for(let j=0; j<maxBurstMeteors; j++) { 
                    const m = new THREE.Mesh(new THREE.CylinderGeometry(2,0.2,1200,3), mMat); m.geometry.rotateX(Math.PI/2); m.geometry.translate(0,0,600); m.scale.z=0.001; m.visible=false; scene.add(m); mArr.push(m);
                }
                burstPool.push({ active: false, time: 0, burstDiv: bDiv, shockwaveDiv: sDiv, fastShockwaveDiv: fDiv, flashDiv: lDiv, particlesMat: pMat, particlesMesh: pMesh, meteorMat: mMat, meteors: mArr, audio: safeAudio('explosion.mp3') });
            }

            // 마우스 글로우
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const g = ctx.createRadialGradient(64,64,0,64,64,64); g.addColorStop(0,'#fff'); g.addColorStop(0.2,'rgba(200,230,255,0.8)'); g.addColorStop(1,'transparent');
            ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
            mouseGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), blending: THREE.AdditiveBlending }));
            mouseGlow.scale.set(150, 150, 1); scene.add(mouseGlow);

            fadeScene = new THREE.Scene();
            fadeCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            fadePlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 }));
            fadeScene.add(fadePlane);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.autoClearColor = false;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2.0));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        function onMouseMove(e) { updateExplosionCenter(e.clientX, e.clientY); if(isHolding) { lastHeldX = e.clientX; lastHeldY = e.clientY; } }
        function onTouchStart(e) { e.preventDefault(); const t = e.touches[0]; isHolding = true; targetProgress = 1; holdTime = 0; updateExplosionCenter(t.clientX, t.clientY); lastHeldX = t.clientX; lastHeldY = t.clientY; chargeAudio.play(); }
        function onMouseDown(e) { isHolding = true; targetProgress = 1; holdTime = 0; chargeAudio.play(); }

        function triggerHoldEnd() {
            if (!isHolding) return;
            isHolding = false; chargeAudio.pause(); glitchAudio.pause();
            if(currentProgress > 0.05) {
                let cp = Math.max(0, Math.min(1, (holdTime - 6)/3));
                releaseBurstIntensity = Math.max(0.05, currentProgress) + cp * 1.5;
                releaseScale = currentProgress * (1 - (0.6 * cp * cp * (3-2*cp)));
                isCollapsing = true; collapseTime = 0;
            } else { targetProgress = 0; }
        }
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mousedown', onMouseDown);
        document.addEventListener('mouseup', triggerHoldEnd);
        document.addEventListener('touchstart', onTouchStart, {passive:false});
        document.addEventListener('touchend', triggerHoldEnd);

        function executeBurst(intensity) {
            uBlackoutValue = 0;
            const b = burstPool[currentBurstIndex]; currentBurstIndex = (currentBurstIndex + 1) % MAX_BURSTS;
            b.active = true; b.time = 0; b.audio.volume = Math.min(1, intensity/2.5); b.audio.play();
            b.flashDiv.style.transition = 'none'; b.flashDiv.style.transform = `translate(-50%,-50%) scale(${intensity*0.1})`; b.flashDiv.style.opacity = intensity;
            b.flashDiv.style.left = lastHeldX+'px'; b.flashDiv.style.top = lastHeldY+'px';
            void b.flashDiv.offsetWidth; b.flashDiv.style.transition = 'transform 0.15s ease-out, opacity 3s ease-out'; b.flashDiv.style.transform = `translate(-50%,-50%) scale(${intensity})`; b.flashDiv.style.opacity = '0';
            b.particlesMat.uniforms.uBurstCenter.value.set(mouseX, mouseY); b.particlesMat.uniforms.uBurstPower.value = intensity; b.particlesMesh.visible = true;
            b.meteorMat.opacity = 1;
            const activeCount = Math.min(b.meteors.length, Math.floor(b.meteors.length * intensity));
            const target3D = getMouse3DTarget();
            b.meteors.forEach((m, i) => {
                if(i < activeCount) {
                    m.visible = true; m.position.copy(target3D); m.scale.z = 0.001;
                    const u = Math.random(), v = Math.random(), theta = u*Math.PI*2, phi = Math.acos(2*v-1);
                    const spd = (2.25 + Math.random()*3.75) * Math.max(0.2, intensity);
                    m.userData.velocity = new THREE.Vector3(Math.sin(phi)*Math.cos(theta)*spd, Math.sin(phi)*Math.sin(theta)*spd, Math.cos(phi)*spd);
                    m.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), m.userData.velocity.clone().normalize());
                } else m.visible = false;
            });
        }

        function getMouse3DTarget() {
            let v = new THREE.Vector3(mouseX, mouseY, 0.5); v.unproject(camera);
            let dir = v.sub(camera.position).normalize();
            return camera.position.clone().add(dir.multiplyScalar((1000 - camera.position.z)/dir.z));
        }

        function animate(t) {
            requestAnimationFrame(animate);
            let dt = (t - lastFrameTime) / 1000; if(dt > 0.1 || isNaN(dt)) dt = 0.016; lastFrameTime = t;
            if(isHolding) holdTime += dt;
            rotAngle1 += 30*dt; rotAngle2 -= 45*dt;

            let cpRaw = isHolding && holdTime > 6 ? Math.min(1, (holdTime-6)/3) : 0;
            let smoothC = cpRaw * cpRaw * (3 - 2 * cpRaw);
            let blackoutT = (isHolding && holdTime > 8) ? 0.85 : 0;
            uBlackoutValue += (blackoutT - uBlackoutValue) * 0.1;
            let gAlpha = 1 - uBlackoutValue;

            let fScale = 0;
            if(isCollapsing) {
                collapseTime += dt; let cr = Math.min(1, collapseTime / COLLAPSE_DURATION);
                fScale = releaseScale * (1 - cr * cr); uBlackoutValue = 1;
                if(cr >= 1) { isCollapsing = false; executeBurst(releaseBurstIntensity); currentProgress = 0; targetProgress = 0; }
            } else {
                fScale = currentProgress * (1 - 0.6 * smoothC);
            }

            // 마우스 글로우 위치
            let m3 = new THREE.Vector3(mouseX, mouseY, 0.5); m3.unproject(camera);
            let md = m3.sub(camera.position).normalize();
            mouseGlow.position.copy(camera.position.clone().add(md.multiplyScalar((1000-camera.position.z)/md.z)));
            mouseGlow.material.opacity = 0.8 * gAlpha;

            bgParticlesMaterial.uniforms.uTime.value = t * 0.001;
            bgParticlesMaterial.uniforms.uGatherProgress.value = currentProgress;
            bgParticlesMaterial.uniforms.uDistortion.value = isCollapsing ? 2.0 : smoothC;
            bgParticlesMaterial.uniforms.uBlackout.value = uBlackoutValue;

            currentProgress += (targetProgress - currentProgress) * (isHolding ? 0.005 : 0.02);
            explosionBrightness = (2 + Math.pow(currentProgress, 5) * 158 + smoothC * 300) * gAlpha;
            if(isCollapsing) explosionBrightness *= 2;

            [rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed].forEach(el => { el.style.left = lastHeldX+'px'; el.style.top = lastHeldY+'px'; });
            if(fScale > 0.01) {
                rayEffectGlow.style.transform = `translate(-50%,-50%) scale(${fScale}) rotate(${rotAngle1*0.5}deg)`; rayEffectGlow.style.opacity = currentProgress*gAlpha;
                rayEffect.style.transform = `translate(-50%,-50%) scale(${fScale}) rotate(${rotAngle1}deg)`; rayEffect.style.opacity = currentProgress*gAlpha;
                rayEffectOverlay.style.transform = `translate(-50%,-50%) scale(${fScale}) rotate(${rotAngle2}deg)`; rayEffectOverlay.style.opacity = currentProgress*gAlpha;
                rayEffectCondensed.style.transform = `translate(-50%,-50%) scale(${fScale}) rotate(${rotAngle1*2}deg)`; rayEffectCondensed.style.opacity = isCollapsing?1:smoothC*gAlpha;
            } else { [rayEffectGlow, rayEffect, rayEffectOverlay, rayEffectCondensed].forEach(el => el.style.transform = 'translate(-50%,-50%) scale(0)'); }

            meteors.forEach(m => { m.position.add(m.userData.velocity); if(m.position.z > 3500) m.position.z = -5000; });
            burstPool.forEach(b => { if(b.active) { b.time += 0.016; b.particlesMat.uniforms.uBurstTime.value = b.time; if(b.time < 6) { b.meteorMat.opacity = 1 - b.time/6; b.meteors.forEach(m => { if(m.visible){m.scale.z = Math.min(1, m.scale.z+0.03); m.position.add(m.userData.velocity);} }); } if(b.time > 12) { b.active = false; b.particlesMesh.visible = false; } } });

            renderer.clearDepth(); renderer.render(fadeScene, fadeCamera); renderer.render(scene, camera);
        }
    </script>
</body>
</html>
